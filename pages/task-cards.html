<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Task Cards - Noon Academy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
*{box-sizing:border-box}
:root{
  --bg:#F8F5EF;
  --bg-raised:#FFFFFF;
  --fg:#141414;
  --fg-secondary:#74716C;
  --fg-muted:#BBB8B1;
  --green:#27BD86;
  --red:#F03D3D;
  --blue:#0084FF;
  --font-sans:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono','Inter',monospace;
  --r:8px;
}
body{background:var(--bg);margin:0;font-family:var(--font-sans);color:var(--fg);min-height:100vh}

.page{max-width:480px;margin:0 auto;padding:32px 24px}
.page-title{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;color:var(--fg-secondary);margin-bottom:16px}

.task{background:var(--bg-raised);border-radius:var(--r);margin-bottom:12px;padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:box-shadow 0.15s;opacity:0;transform:translateY(6px);animation:cardIn 0.35s ease forwards}
.task:hover{box-shadow:0 2px 12px rgba(0,0,0,0.06)}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}

.task__countdown{text-align:center;min-width:44px;flex:none}
.task__countdown-num{font-family:var(--font-mono);font-size:24px;font-weight:700;line-height:1}
.task__countdown-unit{font-family:var(--font-mono);font-size:8px;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px}

.task__body{flex:1;min-width:0}
.task__title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task__sub{font-size:11px;color:var(--fg-muted);margin-top:2px}
.task__status{margin-top:5px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}

.pill{display:inline-flex;align-items:center;gap:3px;font-family:var(--font-mono);font-size:9px;font-weight:600;padding:2px 7px;border-radius:10px}
.pill--muted{background:rgba(20,20,20,0.04);color:var(--fg-secondary)}
.pill--green{background:rgba(39,189,134,0.08);color:var(--green)}
.pill--blue{background:rgba(0,132,255,0.08);color:var(--blue)}
.pill--red{background:rgba(240,61,61,0.06);color:var(--red)}

.task__arrow{flex:none;color:var(--fg-muted)}
</style>
</head>
<body>

<div class="page">

  <div class="page-title">Upcoming exams</div>

  <!-- Tomorrow — urgent, 1 unresolved -->
  <div class="task" style="animation-delay:0ms">
    <div class="task__countdown" style="color:var(--red)">
      <div class="task__countdown-num">1</div>
      <div class="task__countdown-unit">day</div>
    </div>
    <div class="task__body">
      <div class="task__title">Qudrat Quantitative</div>
      <div class="task__sub">Tomorrow · 9:00 AM</div>
      <div class="task__status">
        <span class="pill pill--red">1 unresolved</span>
        <span class="pill pill--green"><svg width="7" height="7" viewBox="0 0 12 12" fill="currentColor"><path d="M6 0.5L7.5 4.2L11.5 4.6L8.5 7.2L9.3 11.2L6 9.3L2.7 11.2L3.5 7.2L0.5 4.6L4.5 4.2Z"/></svg> 4 mastered</span>
      </div>
    </div>
    <div class="task__arrow"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 3l5 5-5 5"/></svg></div>
  </div>

  <!-- 2 days — all mastered, mock available not taken -->
  <div class="task" style="animation-delay:60ms">
    <div class="task__countdown" style="color:var(--blue)">
      <div class="task__countdown-num">2</div>
      <div class="task__countdown-unit">days</div>
    </div>
    <div class="task__body">
      <div class="task__title">Qudrat Quantitative</div>
      <div class="task__sub">Tuesday · 11:00 AM</div>
      <div class="task__status">
        <span class="pill pill--blue">Mock available</span>
        <span class="pill pill--green"><svg width="7" height="7" viewBox="0 0 12 12" fill="currentColor"><path d="M6 0.5L7.5 4.2L11.5 4.6L8.5 7.2L9.3 11.2L6 9.3L2.7 11.2L3.5 7.2L0.5 4.6L4.5 4.2Z"/></svg> All mastered</span>
      </div>
    </div>
    <div class="task__arrow"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 3l5 5-5 5"/></svg></div>
  </div>

  <!-- 3 days — all mastered, mock taken -->
  <div class="task" style="animation-delay:120ms">
    <div class="task__countdown" style="color:var(--blue)">
      <div class="task__countdown-num">3</div>
      <div class="task__countdown-unit">days</div>
    </div>
    <div class="task__body">
      <div class="task__title">Qudrat Quantitative</div>
      <div class="task__sub">Wednesday · 9:00 AM</div>
      <div class="task__status">
        <span class="pill pill--muted">Mock: 88%</span>
        <span class="pill pill--green"><svg width="7" height="7" viewBox="0 0 12 12" fill="currentColor"><path d="M6 0.5L7.5 4.2L11.5 4.6L8.5 7.2L9.3 11.2L6 9.3L2.7 11.2L3.5 7.2L0.5 4.6L4.5 4.2Z"/></svg> All mastered</span>
      </div>
    </div>
    <div class="task__arrow"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 3l5 5-5 5"/></svg></div>
  </div>

  <!-- 5 days — preparing, many topics -->
  <div class="task" style="animation-delay:180ms">
    <div class="task__countdown" style="color:var(--blue)">
      <div class="task__countdown-num">5</div>
      <div class="task__countdown-unit">days</div>
    </div>
    <div class="task__body">
      <div class="task__title">Qudrat Quantitative</div>
      <div class="task__sub">Friday · 2:00 PM</div>
      <div class="task__status">
        <span class="pill pill--red">14 unresolved</span>
        <span class="pill pill--green"><svg width="7" height="7" viewBox="0 0 12 12" fill="currentColor"><path d="M6 0.5L7.5 4.2L11.5 4.6L8.5 7.2L9.3 11.2L6 9.3L2.7 11.2L3.5 7.2L0.5 4.6L4.5 4.2Z"/></svg> 28 mastered</span>
      </div>
    </div>
    <div class="task__arrow"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 3l5 5-5 5"/></svg></div>
  </div>


</div>
</body>
</html>
