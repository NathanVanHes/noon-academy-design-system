<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Task Cards - Noon Academy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
*{box-sizing:border-box}
:root{
  --bg:#F8F5EF;
  --bg-raised:#FFFFFF;
  --bg-disabled:#EDEAE3;
  --fg:#141414;
  --fg-secondary:#74716C;
  --fg-muted:#BBB8B1;
  --green:#27BD86;
  --gold:#FFCB45;
  --red:#F03D3D;
  --btn:#64D8AE;
  --blue:#0084FF;
  --font-sans:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono','Inter',monospace;
  --r:8px;
}
body{background:var(--bg);margin:0;font-family:var(--font-sans);color:var(--fg);min-height:100vh}

.page{max-width:480px;margin:0 auto;padding:32px 24px}
.page-title{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;color:var(--fg-secondary);margin-bottom:16px}

/* Exam card */
.exam-card{background:var(--bg-raised);border-radius:var(--r);overflow:hidden;margin-bottom:16px;cursor:pointer;transition:box-shadow 0.15s;opacity:0;transform:translateY(6px);animation:cardIn 0.35s ease forwards}
.exam-card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.06)}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}

.exam-card__top{padding:16px 20px;display:flex;align-items:center;gap:14px}
.exam-card__ring{width:48px;height:48px;flex:none;position:relative}
.exam-card__ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--fg)}
.exam-card__body{flex:1;min-width:0}
.exam-card__title{font-size:14px;font-weight:600;margin:0}
.exam-card__sub{font-size:12px;color:var(--fg-secondary);margin-top:2px}
.exam-card__countdown{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--blue);display:flex;align-items:center;gap:4px;flex:none}
.exam-card__arrow{flex:none;color:var(--fg-muted)}

.exam-card__bottom{padding:0 20px 14px;display:flex;align-items:center;justify-content:space-between}
.exam-card__stat{font-family:var(--font-mono);font-size:11px;color:var(--fg-secondary);display:flex;align-items:center;gap:4px}

.section-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;color:var(--fg-muted);margin-bottom:12px;margin-top:8px}
</style>
</head>
<body>

<div class="page">

  <div class="page-title">Upcoming exams</div>

  <div class="exam-card" style="animation-delay:0ms" id="exam1"></div>
  <div class="exam-card" style="animation-delay:80ms" id="exam2"></div>
  <div class="exam-card" style="animation-delay:160ms" id="exam3"></div>

</div>

<script>
var starIcon = '<svg width="10" height="10" viewBox="0 0 12 12" fill="#141414" style="vertical-align:-1px"><path d="M6 0.5L7.5 4.2L11.5 4.6L8.5 7.2L9.3 11.2L6 9.3L2.7 11.2L3.5 7.2L0.5 4.6L4.5 4.2Z"/></svg>';

function progressRing(mastered, total, size) {
  var pct = total > 0 ? mastered / total : 0;
  var r = (size - 6) / 2;
  var circ = 2 * Math.PI * r;
  var offset = circ * (1 - pct);
  var color = pct >= 1 ? '#27BD86' : pct > 0.5 ? '#27BD86' : pct > 0.25 ? '#FFCB45' : '#F03D3D';
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">' +
    '<circle cx="' + size/2 + '" cy="' + size/2 + '" r="' + r + '" fill="none" stroke="rgba(20,20,20,0.06)" stroke-width="3"/>' +
    '<circle cx="' + size/2 + '" cy="' + size/2 + '" r="' + r + '" fill="none" stroke="' + color + '" stroke-width="3" stroke-linecap="round" stroke-dasharray="' + circ.toFixed(1) + '" stroke-dashoffset="' + offset.toFixed(1) + '" transform="rotate(-90 ' + size/2 + ' ' + size/2 + ')"/>' +
    '</svg>';
}

function renderExamCard(id, opts) {
  var el = document.getElementById(id);
  var unresolved = opts.total - opts.mastered;
  el.innerHTML =
    '<div class="exam-card__top">' +
      '<div class="exam-card__ring">' +
        progressRing(opts.mastered, opts.total, 48) +
        '<div class="exam-card__ring-text">' + opts.mastered + '/' + opts.total + '</div>' +
      '</div>' +
      '<div class="exam-card__body">' +
        '<div class="exam-card__title">' + opts.name + '</div>' +
        '<div class="exam-card__sub">' + opts.date + '</div>' +
      '</div>' +
      '<div class="exam-card__countdown">' +
        '<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M8 4.5V8l2.5 1.5"/></svg>' +
        opts.days + 'd' +
      '</div>' +
      '<div class="exam-card__arrow"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 3l5 5-5 5"/></svg></div>' +
    '</div>' +
    '<div class="exam-card__bottom">' +
      '<div class="exam-card__stat">' + starIcon + ' ' + opts.mastered + ' mastered</div>' +
      (unresolved > 0
        ? '<div class="exam-card__stat" style="color:var(--fg)">' + unresolved + ' unresolved</div>'
        : '<div class="exam-card__stat" style="color:var(--green)">All mastered</div>') +
    '</div>';
}

// 5 topics, 2 mastered
renderExamCard('exam1', {
  name: 'Qudrat — Quantitative',
  date: 'Sunday 29 April · 9:00 AM',
  days: 5,
  total: 5,
  mastered: 2
});

// 3 topics, 2 mastered (verbal)
renderExamCard('exam2', {
  name: 'Qudrat — Verbal',
  date: 'Tuesday 1 May · 9:00 AM',
  days: 7,
  total: 3,
  mastered: 2
});

// Many topics example — scales fine
renderExamCard('exam3', {
  name: 'GAT — General Aptitude',
  date: 'Thursday 15 May · 2:00 PM',
  days: 21,
  total: 42,
  mastered: 28
});
</script>
</body>
</html>
