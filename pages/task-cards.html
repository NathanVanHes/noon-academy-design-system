<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Task Cards - Noon Academy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
*{box-sizing:border-box}
:root{
  --bg:#F8F5EF;
  --bg-raised:#FFFFFF;
  --bg-disabled:#EDEAE3;
  --fg:#141414;
  --fg-secondary:#74716C;
  --fg-muted:#BBB8B1;
  --green:#27BD86;
  --gold:#FFCB45;
  --red:#F03D3D;
  --btn:#64D8AE;
  --blue:#0084FF;
  --font-sans:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono','Inter',monospace;
  --r:8px;
}
body{background:var(--bg);margin:0;font-family:var(--font-sans);color:var(--fg);min-height:100vh}

.page{max-width:480px;margin:0 auto;padding:32px 24px}
.page-title{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;color:var(--fg-secondary);margin-bottom:16px}

/* Practice card */
.practice-card{background:var(--bg-raised);border-radius:var(--r);overflow:hidden;margin-bottom:16px;opacity:0;transform:translateY(6px);animation:cardIn 0.35s ease forwards}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}
.practice-card__header{padding:16px 20px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.practice-card__type{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;font-weight:600;color:var(--fg-muted)}
.practice-card__title{font-size:15px;font-weight:600;margin:4px 0 0}
.practice-card__due{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);flex:none;margin-top:2px}
.practice-card__due.is-urgent{color:var(--red)}

/* Topic row inside card */
.practice-card__topics{padding:0 20px 14px;display:flex;flex-direction:column;gap:8px}
.topic-row{display:flex;align-items:center;gap:10px}
.topic-row__tile{width:32px;height:32px;border-radius:5px;flex:none;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.topic-row__tile-score{font-family:var(--font-mono);font-size:10px;font-weight:700;color:rgba(0,0,0,0.3)}
.topic-row__tile.is-mastered::before{content:'';position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0.15;background:repeating-linear-gradient(135deg,transparent,transparent 4px,rgba(0,0,0,0.4) 4px,rgba(0,0,0,0.4) 5px)}
.topic-row__tile.is-mastered::after{content:'';position:absolute;inset:0;background:var(--bg);opacity:0.5;border-radius:inherit}
.topic-row__tile.is-mastered .topic-row__tile-score{display:none}
.topic-row__star{position:relative;z-index:2}
.topic-row__info{flex:1;min-width:0}
.topic-row__name{font-size:13px;font-weight:500;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topic-row__sub{font-size:11px;color:var(--fg-secondary);font-family:var(--font-mono);margin-top:1px;display:flex;align-items:center;gap:3px}

/* CTA */
.practice-card__cta{padding:0 20px 16px}
.btn-start{display:block;width:100%;height:40px;background:var(--btn);color:var(--fg);border:0;border-radius:var(--r);font:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:opacity 0.15s}
.btn-start:hover{opacity:0.9}

/* Done state */
.practice-card.is-done{opacity:0.7}
.practice-card.is-done .btn-start{background:var(--bg-disabled);color:var(--fg-muted);cursor:default}

/* Roundup card */
.roundup-card{background:var(--bg-raised);border-radius:var(--r);overflow:hidden;margin-bottom:16px;cursor:pointer;transition:box-shadow 0.15s;opacity:0;transform:translateY(6px);animation:cardIn 0.35s ease forwards}
.roundup-card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.roundup-card__inner{padding:16px 20px;display:flex;align-items:center;gap:16px}
.roundup-card__countdown{text-align:center;min-width:44px;flex:none}
.roundup-card__days{font-family:var(--font-mono);font-size:28px;font-weight:700;color:var(--blue);line-height:1}
.roundup-card__unit{font-family:var(--font-mono);font-size:9px;color:var(--blue);text-transform:uppercase;letter-spacing:0.08em}
.roundup-card__body{flex:1;min-width:0}
.roundup-card__title{font-size:14px;font-weight:600;margin:0}
.roundup-card__sub{font-size:12px;color:var(--fg-secondary);margin-top:2px;display:flex;align-items:center;gap:4px}
.roundup-card__arrow{flex:none;color:var(--fg-muted)}
.roundup-card__tiles{padding:0 20px 14px;display:flex;gap:4px}
.roundup-card__tile{height:6px;border-radius:3px;flex:1;position:relative;overflow:hidden}
.roundup-card__tile.is-mastered::before{content:'';position:absolute;inset:0;background:var(--bg);opacity:0.5}

.divider{height:1px;background:rgba(20,20,20,0.06);margin:24px 0}
.section-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;color:var(--fg-muted);margin-bottom:12px;margin-top:8px}
</style>
</head>
<body>

<div class="page">

  <div class="page-title">Today's tasks</div>

  <!-- Single topic practice -->
  <div class="practice-card" style="animation-delay:0ms" id="card1"></div>

  <!-- Multi topic practice -->
  <div class="practice-card" style="animation-delay:80ms" id="card2"></div>

  <!-- Completed practice -->
  <div class="practice-card is-done" style="animation-delay:160ms" id="card3"></div>

  <div class="divider"></div>

  <div class="section-label">Upcoming exam</div>

  <!-- Exam roundup entry -->
  <div class="roundup-card" style="animation-delay:240ms" id="examCard"></div>

</div>

<script>
function scoreColor(s) {
  var t = Math.max(0, Math.min(100, s)) / 100;
  var r, g, b;
  if (t < 0.5) { var p = t / 0.5; r = 240+(255-240)*p; g = 61+(203-61)*p; b = 61+(69-61)*p; }
  else { var p = (t-0.5)/0.5; r = 255+(39-255)*p; g = 203+(189-203)*p; b = 69+(134-69)*p; }
  return 'rgb('+Math.round(r)+','+Math.round(g)+','+Math.round(b)+')';
}

var starSvg = '<svg width="12" height="12" viewBox="0 0 12 12" fill="rgba(0,0,0,0.3)" class="topic-row__star"><path d="M6 0.5L7.5 4.2L11.5 4.6L8.5 7.2L9.3 11.2L6 9.3L2.7 11.2L3.5 7.2L0.5 4.6L4.5 4.2Z"/></svg>';
var starInline = '<svg width="10" height="10" viewBox="0 0 12 12" fill="#141414" style="vertical-align:-1px"><path d="M6 0.5L7.5 4.2L11.5 4.6L8.5 7.2L9.3 11.2L6 9.3L2.7 11.2L3.5 7.2L0.5 4.6L4.5 4.2Z"/></svg>';
var mastery = 80;

function topicRow(name, score) {
  var mastered = score >= mastery;
  var gap = mastery - score;
  var col = scoreColor(score);
  var h = '<div class="topic-row">';
  if (mastered) {
    h += '<div class="topic-row__tile is-mastered" style="background:' + col + '">' + starSvg + '</div>';
    h += '<div class="topic-row__info"><div class="topic-row__name">' + name + '</div>';
    h += '<div class="topic-row__sub">' + starInline + ' Mastered</div></div>';
  } else {
    h += '<div class="topic-row__tile" style="background:' + col + '"><span class="topic-row__tile-score">' + score + '</span></div>';
    h += '<div class="topic-row__info"><div class="topic-row__name">' + name + '</div>';
    h += '<div class="topic-row__sub">Reach ' + starInline + ' 80+ (' + gap + ' remaining)</div></div>';
  }
  h += '</div>';
  return h;
}

// Card 1 — single topic
document.getElementById('card1').innerHTML =
  '<div class="practice-card__header"><div><div class="practice-card__type">Practice · Quantitative</div><div class="practice-card__title">Algebraic expressions</div></div><div class="practice-card__due">Due today</div></div>' +
  '<div class="practice-card__topics">' + topicRow('Algebraic expressions', 35) + '</div>' +
  '<div class="practice-card__cta"><button class="btn-start">Start practice</button></div>';

// Card 2 — multi topic
document.getElementById('card2').innerHTML =
  '<div class="practice-card__header"><div><div class="practice-card__type">Practice · Quantitative</div><div class="practice-card__title">Mixed practice</div></div><div class="practice-card__due is-urgent">Due tomorrow</div></div>' +
  '<div class="practice-card__topics">' +
    topicRow('Ratios', 58) +
    topicRow('Geometry', 42) +
    topicRow('Data analysis', 94) +
  '</div>' +
  '<div class="practice-card__cta"><button class="btn-start">Start practice</button></div>';

// Card 3 — completed
document.getElementById('card3').innerHTML =
  '<div class="practice-card__header"><div><div class="practice-card__type">Practice · Done</div><div class="practice-card__title">Number theory</div></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--green)">+8 this session</div></div>' +
  '<div class="practice-card__topics">' + topicRow('Number theory', 73) + '</div>' +
  '<div class="practice-card__cta"><button class="btn-start">Completed</button></div>';

// Exam roundup entry card
var examTopics = [
  { name: 'Data analysis', score: 94 },
  { name: 'Ratios', score: 85 },
  { name: 'Number theory', score: 76 },
  { name: 'Algebraic expressions', score: 35 },
  { name: 'Geometry basics', score: 18 },
];
var masteredN = examTopics.filter(function(t){ return t.score >= mastery; }).length;
var unresolved = examTopics.length - masteredN;

var tilesHtml = '<div class="roundup-card__tiles">';
examTopics.forEach(function(t) {
  var m = t.score >= mastery;
  tilesHtml += '<div class="roundup-card__tile' + (m ? ' is-mastered' : '') + '" style="background:' + scoreColor(t.score) + '"></div>';
});
tilesHtml += '</div>';

document.getElementById('examCard').innerHTML =
  '<div class="roundup-card__inner">' +
    '<div class="roundup-card__countdown"><div class="roundup-card__days">5</div><div class="roundup-card__unit">days</div></div>' +
    '<div class="roundup-card__body">' +
      '<div class="roundup-card__title">Qudrat — Quantitative</div>' +
      '<div class="roundup-card__sub">' + unresolved + ' unresolved · ' + starInline + ' ' + masteredN + ' mastered</div>' +
    '</div>' +
    '<div class="roundup-card__arrow"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 3l5 5-5 5"/></svg></div>' +
  '</div>' + tilesHtml;
</script>
</body>
</html>
