<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Exam Roundup - Noon Academy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
*{box-sizing:border-box}
:root{
  --bg:#F8F5EF;
  --bg-raised:#FFFFFF;
  --bg-disabled:#EDEAE3;
  --fg:#141414;
  --fg-secondary:#74716C;
  --fg-muted:#BBB8B1;
  --green:#27BD86;
  --gold:#FFCB45;
  --red:#F03D3D;
  --btn:#64D8AE;
  --blue:#0084FF;
  --font-sans:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono','Inter',monospace;
  --r:8px;
}
body{background:var(--bg);margin:0;font-family:var(--font-sans);color:var(--fg);min-height:100vh}

.topbar{background:var(--bg-raised);border-bottom:1px solid rgba(20,20,20,0.08);position:sticky;top:0;z-index:10}
.topbar__inner{max-width:720px;margin:0 auto;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:64px}
.topbar h1{font-size:20px;font-weight:700;margin:0}

.page{max-width:720px;margin:0 auto;padding:32px 40px}


/* Topic row */
.topic{background:var(--bg-raised);border-radius:var(--r);margin-bottom:10px;padding:16px 20px;display:flex;align-items:center;gap:16px;opacity:0;transform:translateY(6px);animation:rowIn 0.3s ease forwards}
@keyframes rowIn{to{opacity:1;transform:translateY(0)}}
.topic:hover{box-shadow:0 2px 8px rgba(0,0,0,0.04)}


/* Info */
.topic__info{flex:1;min-width:0}
.topic__name{font-size:14px;font-weight:600;margin:0}
.topic__chapter{font-size:12px;color:var(--fg-muted);margin-top:1px}

/* Gap bar — filled gradient up to score, grey remainder */
.topic__gap{flex:none;width:160px}
.topic__track{position:relative;height:8px;border-radius:4px;background:var(--bg-disabled);margin-bottom:4px;overflow:hidden}
.topic__fill{height:100%;border-radius:4px 0 0 4px;background:linear-gradient(90deg,#F03D3D,#FFCB45,#27BD86);background-size:160px 100%;transition:width 0.6s ease}
.topic__marker{position:absolute;left:80%;top:-2px;width:2px;height:12px;background:var(--fg-secondary);border-radius:1px;transform:translateX(-50%);z-index:1}
.topic__bar-label{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:9px;color:var(--fg-muted);position:relative}
.topic__bar-label .at80{position:absolute;left:80%;transform:translateX(-50%)}

/* Action */
.topic__action{flex:none}
.btn-go{height:34px;padding:0 16px;background:var(--btn);color:var(--fg);border:0;border-radius:var(--r);font:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:opacity 0.15s}
.btn-go:hover{opacity:0.9}

/* Mastered row */
.topic.is-mastered{opacity:0;animation:rowIn 0.3s ease forwards}

/* Star */
.star-svg{flex:none}

/* Mastered badge */
.mastered-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--fg-secondary);background:rgba(39,189,134,0.08);padding:4px 10px;border-radius:20px}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar__inner">
    <h1>Exam Roundup</h1>
    <span style="font-family:var(--font-mono);font-size:12px;color:var(--fg-secondary)">Exam name</span>
  </div>
</div>

<div class="page">
  <!-- Header block -->
  <div style="background:var(--bg-raised);border-radius:var(--r);padding:20px 24px;margin-bottom:24px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:16px;font-weight:700">Exam name</div>
      <span style="font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--blue)">5 days</span>
    </div>
    <div style="font-size:12px;color:var(--fg-secondary);margin-bottom:16px">Reach <svg width="8" height="8" viewBox="0 0 12 12" fill="var(--fg-secondary)" style="vertical-align:-1px"><path d="M6 0.5L7.5 4.2L11.5 4.6L8.5 7.2L9.3 11.2L6 9.3L2.7 11.2L3.5 7.2L0.5 4.6L4.5 4.2Z"/></svg> 80 before the exam</div>
    <div style="display:flex;gap:12px">
      <div style="flex:1;background:rgba(39,189,134,0.06);border-radius:6px;padding:12px;text-align:center">
        <div style="font-family:var(--font-mono);font-size:24px;font-weight:700;color:var(--green)">1</div>
        <div style="font-size:11px;color:var(--fg-secondary);display:flex;align-items:center;justify-content:center;gap:3px;margin-top:2px"><svg width="8" height="8" viewBox="0 0 12 12" fill="var(--fg-secondary)"><path d="M6 0.5L7.5 4.2L11.5 4.6L8.5 7.2L9.3 11.2L6 9.3L2.7 11.2L3.5 7.2L0.5 4.6L4.5 4.2Z"/></svg> Mastered</div>
      </div>
      <div style="flex:1;background:rgba(20,20,20,0.03);border-radius:6px;padding:12px;text-align:center">
        <div style="font-family:var(--font-mono);font-size:24px;font-weight:700;color:var(--fg)">2</div>
        <div style="font-size:11px;color:var(--fg-secondary);margin-top:2px">Remaining</div>
      </div>
    </div>
  </div>

  <div id="topics"></div>
</div>

<script>
var topics = [
  { name: 'Topic name', chapter: 'Chapter name', score: 18 },
  { name: 'Topic name', chapter: 'Chapter name', score: 76 },
  { name: 'Topic name', chapter: 'Chapter name', score: 94 },
];

function scoreColor(s) {
  var t = Math.max(0, Math.min(100, s)) / 100;
  var r, g, b;
  if (t < 0.5) {
    var p = t / 0.5;
    r = 240 + (255-240)*p; g = 61 + (203-61)*p; b = 61 + (69-61)*p;
  } else {
    var p = (t - 0.5) / 0.5;
    r = 255 + (39-255)*p; g = 203 + (189-203)*p; b = 69 + (134-69)*p;
  }
  return 'rgb('+Math.round(r)+','+Math.round(g)+','+Math.round(b)+')';
}

// Sort: lowest first
topics.sort(function(a,b){ return a.score - b.score; });

var container = document.getElementById('topics');
var html = '';

topics.forEach(function(t, i) {
  var col = scoreColor(t.score);
  var mastered = t.score >= 80;
  var gap = Math.max(0, 80 - t.score);
  var pct = Math.min(t.score, 100);
  var delay = i * 80;

  html += '<div class="topic' + (mastered ? ' is-mastered' : '') + '" style="animation-delay:' + delay + 'ms">';

  // Score number
  if (mastered) {
    html += '<div style="min-width:48px;text-align:center;flex:none"><div style="font-family:var(--font-mono);font-size:24px;font-weight:700;color:' + col + '">' + t.score + '</div><div style="font-size:9px;color:var(--fg-muted)">5 days until exam</div></div>';
  } else {
    html += '<div style="min-width:48px;text-align:center;flex:none"><span style="font-family:var(--font-mono);font-size:24px;font-weight:700;color:' + col + '">' + t.score + '</span></div>';
  }

  // Info
  html += '<div class="topic__info"><div class="topic__name">' + t.name + '</div><div class="topic__chapter">' + t.chapter + '</div></div>';

  if (mastered) {
    html += '<div class="mastered-badge"><svg width="12" height="12" viewBox="0 0 12 12" fill="#141414" class="star-svg"><path d="M6 0.5L7.5 4.2L11.5 4.6L8.5 7.2L9.3 11.2L6 9.3L2.7 11.2L3.5 7.2L0.5 4.6L4.5 4.2Z"/></svg> Mastered</div>';
  } else {
    // Gradient fill bar with 80 marker
    html += '<div class="topic__gap">';
    html += '<div class="topic__track"><div class="topic__fill" style="width:0%" data-target="' + pct + '" data-delay="' + (delay + 300) + '"></div><div class="topic__marker"></div></div>';
    html += '<div class="topic__bar-label"><span>' + t.score + '</span><span class="at80"><svg width="6" height="6" viewBox="0 0 12 12" fill="var(--fg-secondary)"><path d="M6 0.5L7.5 4.2L11.5 4.6L8.5 7.2L9.3 11.2L6 9.3L2.7 11.2L3.5 7.2L0.5 4.6L4.5 4.2Z"/></svg> 80</span><span>100</span></div>';
    html += '</div>';

    // Practice button
    html += '<div class="topic__action"><button class="btn-go">Practice</button></div>';
  }

  html += '</div>';
});

container.innerHTML = html;

// Animate fills
document.querySelectorAll('.topic__fill').forEach(function(bar) {
  var target = parseInt(bar.dataset.target);
  var delay = parseInt(bar.dataset.delay);
  setTimeout(function() {
    bar.style.width = target + '%';
  }, delay);
});

</script>
</body>
</html>
