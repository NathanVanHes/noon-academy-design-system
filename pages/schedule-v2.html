<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Schedule - Proven Routes</title>
<link rel="stylesheet" href="../project/tokens.css">
<link rel="stylesheet" href="../project/components.css">
<style>
/* Mobile frame */
.frame {
  width: 375px;
  height: 812px;
  margin: 40px auto;
  background: var(--bg);
  border-radius: 40px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 0 8px var(--void-100), 0 40px 80px -20px rgba(0,0,0,0.6);
  position: relative;
}

/* Status bar */
.status-bar {
  height: 44px;
  padding: 0 var(--sp-6);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: var(--fs-12);
  color: var(--fg-muted);
  flex: none;
}


/* Calendar wrapper */
.cal-wrap {
  padding: var(--sp-3) var(--sp-4) 0;
  flex: none;
}

/* Overdue bar */
.overdue-bar {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-6);
  background: var(--danger-soft);
  border-block-end: 1px solid var(--danger-border);
  flex: none;
  font-size: var(--fs-13);
  color: var(--danger-300);
}

/* Section header */
.section-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--sp-4) var(--sp-6) var(--sp-3);
}
.section-hdr__label {
  font-size: var(--fs-12);
  letter-spacing: var(--tr-caps);
  text-transform: uppercase;
  font-weight: var(--fw-600);
  color: var(--fg-faint);
}
.section-hdr__count {
  font-family: var(--font-mono);
  font-size: var(--fs-11);
  color: var(--fg-faint);
}

/* Session list */
.session-list {
  display: flex;
  flex-direction: column;
  gap: var(--sp-2);
  padding: 0 var(--sp-4);
}
.session-list .session {
  border-radius: var(--r-2);
}

/* Scrollable content */
.content { flex: 1; overflow-y: auto; }
.tabbar { flex: none; }

/* Bottom nav */
.safe-bottom { height: 22px; flex: none; }

/* Bottom sheet overlay */
.sheet-overlay {
  position: absolute;
  inset: 0;
  z-index: 50;
  pointer-events: none;
}
.sheet-overlay.is-open { pointer-events: auto; }
.sheet-scrim {
  position: absolute;
  inset: 0;
  background: rgba(6,9,19,0.5);
  opacity: 0;
  transition: opacity 0.25s ease;
  border-radius: inherit;
}
.sheet-overlay.is-open .sheet-scrim { opacity: 1; }
.sheet-panel {
  position: absolute;
  inset-inline: 0;
  bottom: 0;
  background: var(--bg-overlay);
  border-radius: var(--r-4) var(--r-4) 0 0;
  box-shadow: var(--z-4);
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.22,0.61,0.36,1);
  display: flex;
  flex-direction: column;
}
.sheet-overlay.is-open .sheet-panel { transform: translateY(0); }
</style>
</head>
<body>

<div class="frame" id="frame">
  <!-- Status bar -->
  <div class="status-bar">
    <span>9:41</span>
    <span style="display:flex;gap:6px;align-items:center">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity="0.3"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity="0.5"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity="0.7"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="22" height="12" viewBox="0 0 22 12" fill="none" stroke="currentColor" stroke-width="1"><rect x="0.5" y="0.5" width="18" height="11" rx="2"/><rect x="19" y="3.5" width="2" height="5" rx="0.5" fill="currentColor"/><rect x="2" y="2" width="12" height="8" rx="1" fill="currentColor" stroke="none"/></svg>
    </span>
  </div>

  <!-- Calendar (includes header) -->
  <div class="cal-wrap">
    <div id="calRoot"></div>
  </div>

  <!-- Overdue -->
  <div class="overdue-bar" id="overdue" style="display:none">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" style="flex:none"><circle cx="7" cy="7" r="5.5"/><path d="M7 4.5v3M7 9v0"/></svg>
    <span style="font-weight:var(--fw-600)">3</span>
    <span>overdue assignments</span>
  </div>

  <!-- Content -->
  <div class="content" id="content"></div>

  <!-- Bottom nav -->
  <div class="tabbar">
    <button class="tabbar__item"><svg class="tabbar__icon" viewBox="0 0 22 22"><circle cx="11" cy="11" r="8"/><path d="M8 11h6M11 8v6"/></svg>Atlas</button>
    <button class="tabbar__item"><svg class="tabbar__icon" viewBox="0 0 22 22"><path d="M4 6h14M4 11h14M4 16h10"/></svg>Routes</button>
    <button class="tabbar__item is-on"><svg class="tabbar__icon" viewBox="0 0 22 22"><rect x="4" y="4" width="14" height="14" rx="2"/><path d="M4 9h14"/></svg>Schedule</button>
    <button class="tabbar__item"><svg class="tabbar__icon" viewBox="0 0 22 22"><circle cx="8" cy="9" r="3.5"/><circle cx="16" cy="9" r="3.5"/><path d="M2 19c0-3 3-5.5 6-5.5s6 2.5 6 5.5"/></svg>Crew</button>
    <button class="tabbar__item"><svg class="tabbar__icon" viewBox="0 0 22 22"><circle cx="11" cy="8" r="4"/><path d="M4 19c0-3.3 3.1-6 7-6s7 2.7 7 6"/></svg>Profile</button>
  </div>
  <div class="safe-bottom"></div>

  <!-- Bottom sheet -->
  <div class="sheet-overlay" id="sheetOverlay">
    <div class="sheet-scrim" id="sheetScrim"></div>
    <div class="sheet-panel" id="sheetPanel">
      <div class="sheet__handle"><div style="width:24px;height:3px;border-radius:2px;background:var(--fg-faint);opacity:0.3;margin:var(--sp-3) auto"></div></div>
      <div class="sheet__header" style="padding:0 var(--sp-6) var(--sp-4)"><h3 class="sheet__title" id="sheetTitle"></h3></div>
      <div class="sheet__body" id="sheetBody" style="padding:0 var(--sp-6) var(--sp-8)"></div>
      <div class="sheet__actions" id="sheetActions" style="padding:var(--sp-4) var(--sp-6);border-top:1px solid var(--border)"></div>
    </div>
  </div>
</div>

<script>
var DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var FULL_DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var now = new Date();
var selectedDate = new Date(now);

// Sessions data
var sessions = {
  today: [
    { time: '8:30 - 9:15', name: 'Storytelling', subject: 'Digital Media', teacher: 'Ms. Al-Harbi', state: 'done', room: 'Room 1B', duration: '45 min' },
    { time: '10:00 - 10:45', name: 'Inference & implied meaning', subject: 'Qudrat Reading', teacher: 'Mr. Hassan', state: 'live', room: 'Room 3A', duration: '45 min' },
    { time: '11:30 - 12:15', name: 'Quantitative reasoning', subject: 'Qudrat Math', teacher: 'Ms. Noor', state: 'soon', room: 'Room 2C', duration: '45 min' },
    { time: '13:00 - 13:45', name: 'Analogy patterns', subject: 'Qudrat Reading', teacher: 'Mr. Hassan', state: 'upcoming', room: 'Room 3A', duration: '45 min' },
    { time: '14:30 - 15:15', name: 'Crew discussion', subject: 'Facilitated', teacher: "Omar's crew", state: 'upcoming', room: 'Room 4D', duration: '45 min' },
  ],
  tomorrow: [
    { time: '8:30 - 9:15', name: 'Reading comprehension', subject: 'Qudrat Reading', teacher: 'Mr. Hassan', state: 'upcoming', room: 'Room 3A', duration: '45 min' },
    { time: '10:00 - 10:45', name: 'Geometry foundations', subject: 'Tahsili Math', teacher: 'Ms. Noor', state: 'upcoming', room: 'Room 2C', duration: '45 min' },
    { time: '13:00 - 13:45', name: 'Crew practice session', subject: 'Facilitated', teacher: "Omar's crew", state: 'upcoming', room: 'Room 4D', duration: '45 min' },
  ]
};

// Calendar
var viewMonth = now.getMonth();
var viewYear = now.getFullYear();
var isWeek = true;

function buildGrid(y, m) {
  var first = new Date(y, m, 1).getDay();
  var dim = new Date(y, m + 1, 0).getDate();
  var prevDim = new Date(y, m, 0).getDate();
  var days = [];
  for (var i = first - 1; i >= 0; i--) days.push({d: prevDim - i, m: m-1, out: true});
  for (var d = 1; d <= dim; d++) days.push({d: d, m: m, out: false});
  while (days.length % 7 !== 0) days.push({d: days.length - first - dim + 1, m: m+1, out: true});
  var weeks = [];
  for (var i = 0; i < days.length; i += 7) weeks.push(days.slice(i, i + 7));
  return weeks;
}

function isToday(d, m) { return d === now.getDate() && m === now.getMonth() && viewYear === now.getFullYear(); }
function isSelected(d, m) { return d === selectedDate.getDate() && m === selectedDate.getMonth() && viewYear === selectedDate.getFullYear(); }
function isTodaySelected() { return selectedDate.toDateString() === now.toDateString(); }

// Event counts
var evtCounts = {};
evtCounts[now.getDate()] = 5;
evtCounts[now.getDate() + 1] = 3;
evtCounts[now.getDate() - 1] = 2;
evtCounts[now.getDate() + 3] = 1;

function renderCal() {
  var root = document.getElementById('calRoot');
  var weeks = buildGrid(viewYear, viewMonth);
  var aw = 0;
  weeks.forEach(function(w, i) { if (w.some(function(d) { return !d.out && isSelected(d.d, d.m); })) aw = i; });

  var title = isWeek
    ? FULL_DAYS[selectedDate.getDay()] + ', ' + MONTHS[selectedDate.getMonth()] + ' ' + selectedDate.getDate()
    : MONTHS[viewMonth] + ' ' + viewYear;
  var header = DAY_NAMES.map(function(d) { return '<span class="cal__weekday">' + d + '</span>'; }).join('');
  var rows = weeks.map(function(week, wi) {
    var hide = isWeek && wi !== aw ? ' style="max-height:0;opacity:0;overflow:hidden"' : '';
    var cells = week.map(function(day) {
      var cls = ['cal__day'];
      if (day.out && !isWeek) cls.push('is-outside');
      if (isToday(day.d, day.m)) cls.push('is-today');
      if (isSelected(day.d, day.m)) cls.push('is-selected');
      var count = !day.out && evtCounts[day.d] ? evtCounts[day.d] : 0;
      var dots = count > 0 ? '<span class="cal__day-dots">' + Array(Math.min(count, 3)).fill('<span class="cal__day-dot"></span>').join('') + '</span>' : '';
      return '<button class="cal__day" data-day="' + day.d + '" data-month="' + day.m + '">' + day.d + dots + '</button>';
    }).join('');
    return '<div class="cal__week-row"' + hide + '>' + cells + '</div>';
  }).join('');

  var todayBtn = !isTodaySelected() ? '<button class="btn btn--ghost btn--sm cal__today-btn" style="font-size:var(--fs-11)">Today</button>' : '';

  root.innerHTML = '<div class="cal ' + (isWeek ? 'cal--week' : 'cal--month') + '">' +
    '<div class="cal__header"><h3 class="cal__month">' + title + '</h3><div class="cal__nav">' +
    todayBtn +
    '<button class="icon-btn icon-btn--ghost icon-btn--sm" data-action="prev"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 3L5 8l5 5"/></svg></button>' +
    '<button class="icon-btn icon-btn--ghost icon-btn--sm" data-action="next"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 3l5 5-5 5"/></svg></button>' +
    '</div></div>' +
    '<div class="cal__weekdays">' + header + '</div>' +
    '<div class="cal__days">' + rows + '</div>' +
    '<div class="cal__handle" data-action="toggle"><div class="cal__handle-bar"></div></div>' +
  '</div>';

  wireCal();
}

function wireCal() {
  var root = document.getElementById('calRoot');
  // Day clicks
  root.querySelectorAll('.cal__day').forEach(function(el) {
    el.addEventListener('click', function() {
      var m = parseInt(el.dataset.month);
      var d = parseInt(el.dataset.day);
      selectedDate = new Date(viewYear, m, d);
      viewMonth = selectedDate.getMonth();
      viewYear = selectedDate.getFullYear();
      renderCal();
      renderSessions();
    });
  });
  // Nav
  root.querySelectorAll('[data-action]').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      var action = el.dataset.action;
      if (action === 'prev') {
        if (isWeek) { selectedDate.setDate(selectedDate.getDate() - 1); viewMonth = selectedDate.getMonth(); viewYear = selectedDate.getFullYear(); }
        else { viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } }
      } else if (action === 'next') {
        if (isWeek) { selectedDate.setDate(selectedDate.getDate() + 1); viewMonth = selectedDate.getMonth(); viewYear = selectedDate.getFullYear(); }
        else { viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } }
      } else if (action === 'toggle') {
        isWeek = !isWeek;
      }
      renderCal();
      renderSessions();
    });
  });
  // Today
  var todayBtn = root.querySelector('.cal__today-btn');
  if (todayBtn) todayBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    selectedDate = new Date(now);
    viewMonth = now.getMonth(); viewYear = now.getFullYear();
    isWeek = true;
    renderCal();
    renderSessions();
  });
}

// Sessions
function renderSessions() {
  var content = document.getElementById('content');
  var isCurrentDay = selectedDate.toDateString() === now.toDateString();
  var isTomorrow = selectedDate.toDateString() === new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1).toDateString();

  var todaySessions = isCurrentDay ? sessions.today : isTomorrow ? sessions.tomorrow : [];
  var tomorrowSessions = isCurrentDay ? sessions.tomorrow : [];

  var html = '';

  if (todaySessions.length) {
    var label = isCurrentDay ? 'Today' : isTomorrow ? 'Tomorrow' : FULL_DAYS[selectedDate.getDay()];
    html += '<div class="section-hdr"><span class="section-hdr__label">' + label + '</span><span class="section-hdr__count">' + todaySessions.length + ' sessions</span></div>';
    html += '<div class="session-list">';
    todaySessions.forEach(function(s, i) {
      var statusLine = s.state === 'live' ? 'Live now' : s.state === 'soon' ? 'Starting soon' : s.state === 'done' ? 'Done' : s.time;
      html += '<div class="session session--' + s.state + '" data-idx="' + i + '" data-group="today" style="animation:fadeIn 0.25s ease ' + (i * 50) + 'ms both">';
      html += '<div class="session__indicator"></div>';
      html += '<div class="session__body">';
      html += '<div class="session__status-line">' + statusLine + '</div>';
      html += '<div class="session__title">' + s.name + '</div>';
      html += '<div class="session__meta">' + s.subject + '</div>';
      html += '</div></div>';
    });
    html += '</div>';
  }

  if (tomorrowSessions.length) {
    html += '<div class="section-hdr" style="margin-top:var(--sp-3)"><span class="section-hdr__label">Tomorrow</span><span class="section-hdr__count">' + tomorrowSessions.length + ' sessions</span></div>';
    html += '<div class="session-list">';
    tomorrowSessions.forEach(function(s, i) {
      html += '<div class="session session--upcoming" data-idx="' + i + '" data-group="tomorrow" style="animation:fadeIn 0.25s ease ' + ((todaySessions.length + i) * 50) + 'ms both">';
      html += '<div class="session__indicator"></div>';
      html += '<div class="session__body">';
      html += '<div class="session__status-line">' + s.time + '</div>';
      html += '<div class="session__title">' + s.name + '</div>';
      html += '<div class="session__meta">' + s.subject + '</div>';
      html += '</div></div>';
    });
    html += '</div>';
  }

  if (!todaySessions.length && !tomorrowSessions.length) {
    html += '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--sp-10) var(--sp-6);text-align:center;color:var(--fg-faint)">';
    html += '<div style="font-size:var(--fs-14)">No sessions scheduled</div>';
    html += '</div>';
  }

  content.innerHTML = '<style>@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}</style>' + html;

  // Wire session clicks
  content.querySelectorAll('.session').forEach(function(el) {
    el.addEventListener('click', function() {
      var group = el.dataset.group;
      var idx = parseInt(el.dataset.idx);
      var s = group === 'today' ? (selectedDate.toDateString() === now.toDateString() ? sessions.today : sessions.tomorrow)[idx] : sessions.tomorrow[idx];
      openSheet(s);
    });
  });

  // Show overdue only on today
  document.getElementById('overdue').style.display = isCurrentDay ? 'flex' : 'none';

  // Scroll to live or next upcoming session
  setTimeout(function() {
    var live = content.querySelector('.session--live') || content.querySelector('.session--soon') || content.querySelector('.session--upcoming');
    if (live) live.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

// Bottom sheet
function openSheet(s) {
  document.getElementById('sheetTitle').textContent = s.name;

  var isLive = s.state === 'live';
  var isDone = s.state === 'done';

  var body = '<div style="font-size:var(--fs-12);color:var(--fg-subtle);margin-bottom:var(--sp-4)">' + s.subject + ' - ' + s.teacher + '</div>';
  body += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3)">';
  body += '<div><div class="caps" style="margin-bottom:4px">Time</div><div style="font-family:var(--font-mono);font-size:var(--fs-14);color:var(--fg)">' + s.time + '</div></div>';
  body += '<div><div class="caps" style="margin-bottom:4px">Duration</div><div style="font-family:var(--font-mono);font-size:var(--fs-14);color:var(--fg)">' + s.duration + '</div></div>';
  body += '<div><div class="caps" style="margin-bottom:4px">Status</div><div style="font-size:var(--fs-14);color:' + (isLive ? 'var(--accent)' : 'var(--fg)') + ';font-weight:var(--fw-500)">' + (isLive ? 'Live now' : isDone ? 'Completed' : 'Upcoming') + '</div></div>';
  body += '<div><div class="caps" style="margin-bottom:4px">Room</div><div style="font-family:var(--font-mono);font-size:var(--fs-14);color:var(--fg)">' + s.room + '</div></div>';
  body += '</div>';
  document.getElementById('sheetBody').innerHTML = body;

  var actions = '';
  if (isDone) {
    actions = '<button class="btn btn--secondary btn--block">Watch recording</button>';
  } else if (isLive) {
    actions = '<button class="btn btn--primary btn--block">Join class</button>';
  } else {
    actions = '<button class="btn btn--primary btn--block">Join when live</button>';
  }
  document.getElementById('sheetActions').innerHTML = actions;

  document.getElementById('sheetOverlay').classList.add('is-open');
}

function closeSheet() {
  document.getElementById('sheetOverlay').classList.remove('is-open');
}
document.getElementById('sheetScrim').addEventListener('click', closeSheet);
document.querySelector('.sheet__handle').addEventListener('click', closeSheet);

// Init
renderCal();
renderSessions();
</script>
</body>
</html>
