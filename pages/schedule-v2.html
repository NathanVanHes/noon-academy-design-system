<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Schedule - Proven Routes</title>
<link rel="stylesheet" href="../project/tokens.css">
<link rel="stylesheet" href="../project/components.css">
<style>
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-sans);min-height:100vh;display:flex;flex-direction:column}

/* Sticky top: calendar */
.cal-strip{background:var(--bg-overlay);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.cal-strip__inner{max-width:480px;margin:0 auto;padding:var(--sp-3) var(--sp-4) 0}

/* Overdue bar */
.overdue-bar{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-3) var(--sp-5);background:var(--danger-soft);border-bottom:1px solid var(--danger-border);font-size:var(--fs-13);color:var(--danger-300)}
.overdue-bar__inner{max-width:480px;margin:0 auto;width:100%}

/* Main content */
.main{flex:1;max-width:480px;margin:0 auto;width:100%;padding:0 0 var(--sp-8)}

/* Section header */
.section-hdr{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-5) var(--sp-4) var(--sp-3)}
.section-hdr__label{font-size:var(--fs-12);letter-spacing:var(--tr-caps);text-transform:uppercase;font-weight:var(--fw-600);color:var(--fg-faint)}
.section-hdr__count{font-family:var(--font-mono);font-size:var(--fs-11);color:var(--fg-faint)}

/* Session list */
.session-list{padding:0}

/* Bottom nav */
.nav-bar{position:sticky;bottom:0;z-index:10;background:var(--bg-overlay);border-top:1px solid var(--border)}
.nav-bar .tabbar{max-width:480px;margin:0 auto}

/* Sheet overlay */
.sheet-overlay{position:fixed;inset:0;z-index:50;pointer-events:none}
.sheet-overlay.is-open{pointer-events:auto}
.sheet-scrim{position:absolute;inset:0;background:rgba(6,9,19,0.5);opacity:0;transition:opacity 0.25s}
.sheet-overlay.is-open .sheet-scrim{opacity:1}
.sheet-panel{position:absolute;inset-inline:0;bottom:0;max-width:480px;margin:0 auto;background:var(--bg-overlay);border-radius:var(--r-4) var(--r-4) 0 0;box-shadow:var(--z-4);transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.22,0.61,0.36,1);display:flex;flex-direction:column}
.sheet-overlay.is-open .sheet-panel{transform:translateY(0)}

/* Responsive */
@media(max-width:480px){
  .cal-strip__inner,.main,.sheet-panel,.nav-bar .tabbar{padding-inline:var(--sp-3)}
  .session-list{padding:0 var(--sp-3)}
  .section-hdr{padding-inline:var(--sp-3)}
}

/* Fade in */
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- Sticky calendar -->
<div class="cal-strip">
  <div class="cal-strip__inner" id="calRoot"></div>
</div>

<!-- Overdue (today only) -->
<div class="overdue-bar" id="overdue">
  <div class="overdue-bar__inner" style="display:flex;align-items:center;gap:var(--sp-3)">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" style="flex:none"><circle cx="7" cy="7" r="5.5"/><path d="M7 4.5v3M7 9v0"/></svg>
    <span style="font-weight:var(--fw-600)">3</span>
    <span>overdue assignments</span>
  </div>
</div>

<!-- Sessions -->
<div class="main" id="content"></div>

<!-- Bottom nav -->
<div class="nav-bar">
  <div class="tabbar">
    <button class="tabbar__item"><svg class="tabbar__icon" viewBox="0 0 22 22"><circle cx="11" cy="11" r="8"/><path d="M8 11h6M11 8v6"/></svg>Atlas</button>
    <button class="tabbar__item"><svg class="tabbar__icon" viewBox="0 0 22 22"><path d="M4 6h14M4 11h14M4 16h10"/></svg>Routes</button>
    <button class="tabbar__item is-on"><svg class="tabbar__icon" viewBox="0 0 22 22"><rect x="4" y="4" width="14" height="14" rx="2"/><path d="M4 9h14"/></svg>Schedule</button>
    <button class="tabbar__item"><svg class="tabbar__icon" viewBox="0 0 22 22"><circle cx="8" cy="9" r="3.5"/><circle cx="16" cy="9" r="3.5"/><path d="M2 19c0-3 3-5.5 6-5.5s6 2.5 6 5.5"/></svg>Crew</button>
    <button class="tabbar__item"><svg class="tabbar__icon" viewBox="0 0 22 22"><circle cx="11" cy="8" r="4"/><path d="M4 19c0-3.3 3.1-6 7-6s7 2.7 7 6"/></svg>Profile</button>
  </div>
</div>

<!-- Bottom sheet -->
<div class="sheet-overlay" id="sheetOverlay">
  <div class="sheet-scrim" id="sheetScrim"></div>
  <div class="sheet-panel" id="sheetPanel">
    <div style="display:flex;justify-content:center;padding:var(--sp-3) 0"><div style="width:24px;height:3px;border-radius:2px;background:var(--fg-faint);opacity:0.3"></div></div>
    <div style="padding:0 var(--sp-6) var(--sp-4)"><h3 id="sheetTitle" style="font-family:var(--font-serif);font-size:var(--fs-18);font-weight:var(--fw-500);color:var(--fg);margin:0"></h3></div>
    <div id="sheetBody" style="padding:0 var(--sp-6) var(--sp-8)"></div>
    <div id="sheetActions" style="padding:var(--sp-4) var(--sp-6);border-top:1px solid var(--border)"></div>
  </div>
</div>

<script>
var DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var FULL_DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var now = new Date();
var selectedDate = new Date(now);

var sessions = {
  today: [
    { time:'8:30 - 9:15', name:'Storytelling', subject:'Digital Media', teacher:'Ms. Al-Harbi', state:'done', room:'Room 1B', duration:'45 min' },
    { time:'10:00 - 10:45', name:'Inference & implied meaning', subject:'Qudrat Reading', teacher:'Mr. Hassan', state:'live', room:'Room 3A', duration:'45 min' },
    { time:'11:30 - 12:15', name:'Quantitative reasoning', subject:'Qudrat Math', teacher:'Ms. Noor', state:'soon', room:'Room 2C', duration:'45 min' },
    { time:'13:00 - 13:45', name:'Analogy patterns', subject:'Qudrat Reading', teacher:'Mr. Hassan', state:'upcoming', room:'Room 3A', duration:'45 min' },
    { time:'14:30 - 15:15', name:'Crew discussion', subject:'Facilitated', teacher:"Omar's crew", state:'upcoming', room:'Room 4D', duration:'45 min' },
  ],
  yesterday: [
    { time:'8:30 - 9:15', name:'Vocabulary building', subject:'Qudrat Reading', teacher:'Mr. Hassan', state:'done', room:'Room 3A', duration:'45 min' },
    { time:'10:00 - 10:45', name:'Algebra foundations', subject:'Qudrat Math', teacher:'Ms. Noor', state:'done', room:'Room 2C', duration:'45 min' },
  ],
  tomorrow: [
    { time:'8:30 - 9:15', name:'Reading comprehension', subject:'Qudrat Reading', teacher:'Mr. Hassan', state:'upcoming', room:'Room 3A', duration:'45 min' },
    { time:'10:00 - 10:45', name:'Geometry foundations', subject:'Tahsili Math', teacher:'Ms. Noor', state:'upcoming', room:'Room 2C', duration:'45 min' },
    { time:'13:00 - 13:45', name:'Crew practice session', subject:'Facilitated', teacher:"Omar's crew", state:'upcoming', room:'Room 4D', duration:'45 min' },
  ],
  other: [
    { time:'9:00 - 9:45', name:'Grammar review', subject:'Qudrat Reading', teacher:'Mr. Hassan', state:'upcoming', room:'Room 3A', duration:'45 min' },
    { time:'11:00 - 11:45', name:'Statistics intro', subject:'Qudrat Math', teacher:'Ms. Noor', state:'upcoming', room:'Room 2C', duration:'45 min' },
  ]
};

// Calendar state
var viewMonth = now.getMonth(), viewYear = now.getFullYear(), isWeek = true;

function buildGrid(y, m) {
  var first = new Date(y, m, 1).getDay(), dim = new Date(y, m+1, 0).getDate(), prevDim = new Date(y, m, 0).getDate();
  var days = [];
  for (var i = first-1; i >= 0; i--) days.push({d:prevDim-i, m:m-1, out:true});
  for (var d = 1; d <= dim; d++) days.push({d:d, m:m, out:false});
  while (days.length % 7 !== 0) days.push({d:days.length-first-dim+1, m:m+1, out:true});
  var weeks = [];
  for (var i = 0; i < days.length; i += 7) weeks.push(days.slice(i, i+7));
  return weeks;
}

function isToday(d,m){return d===now.getDate()&&m===now.getMonth()&&viewYear===now.getFullYear()}
function isSelected(d,m){return d===selectedDate.getDate()&&m===selectedDate.getMonth()&&viewYear===selectedDate.getFullYear()}
function isTodaySelected(){return selectedDate.toDateString()===now.toDateString()}

var evtCounts = {};
evtCounts[now.getDate()] = 5;
evtCounts[now.getDate()+1] = 3;
evtCounts[now.getDate()-1] = 2;
evtCounts[now.getDate()+3] = 1;

function renderCal() {
  var root = document.getElementById('calRoot');
  var weeks = buildGrid(viewYear, viewMonth);
  var aw = 0;
  weeks.forEach(function(w,i){if(w.some(function(d){return !d.out&&isSelected(d.d,d.m)}))aw=i});

  var title = isWeek
    ? FULL_DAYS[selectedDate.getDay()] + ', ' + MONTHS[selectedDate.getMonth()] + ' ' + selectedDate.getDate()
    : MONTHS[viewMonth] + ' ' + viewYear;

  var header = DAY_NAMES.map(function(d){return '<span class="cal__weekday">'+d+'</span>'}).join('');
  var rows = weeks.map(function(week,wi){
    var hide = isWeek && wi!==aw ? ' style="max-height:0;opacity:0;overflow:hidden"' : '';
    var cells = week.map(function(day){
      var cls = ['cal__day'];
      if(day.out&&!isWeek)cls.push('is-outside');
      if(isToday(day.d,day.m))cls.push('is-today');
      if(isSelected(day.d,day.m))cls.push('is-selected');
      var count = !day.out&&evtCounts[day.d]?evtCounts[day.d]:0;
      var dots = count>0?'<span class="cal__day-dots">'+Array(Math.min(count,3)).fill('<span class="cal__day-dot"></span>').join('')+'</span>':'';
      return '<button class="'+cls.join(' ')+'" data-day="'+day.d+'" data-month="'+day.m+'">'+day.d+dots+'</button>';
    }).join('');
    return '<div class="cal__week-row"'+hide+'>'+cells+'</div>';
  }).join('');

  var todayBtn = !isTodaySelected()?'<button class="btn btn--ghost btn--sm cal__today-btn" style="font-size:var(--fs-11)">Today</button>':'';

  root.innerHTML = '<div class="cal '+(isWeek?'cal--week':'cal--month')+'">'+
    '<div class="cal__header"><h3 class="cal__month">'+title+'</h3><div class="cal__nav">'+
    todayBtn+
    '<button class="icon-btn icon-btn--ghost icon-btn--sm" data-action="prev"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 3L5 8l5 5"/></svg></button>'+
    '<button class="icon-btn icon-btn--ghost icon-btn--sm" data-action="next"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 3l5 5-5 5"/></svg></button>'+
    '</div></div>'+
    '<div class="cal__weekdays">'+header+'</div>'+
    '<div class="cal__days">'+rows+'</div>'+
    '<div class="cal__handle" data-action="toggle"><div class="cal__handle-bar"></div></div>'+
  '</div>';

  wireCal();
}

function wireCal() {
  var root = document.getElementById('calRoot');
  root.querySelectorAll('.cal__day').forEach(function(el){
    el.addEventListener('click',function(){
      selectedDate = new Date(viewYear,parseInt(el.dataset.month),parseInt(el.dataset.day));
      viewMonth = selectedDate.getMonth(); viewYear = selectedDate.getFullYear();
      renderCal(); renderSessions();
    });
  });
  root.querySelectorAll('[data-action]').forEach(function(el){
    el.addEventListener('click',function(e){
      e.stopPropagation();
      var a = el.dataset.action;
      if(a==='prev'){if(isWeek){selectedDate.setDate(selectedDate.getDate()-1);viewMonth=selectedDate.getMonth();viewYear=selectedDate.getFullYear()}else{viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--}}}
      else if(a==='next'){if(isWeek){selectedDate.setDate(selectedDate.getDate()+1);viewMonth=selectedDate.getMonth();viewYear=selectedDate.getFullYear()}else{viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++}}}
      else if(a==='toggle'){isWeek=!isWeek}
      renderCal(); renderSessions();
    });
  });
  var tb = root.querySelector('.cal__today-btn');
  if(tb)tb.addEventListener('click',function(e){e.stopPropagation();selectedDate=new Date(now);viewMonth=now.getMonth();viewYear=now.getFullYear();isWeek=true;renderCal();renderSessions()});
}

function renderSessions() {
  var content = document.getElementById('content');
  var isCurrent = selectedDate.toDateString()===now.toDateString();
  var isTmrw = selectedDate.toDateString()===new Date(now.getFullYear(),now.getMonth(),now.getDate()+1).toDateString();
  var isYday = selectedDate.toDateString()===new Date(now.getFullYear(),now.getMonth(),now.getDate()-1).toDateString();
  var isPast = selectedDate<now&&!isCurrent;

  var list = isCurrent?sessions.today:isTmrw?sessions.tomorrow:isYday?sessions.yesterday:sessions.other;
  if(isPast) list = list.map(function(s){return Object.assign({},s,{state:'done'})});

  var label = isCurrent?'Today':isTmrw?'Tomorrow':isYday?'Yesterday':FULL_DAYS[selectedDate.getDay()];

  var html = '';
  if(list.length){
    html += '<div class="section-hdr"><span class="section-hdr__label">'+label+'</span><span class="section-hdr__count">'+list.length+' sessions</span></div>';
    html += '<div class="session-list">';
    list.forEach(function(s,i){
      var timeDisplay = s.time.split(' - ')[0];
      var statusChip = s.state==='live'?'<span class="chip chip--signal" style="height:22px;font-size:10px"><span class="chip__dot"></span> Live</span>'
        :s.state==='soon'?'<span class="chip chip--signal" style="height:22px;font-size:10px">Soon</span>'
        :s.state==='done'?'<span style="font-family:var(--font-mono);font-size:var(--fs-10);color:var(--fg-faint)">Done</span>'
        :'<span style="font-family:var(--font-mono);font-size:var(--fs-10);color:var(--fg-faint)">'+s.duration+'</span>';
      html += '<div class="session session--'+s.state+'" data-idx="'+i+'" style="animation:fadeIn 0.25s ease '+(i*50)+'ms both">';
      html += '<div class="session__time">'+timeDisplay+'</div>';
      html += '<div class="session__indicator"></div>';
      html += '<div class="session__body"><div class="session__title">'+s.name+'</div><div class="session__meta">'+s.subject+' - '+s.teacher+'</div></div>';
      html += '<div class="session__status">'+statusChip+'</div>';
      html += '</div>';
    });
    html += '</div>';
  } else {
    html += '<div style="display:flex;flex-direction:column;align-items:center;padding:var(--sp-10) var(--sp-6);color:var(--fg-faint);font-size:var(--fs-14)">No sessions scheduled</div>';
  }

  content.innerHTML = html;
  document.getElementById('overdue').style.display = 'block';

  // Wire clicks
  content.querySelectorAll('.session').forEach(function(el){
    el.addEventListener('click',function(){
      openSheet(list[parseInt(el.dataset.idx)]);
    });
  });

  // Scroll to live
  setTimeout(function(){
    var live = content.querySelector('.session--live')||content.querySelector('.session--soon')||content.querySelector('.session--upcoming');
    if(live)live.scrollIntoView({behavior:'smooth',block:'center'});
  },150);
}

function openSheet(s){
  document.getElementById('sheetTitle').textContent = s.name;
  var isLive=s.state==='live',isDone=s.state==='done';
  var body = '<div style="font-size:var(--fs-12);color:var(--fg-subtle);margin-bottom:var(--sp-4)">'+s.subject+' - '+s.teacher+'</div>';
  body += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3)">';
  body += '<div><div class="caps" style="margin-bottom:4px">Time</div><div style="font-family:var(--font-mono);font-size:var(--fs-14);color:var(--fg)">'+s.time+'</div></div>';
  body += '<div><div class="caps" style="margin-bottom:4px">Duration</div><div style="font-family:var(--font-mono);font-size:var(--fs-14);color:var(--fg)">'+s.duration+'</div></div>';
  body += '<div><div class="caps" style="margin-bottom:4px">Status</div><div style="font-size:var(--fs-14);color:'+(isLive?'var(--accent)':'var(--fg)')+';font-weight:var(--fw-500)">'+(isLive?'Live now':isDone?'Completed':'Upcoming')+'</div></div>';
  body += '<div><div class="caps" style="margin-bottom:4px">Room</div><div style="font-family:var(--font-mono);font-size:var(--fs-14);color:var(--fg)">'+s.room+'</div></div></div>';
  document.getElementById('sheetBody').innerHTML = body;
  document.getElementById('sheetActions').innerHTML = isDone?'<button class="btn btn--secondary btn--block">Watch recording</button>':isLive?'<button class="btn btn--primary btn--block">Join class</button>':'<button class="btn btn--primary btn--block">Join when live</button>';
  document.getElementById('sheetOverlay').classList.add('is-open');
}

function closeSheet(){document.getElementById('sheetOverlay').classList.remove('is-open')}
document.getElementById('sheetScrim').addEventListener('click',closeSheet);
document.querySelector('.sheet-panel > div:first-child').addEventListener('click',closeSheet);

renderCal();
renderSessions();
</script>
</body>
</html>
