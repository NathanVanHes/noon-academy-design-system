<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Mastery Heatmap - Proven Routes</title>
<link rel="stylesheet" href="../project/tokens.css">
<link rel="stylesheet" href="../project/components.css">
<style>
*{box-sizing:border-box}
body{background:var(--void-400);margin:0}
.frame{width:375px;height:812px;margin:40px auto;background:var(--bg);border-radius:40px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 0 0 8px var(--void-100),0 40px 80px -20px rgba(0,0,0,0.6);font-family:var(--font-sans);color:var(--chalk-200);position:relative}
.status-bar{height:44px;padding:0 var(--sp-6);display:flex;align-items:center;justify-content:space-between;font-family:var(--font-mono);font-size:12px;color:rgba(232,228,220,0.5);flex:none}
.hdr{padding:var(--sp-4) var(--sp-6) var(--sp-3);flex:none}
.hdr h1{font-family:var(--font-serif);font-size:var(--fs-22);font-weight:500;color:var(--fg);margin:0}
.hdr p{font-size:12px;color:var(--fg-subtle);margin:4px 0 0}
.tabs-row{display:flex;gap:0;padding:0 var(--sp-6);flex:none;border-bottom:1px solid var(--border)}
.tabs-row button{flex:1;background:none;border:0;padding:var(--sp-3) 0;font:inherit;font-size:var(--fs-13);font-weight:600;color:var(--fg-subtle);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s ease}
.tabs-row button.is-on{color:var(--fg);border-bottom-color:var(--accent)}
.tabs-row button:hover{color:var(--fg)}
.scroll{flex:1;overflow-y:auto;scrollbar-width:none;-ms-overflow-style:none}
.scroll::-webkit-scrollbar{display:none}

/* Legend — fully inline */

/* Legend — inline row */

/* Grid */
.grid-section{padding:var(--sp-3) var(--sp-6) var(--sp-5)}
.grid-section__label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;color:var(--fg-faint);margin-bottom:var(--sp-3)}
.tile-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.tile{aspect-ratio:1;border-radius:4px;cursor:pointer;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:all 0.15s ease;overflow:hidden}
.tile:hover{transform:scale(1.05);z-index:1}
.tile__name{font-size:9px;font-weight:600;color:rgba(0,0,0,0.7);text-align:center;line-height:1.1;padding:0 4px}
.tile__score{position:absolute;top:3px;right:3px;font-family:var(--font-mono);font-size:9px;font-weight:600;color:rgba(0,0,0,0.5);display:flex;align-items:center;gap:1px}
/* Mastered */
.tile.is-mastered{opacity:0.55}
.tile.is-mastered:hover{opacity:0.75}
.tile__mastered{position:absolute;top:3px;left:3px;width:10px;height:10px;display:flex;align-items:center;justify-content:center}

/* Drilldown panel */
.drill{position:absolute;inset:0;background:var(--bg);z-index:20;display:flex;flex-direction:column;transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.22,0.61,0.36,1)}
.drill.is-open{transform:translateY(0)}
.drill__head{padding:var(--sp-5) var(--sp-6);flex:none;display:flex;align-items:flex-start;justify-content:space-between}
.drill__back{background:none;border:0;color:var(--fg-subtle);cursor:pointer;padding:4px;display:flex}
.drill__title{font-family:var(--font-serif);font-size:var(--fs-20);color:var(--fg);margin:0}
.drill__sub{font-size:12px;color:var(--fg-subtle);margin-top:2px}
.drill__body{flex:1;overflow-y:auto;padding:0 var(--sp-6) var(--sp-6);scrollbar-width:none}
.drill__body::-webkit-scrollbar{display:none}

/* Chart area */
.chart{background:var(--bg-raised);border-radius:var(--r-2);box-shadow:inset 0 0 0 1px var(--border);padding:var(--sp-5);margin-bottom:var(--sp-5)}
.chart__label{font-family:var(--font-mono);font-size:10px;color:var(--fg-faint);margin-bottom:var(--sp-3)}
.chart__bars{display:flex;align-items:flex-end;gap:3px;height:80px}
.chart__bar{flex:1;border-radius:2px 2px 0 0;transition:height 0.3s ease;position:relative}
.chart__bar:hover::after{content:attr(data-val);position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:9px;color:var(--fg)}

/* Practice CTA */
.drill__cta{flex:none;padding:var(--sp-4) var(--sp-6) var(--sp-6)}

.tabbar{flex:none}
</style>
</head>
<body>

<div class="frame" id="frame">
  <div class="status-bar"><span>9:41</span></div>

  <div class="hdr">
    <h1>Mastery</h1>
    
  </div>

  

  <div class="scroll" id="mainScroll">
    <!-- Upcoming exams -->
    <div style="display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-3) var(--sp-6);background:var(--signal-soft);border-bottom:1px solid var(--signal-border)">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="var(--signal)" stroke-width="1.5" style="flex:none"><circle cx="7" cy="7" r="5.5"/><path d="M7 4v3l2 1"/></svg>
      <span style="font-size:11px;color:var(--fg-muted);flex:1">Verbal in <b style="color:var(--signal)">12d</b> &middot; Quant in <b style="color:var(--signal)">19d</b></span>
      <button class="btn btn--secondary btn--sm" id="examFilter" style="height:28px;padding:0 12px;font-size:11px">Next exam</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;padding:12px 24px;flex-wrap:nowrap">
      <span style="font-family:var(--font-mono);font-size:9px;color:var(--fg-faint);flex:none">Weak</span>
      <div style="flex:1;height:6px;border-radius:3px;background:linear-gradient(90deg,#c55a4e,#c9a227,#64D8AE);min-width:60px"></div>
      <span style="font-family:var(--font-mono);font-size:9px;color:var(--fg-faint);flex:none">Strong</span>
      <span style="width:1px;height:12px;background:rgba(232,228,220,0.1);flex:none"></span>
      <span id="changedCount" style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--fg-subtle);white-space:nowrap;flex:none"><svg width="18" height="10" viewBox="0 0 20 10" fill="none"><path d="M5 2L8 7H2Z" fill="currentColor"/><path d="M15 8L12 3H18Z" fill="currentColor"/></svg></span>
    </div>

    

    <!-- Math section -->
    <div class="grid-section">
      <div class="grid-section__label">Quantitative</div>
      <div class="tile-grid" id="mathGrid"></div>
    </div>

    <!-- Reading section -->
    <div class="grid-section">
      <div class="grid-section__label">Verbal</div>
      <div class="tile-grid" id="readingGrid"></div>
    </div>
  </div>

  <!-- Drilldown -->
  <div class="drill" id="drill">
    <div class="status-bar"><span>9:41</span></div>
    <div class="drill__head">
      <div>
        <div style="display:flex;align-items:center;gap:var(--sp-3)">
          <button class="drill__back" id="drillBack"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 4l-5 5 5 5"/></svg></button>
          <div>
            <h2 class="drill__title" id="drillTitle">Topic</h2>
            <div class="drill__sub" id="drillSub">Reading</div>
          </div>
        </div>
      </div>
      <div id="drillBadge" style="padding:4px 10px;border-radius:4px;font-family:var(--font-mono);font-size:13px;font-weight:600"></div>
    </div>
    <div class="drill__body">
      <!-- Date range tabs -->
      <div style="display:flex;gap:0;background:rgba(232,228,220,0.03);border-radius:4px;box-shadow:inset 0 0 0 1px var(--border);padding:2px;margin-bottom:16px" id="rangeTabs">
        <button style="flex:1;background:var(--bg-raised);border:0;color:var(--fg);font:inherit;font-size:12px;font-family:var(--font-mono);padding:6px;border-radius:3px;cursor:pointer;box-shadow:inset 0 0 0 1px var(--border-strong)" data-range="day">Day</button>
        <button style="flex:1;background:transparent;border:0;color:var(--fg-subtle);font:inherit;font-size:12px;font-family:var(--font-mono);padding:6px;border-radius:3px;cursor:pointer" data-range="week">Week</button>
        <button style="flex:1;background:transparent;border:0;color:var(--fg-subtle);font:inherit;font-size:12px;font-family:var(--font-mono);padding:6px;border-radius:3px;cursor:pointer" data-range="month">Month</button>
      </div>

      <div class="chart">
        <div style="position:relative">
          <div style="position:absolute;bottom:80%;left:0;right:0;display:flex;align-items:center;gap:6px;pointer-events:none;z-index:1">
            <span style="font-family:var(--font-mono);font-size:8px;color:var(--fg-faint);flex:none">80</span>
            <div style="flex:1;border-top:1px dashed var(--fg-faint)"></div>
            <span style="font-family:var(--font-mono);font-size:7px;color:var(--fg-faint);flex:none">Mastered</span>
          </div>
          <div class="chart__bars" id="chartBars"></div>
        </div>
        <div id="chartLabels" style="display:flex;gap:3px;margin-top:var(--sp-2)"></div>
      </div>

      <div id="drillChange" style="display:flex;align-items:center;gap:8px;padding:12px 16px;border-radius:4px;background:rgba(100,216,174,0.08);border:1px solid rgba(100,216,174,0.15);font-size:13px;color:var(--fg)"></div>
    </div>
    <div class="drill__cta">
      <button class="btn btn--primary btn--block" style="height:48px;font-size:15px">Practice this topic</button>
    </div>
  </div>

  <div class="tabbar">
    <button class="tabbar__item"><svg class="tabbar__icon" viewBox="0 0 22 22"><circle cx="11" cy="11" r="8"/></svg>Page</button>
    <button class="tabbar__item"><svg class="tabbar__icon" viewBox="0 0 22 22"><path d="M4 6h14M4 11h14M4 16h10"/></svg>Page</button>
    <button class="tabbar__item is-on"><svg class="tabbar__icon" viewBox="0 0 22 22"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="12" y="3" width="7" height="7" rx="1"/><rect x="3" y="12" width="7" height="7" rx="1"/><rect x="12" y="12" width="7" height="7" rx="1"/></svg>Page</button>
    <button class="tabbar__item"><svg class="tabbar__icon" viewBox="0 0 22 22"><rect x="4" y="4" width="14" height="14" rx="2"/></svg>Page</button>
    <button class="tabbar__item"><svg class="tabbar__icon" viewBox="0 0 22 22"><circle cx="11" cy="8" r="4"/><path d="M4 19c0-3.3 3.1-6 7-6s7 2.7 7 6"/></svg>Page</button>
  </div>
</div>

<script>
function t(score,changed,exam,diff){
  var s=score,tr=[];
  if(s!==null){
    var d = diff || 0;
    tr = [Math.max(10,s-d-15), Math.max(10,s-d-8), Math.max(10,s-d), s];
  }
  return{name:'Topic name',score:s,changed:changed,exam:exam,trend:tr};
}

var mathTopics = [
  t(76,false,true,5),t(22,true,false,-3),t(61,false,false,8),t(94,false,true,2),
  t(35,false,false,-4),t(null,false,false),t(70,false,false,6),t(18,true,true,-5),
  t(85,false,false,3),t(42,true,false,7),t(28,false,false,-2),t(15,false,false,-6),
  t(58,false,false,4),t(null,false,false),t(73,false,false,0),t(88,true,false,3),
  t(25,false,false,-3),t(91,false,false,1),t(44,false,false,5),t(null,false,false),
  t(32,false,false,-4),t(79,true,false,6),t(55,false,false,0),
];

var readingTopics = [
  t(82,true,true,7),t(30,false,false,-5),t(91,true,false,3),t(22,false,false,-4),
  t(67,false,true,9),
];

function scoreColor(s) {
  if (s === null) return 'rgba(232,228,220,0.06)';
  // Smooth gradient: 0=red, 50=gold, 100=green
  var t = Math.max(0, Math.min(100, s)) / 100;
  var r, g, b;
  if (t < 0.5) {
    // red to gold (0-50)
    var p = t / 0.5;
    r = 197 + (201-197)*p;
    g = 90 + (162-90)*p;
    b = 78 + (39-78)*p;
  } else {
    // gold to green (50-100)
    var p = (t - 0.5) / 0.5;
    r = 201 + (100-201)*p;
    g = 162 + (216-162)*p;
    b = 39 + (174-39)*p;
  }
  return 'rgb('+Math.round(r)+','+Math.round(g)+','+Math.round(b)+')';
}

function renderGrid(containerId, topics, section) {
  var grid = document.getElementById(containerId);
  grid.innerHTML = '';
  topics.forEach(function(t) {
    var tile = document.createElement('div');
    tile.className = 'tile';
    tile.style.background = scoreColor(t.score);
    var diff = t.trend.length >= 4 ? t.trend[3] - t.trend[2] : 0;
    var chevronSvg = '';
    if (t.changed) {
      if (diff > 0) chevronSvg = '<svg width="7" height="7" viewBox="0 0 8 8" fill="none" style="flex:none"><path d="M4 2L7 6H1Z" fill="rgba(0,0,0,0.45)"/></svg>';
      else if (diff < 0) chevronSvg = '<svg width="7" height="7" viewBox="0 0 8 8" fill="none" style="flex:none"><path d="M4 6L1 2H7Z" fill="rgba(0,0,0,0.45)"/></svg>';
      else chevronSvg = '<svg width="7" height="7" viewBox="0 0 8 8" fill="none" style="flex:none"><path d="M1 4H7" stroke="rgba(0,0,0,0.4)" stroke-width="1.5"/></svg>';
    }
    var mastered = t.score !== null && t.score >= 80;
    if (mastered) tile.classList.add('is-mastered');
    tile.innerHTML = (mastered ? '<div class="tile__mastered"><svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1.5 4L3.5 6L6.5 2" stroke="rgba(0,0,0,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>' : '') +
      '<div class="tile__name">' + t.name.replace('\n','<br>') + '</div>' +
      (t.score !== null ? '<div class="tile__score">' + chevronSvg + t.score + '</div>' : '<div class="tile__score" style="color:rgba(232,228,220,0.3)">--</div>');
    if (t.score === null) {
      tile.style.cursor = 'default';
      tile.style.boxShadow = 'inset 0 0 0 1px rgba(232,228,220,0.1)';
      tile.querySelector('.tile__name').style.color = 'rgba(232,228,220,0.3)';
      tile.querySelector('.tile__score').style.color = 'rgba(232,228,220,0.2)';
    }
    tile.addEventListener('click', function() { if (t.score !== null) openDrill(t, section); else openDrillGrey(t, section); });
    grid.appendChild(tile);
  });
}

function openDrill(t, section) {
  document.getElementById('drillTitle').textContent = t.name.replace('\n',' ');
  document.getElementById('drillSub').textContent = section;
  var badge = document.getElementById('drillBadge');
  badge.textContent = t.score;
  badge.style.background = 'none';
  badge.style.color = scoreColor(t.score);
  badge.style.fontSize = '24px';

  // Chart — default to Day view
  var dayData = generateDayData(t);
  renderChart(dayData.values, dayData.labels);


  // Change indicator - always shown
  var ch = document.getElementById('drillChange');
  var diff = t.trend[3] - t.trend[2];
  var posReasons = ['Practice accuracy increased','Practice quantity increased','Good exam results'];
  var negReasons = ['Practice accuracy decreased','Practice quantity decreased','Poor exam results'];
  ch.style.display = 'flex';
  ch.style.flexDirection = 'column';
  ch.style.gap = '6px';
  if (diff > 0) {
    ch.style.background = 'var(--accent-soft)';
    ch.style.borderColor = 'var(--accent-border)';
    ch.innerHTML = '<div><span style="color:var(--accent);font-family:var(--font-mono);font-weight:600">+' + diff + '</span> this week</div><div style="font-size:12px;color:var(--fg-subtle)">' + posReasons[t.score % posReasons.length] + '</div>';
  } else if (diff < 0) {
    ch.style.background = 'var(--danger-soft)';
    ch.style.borderColor = 'var(--danger-border)';
    ch.innerHTML = '<div><span style="color:var(--danger);font-family:var(--font-mono);font-weight:600">' + diff + '</span> this week</div><div style="font-size:12px;color:var(--fg-subtle)">' + negReasons[t.score % negReasons.length] + '</div>';
  } else {
    ch.style.background = 'var(--hover-overlay)';
    ch.style.borderColor = 'var(--border)';
    var noChangeReasons = ['Practice accuracy stayed the same','Practice quantity stayed the same','No exam results this week'];
    ch.innerHTML = '<div style="color:var(--fg-muted)"><span style="font-family:var(--font-mono);font-weight:600">0</span> change this week</div><div style="font-size:12px;color:var(--fg-subtle)">' + noChangeReasons[t.score % noChangeReasons.length] + '</div>';
  }

  // Store current topic for range switching
  window._currentTopic = t;

  document.getElementById('drill').classList.add('is-open');}

function renderChart(data, labelTexts) {
  var bars = document.getElementById('chartBars');
  var labels = document.getElementById('chartLabels');
  bars.innerHTML = '';
  labels.innerHTML = '';
  data.forEach(function(v, i) {
    var b = document.createElement('div');
    b.className = 'chart__bar';
    b.style.height = v + '%';
    b.style.background = scoreColor(v);
    b.dataset.val = v;
    bars.appendChild(b);
    var l = document.createElement('span');
    l.style.cssText = 'font-family:var(--font-mono);font-size:9px;color:var(--fg-faint);flex:1;text-align:center';
    l.textContent = labelTexts[i] || '';
    labels.appendChild(l);
  });
}

function generateDayData(t) {
  var s = t.score;
  var d = t.trend[3] - t.trend[2];
  var dayNames = ['Wed','Thu','Fri','Sat','Sun','Mon','Tue'];
  var vals = [];
  for (var i = 0; i < 7; i++) {
    var jitter = Math.round((Math.random() - 0.4) * 6);
    vals.push(Math.max(5, Math.min(100, s - (6 - i) * Math.round(d / 3) + jitter)));
  }
  vals[6] = s;
  return { values: vals, labels: dayNames };
}

function generateWeekData(t) {
  var s = t.score;
  var d = t.trend[3] - t.trend[2];
  var vals = [];
  for (var i = 0; i < 4; i++) {
    vals.push(Math.max(5, Math.min(100, s - (3 - i) * Math.round(d * 1.5) + Math.round((Math.random() - 0.3) * 4))));
  }
  vals[3] = s;
  var labels = ['W1','W2','W3','W4'];
  return { values: vals, labels: labels };
}

function generateMonthData(t) {
  var s = t.score;
  var months = ['Nov','Dec','Jan','Feb','Mar','Apr'];
  var vals = [];
  for (var i = 0; i < 6; i++) {
    var drift = Math.round((s - 30) * (i / 5)) + 30 + Math.round((Math.random() - 0.3) * 8);
    vals.push(Math.max(5, Math.min(100, drift)));
  }
  vals[5] = s;
  return { values: vals, labels: months };
}

// Range tab switching
document.getElementById('rangeTabs').addEventListener('click', function(e) {
  var btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('#rangeTabs button').forEach(function(b) {
    b.style.background = 'transparent';
    b.style.color = 'var(--fg-subtle)';
    b.style.boxShadow = 'none';
  });
  btn.style.background = 'var(--bg-raised)';
  btn.style.color = 'var(--fg)';
  btn.style.boxShadow = 'inset 0 0 0 1px var(--border-strong)';
  var t = window._currentTopic;
  if (!t) return;
  var range = btn.dataset.range;
  var d;
  if (range === 'day') d = generateDayData(t);
  else if (range === 'week') d = generateWeekData(t);
  else d = generateMonthData(t);
  renderChart(d.values, d.labels);
});

document.getElementById('drillBack').addEventListener('click', function() {
  document.getElementById('drill').classList.remove('is-open');
});



function openDrillGrey(t, section) {
  document.getElementById('drillTitle').textContent = t.name.replace('\n',' ');
  document.getElementById('drillSub').textContent = section;
  var badge = document.getElementById('drillBadge');
  badge.textContent = 'Not started';
  badge.style.background = 'rgba(232,228,220,0.08)';
  badge.style.color = 'var(--fg-faint)';
  badge.style.fontSize = '11px';
  document.getElementById('chartBars').innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--fg-faint);font-size:12px;height:80px">No data yet</div>';
  document.getElementById('chartLabels').innerHTML = '';

  var ch = document.getElementById('drillChange');
  ch.style.display = 'flex';
  ch.style.background = 'rgba(232,228,220,0.04)';
  ch.style.borderColor = 'rgba(232,228,220,0.06)';
  ch.style.flexDirection = 'column';
  ch.style.gap = '0';
  ch.innerHTML = 'This topic hasn\'t been covered yet. Start practicing to build your baseline.';
  document.getElementById('drill').classList.add('is-open');
}

var examOn = false;
document.getElementById('examFilter').addEventListener('click', function() {
  examOn = !examOn;
  this.textContent = examOn ? 'Show all' : 'Next exam';
  this.className = 'btn btn--secondary btn--sm';
  this.style.cssText = 'height:28px;padding:0 12px;font-size:11px';
  renderGrid('mathGrid', examOn ? mathTopics.filter(function(t){return t.exam}) : mathTopics, 'Quantitative');
  renderGrid('readingGrid', examOn ? readingTopics.filter(function(t){return t.exam}) : readingTopics, 'Verbal');
});

// Init
renderGrid('mathGrid', mathTopics, 'Quantitative');
renderGrid('readingGrid', readingTopics, 'Verbal');
var changedNum = mathTopics.filter(function(t){return t.changed}).length + readingTopics.filter(function(t){return t.changed}).length;
document.getElementById('changedCount').innerHTML += changedNum + ' changed';
</script>
</body>
</html>
