P.calendar = {
  title: 'Calendar', desc: 'Week strip by default, expand to full month. Arrows navigate weeks or months. Fully portable to React Native.',
  tokens() {
    return ['--accent','--accent-fg','--fg','--fg-faint','--fg-disabled','--hover-overlay','--r-1','--sp-2','--sp-3','--dur-1','--ease'];
  },
  knobs: {
    showEvents: { type:'toggle', default:true, label:'Show event dots' },
  },
  renderCanvas(k) {
    // Just a container — afterRender builds everything
    return `<div id="calRoot" style="width:360px;overflow:hidden"></div>`;
  },
  afterRender() {
    const root = document.getElementById('calRoot');
    if (!root) return;

    const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const FULL_DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const now = new Date();
    const todayKey = now.getFullYear() + '-' + now.getMonth() + '-' + now.getDate();

    let viewMonth = now.getMonth();
    let viewYear = now.getFullYear();
    let selectedDate = new Date(now);
    let isWeek = true;

    function buildGrid(y, m) {
      const first = new Date(y, m, 1).getDay();
      const dim = new Date(y, m + 1, 0).getDate();
      const prevDim = new Date(y, m, 0).getDate();
      const days = [];
      for (let i = first - 1; i >= 0; i--) days.push({d: prevDim - i, m: m-1, out: true});
      for (let d = 1; d <= dim; d++) days.push({d, m, out: false});
      while (days.length % 7 !== 0) days.push({d: days.length - first - dim + 1, m: m+1, out: true});
      const weeks = [];
      for (let i = 0; i < days.length; i += 7) weeks.push(days.slice(i, i + 7));
      return weeks;
    }

    function isToday(d, m) { return d === now.getDate() && m === now.getMonth() && viewYear === now.getFullYear(); }
    function isSelected(d, m) { return d === selectedDate.getDate() && m === selectedDate.getMonth() && viewYear === selectedDate.getFullYear(); }
    function isTodaySelected() { return selectedDate.getDate() === now.getDate() && selectedDate.getMonth() === now.getMonth() && selectedDate.getFullYear() === now.getFullYear(); }

    let slideDir = null; // 'left','right', or null

    const showDots = currentKnobs && currentKnobs.showEvents !== false;
    // Event counts per day — some days have multiple events
    var evtCounts = {};
    if (showDots) {
      [2,5,8,10,15,now.getDate(),now.getDate()+2,now.getDate()-3].filter(function(d){return d>0&&d<=31}).forEach(function(d){ evtCounts[d] = 1; });
      evtCounts[now.getDate()] = 3;
      evtCounts[now.getDate()+2] = 2;
      if (evtCounts[8]) evtCounts[8] = 2;
    }

    function buildWeekRow(week, weekView) {
      return week.map(day => {
        const cls = ['cal__day'];
        if (day.out && !weekView) cls.push('is-outside');
        if (isToday(day.d, day.m)) cls.push('is-today');
        if (isSelected(day.d, day.m)) cls.push('is-selected');
        var count = !day.out && evtCounts[day.d] ? evtCounts[day.d] : 0;
        var dot = count > 0 ? '<span class="cal__day-dots">' + Array(Math.min(count,3)).fill('<span class="cal__day-dot"></span>').join('') + '</span>' : '';
        return '<button class="' + cls.join(' ') + '" data-day="' + day.d + '" data-month="' + day.m + '">' + day.d + dot + '</button>';
      }).join('');
    }

    function render() {
      const weeks = buildGrid(viewYear, viewMonth);
      const selWeek = weeks.findIndex(w => w.some(d => !d.out && isSelected(d.d, d.m)));
      const activeWeek = Math.max(0, selWeek >= 0 ? selWeek : weeks.findIndex(w => w.some(d => !d.out && isToday(d.d, d.m))));

      const weekTitle = FULL_DAYS[selectedDate.getDay()] + ', ' + MONTHS[selectedDate.getMonth()] + ' ' + selectedDate.getDate();
      const monthTitle = MONTHS[viewMonth] + ' ' + viewYear;
      const title = isWeek ? weekTitle : monthTitle;

      // Slide animation class for week rows
      const slideIn = slideDir === 'left' ? 'cal__slide-in-left' : slideDir === 'right' ? 'cal__slide-in-right' : '';
      slideDir = null;

      let html = '<div class="cal ' + (isWeek ? 'cal--week' : 'cal--month') + '">';
      html += '<div class="cal__header"><h3 class="cal__month">' + title + '</h3><div class="cal__nav">';
      if (!isTodaySelected()) html += '<button class="btn btn--ghost btn--sm" data-action="today">Today</button>';
      html += '<button class="icon-btn icon-btn--ghost icon-btn--sm" data-action="prev"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 3L5 8l5 5"/></svg></button>';
      html += '<button class="icon-btn icon-btn--ghost icon-btn--sm" data-action="next"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 3l5 5-5 5"/></svg></button>';
      html += '</div></div>';
      html += '<div class="cal__weekdays">' + DAY_NAMES.map(d => '<span class="cal__weekday">' + d + '</span>').join('') + '</div>';
      html += '<div class="cal__days">';
      weeks.forEach((week, wi) => {
        if (isWeek && wi !== activeWeek) {
          html += '<div class="cal__week-row" style="max-height:0;opacity:0;overflow:hidden">' + buildWeekRow(week, isWeek) + '</div>';
        } else if (isWeek && slideIn) {
          html += '<div class="cal__week-row ' + slideIn + '">' + buildWeekRow(week, isWeek) + '</div>';
        } else {
          html += '<div class="cal__week-row">' + buildWeekRow(week, isWeek) + '</div>';
        }
      });
      html += '</div>';
      html += '<div class="cal__handle" data-action="toggle"><div class="cal__handle-bar"></div></div>';
      html += '</div>';
      root.innerHTML = html;
      wire();
    }

    // Light update — just move selection classes without full re-render
    function updateSelection() {
      root.querySelectorAll('.cal__day').forEach(btn => {
        const d = parseInt(btn.dataset.day);
        const m = parseInt(btn.dataset.month);
        btn.classList.toggle('is-selected', isSelected(d, m));
      });
      // Update title
      const titleEl = root.querySelector('.cal__month');
      if (titleEl) {
        const weekTitle = FULL_DAYS[selectedDate.getDay()] + ', ' + MONTHS[selectedDate.getMonth()] + ' ' + selectedDate.getDate();
        titleEl.textContent = isWeek ? weekTitle : MONTHS[viewMonth] + ' ' + viewYear;
      }
      // Update today button visibility
      const todayBtn = root.querySelector('[data-action="today"]');
      if (todayBtn) todayBtn.style.display = isTodaySelected() ? 'none' : '';
    }

    function wire() {
      root.querySelectorAll('[data-action]').forEach(el => {
        el.addEventListener('click', e => {
          e.stopPropagation();
          const action = el.dataset.action;
          if (action === 'today') {
            selectedDate = new Date(now);
            viewMonth = now.getMonth(); viewYear = now.getFullYear();
            isWeek = true; slideDir = null;
            render(); return;
          } else if (action === 'prev') {
            if (isWeek) {
              const crossedWeek = selectedDate.getDay() === 0; // Sun going back = new week
              selectedDate.setDate(selectedDate.getDate() - 1);
              viewMonth = selectedDate.getMonth(); viewYear = selectedDate.getFullYear();
              if (crossedWeek) { slideDir = 'right'; render(); return; }
              updateSelection(); return;
            } else {
              viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; }
              slideDir = null;
            }
          } else if (action === 'next') {
            if (isWeek) {
              const crossedWeek = selectedDate.getDay() === 6; // Sat going forward = new week
              selectedDate.setDate(selectedDate.getDate() + 1);
              viewMonth = selectedDate.getMonth(); viewYear = selectedDate.getFullYear();
              if (crossedWeek) { slideDir = 'left'; render(); return; }
              updateSelection(); return;
            } else {
              viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; }
              slideDir = null;
            }
          } else if (action === 'toggle') {
            isWeek = !isWeek; slideDir = null;
          }
          render();
        });
      });
      root.querySelectorAll('.cal__day').forEach(el => {
        el.addEventListener('click', () => {
          const m = parseInt(el.dataset.month);
          const d = parseInt(el.dataset.day);
          const y = m < 0 ? viewYear - 1 : m > 11 ? viewYear + 1 : viewYear;
          const adjM = ((m % 12) + 12) % 12;
          const oldMonth = viewMonth;
          selectedDate = new Date(y, adjM, d);
          viewMonth = selectedDate.getMonth();
          viewYear = selectedDate.getFullYear();
          if (viewMonth === oldMonth) { updateSelection(); } else { render(); }
        });
      });
      // Drag
      let startY = 0, drag = false;
      const handle = root.querySelector('.cal__handle');
      if (handle) {
        handle.addEventListener('mousedown', e => { startY = e.clientY; drag = true; });
        handle.addEventListener('touchstart', e => { startY = e.touches[0].clientY; drag = true; }, {passive:true});
      }
      document.addEventListener('mousemove', e => { if (!drag) return; if (e.clientY - startY > 30) { isWeek = false; drag = false; slideDir = null; render(); } else if (startY - e.clientY > 30) { isWeek = true; drag = false; slideDir = null; render(); } });
      document.addEventListener('touchmove', e => { if (!drag) return; const y = e.touches[0].clientY; if (y - startY > 30) { isWeek = false; drag = false; slideDir = null; render(); } else if (startY - y > 30) { isWeek = true; drag = false; slideDir = null; render(); } }, {passive:true});
      document.addEventListener('mouseup', () => { drag = false; });
      document.addEventListener('touchend', () => { drag = false; });
    }

    render();
  },
  renderCode() {
    return `<!-- Starts collapsed as week strip -->
<div class="cal cal--week">
  <div class="cal__header">
    <h3 class="cal__month">April 2026</h3>
    <div class="cal__nav">
      <button class="btn btn--ghost btn--sm">Today</button>
      <button class="icon-btn icon-btn--ghost icon-btn--sm">‹</button>
      <button class="icon-btn icon-btn--ghost icon-btn--sm">›</button>
    </div>
  </div>
  <div class="cal__weekdays">...</div>
  <div class="cal__days">
    <div class="cal__week-row">...</div>
  </div>
  <div class="cal__handle">
    <div class="cal__handle-bar"></div>
  </div>
</div>`;
  },
  sections: `
    <div class="sect"><div class="sect__title">Interaction</div>
      <div class="col gap-3">
        <div class="cell"><div class="cell__label">Starts as a week strip showing the current week. Drag the handle down or tap it to expand to full month view. Drag up or tap again to collapse. Click TODAY to snap back.</div></div>
      </div>
    </div>
    <div class="sect"><div class="sect__title">Day States</div>
      <div class="grid grid--auto">
        <div class="cell"><div class="cell__label">Today</div><button class="cal__day is-today" style="width:40px;height:40px">22</button></div>
        <div class="cell"><div class="cell__label">Selected</div><button class="cal__day is-selected" style="width:40px;height:40px">15<span class="cal__day-dots"><span class="cal__day-dot"></span></span></button></div>
        <div class="cell"><div class="cell__label">Outside month</div><button class="cal__day is-outside" style="width:40px;height:40px">29</button></div>
        <div class="cell"><div class="cell__label">Disabled</div><button class="cal__day is-disabled" style="width:40px;height:40px">5</button></div>
        <div class="cell"><div class="cell__label">1 event</div><button class="cal__day" style="width:40px;height:40px">8<span class="cal__day-dots"><span class="cal__day-dot"></span></span></button></div>
        <div class="cell"><div class="cell__label">2 events</div><button class="cal__day" style="width:40px;height:40px">10<span class="cal__day-dots"><span class="cal__day-dot"></span><span class="cal__day-dot"></span></span></button></div>
        <div class="cell"><div class="cell__label">3 events</div><button class="cal__day" style="width:40px;height:40px">22<span class="cal__day-dots"><span class="cal__day-dot"></span><span class="cal__day-dot"></span><span class="cal__day-dot"></span></span></button></div>

function navigate(id) {
  const page = P[id];
  if (!page) return;
  window.location.hash = id;
  // Show group name in topbar, page title in the page header
  var groupName = '';
  NAV.forEach(function(g) { g.items.forEach(function(item) { if (item.id === id) groupName = g.group; }); });
  document.getElementById('tbTitle').textContent = groupName || page.title;

  // Highlight nav
  sb.querySelectorAll('.sb__item').forEach(el => el.classList.toggle('is-on', el.dataset.page === id));

  // Init knobs
  initKnobs(page.knobs);

  // Render page
  const pg = document.getElementById('page');
  let html = `<div class="pg__head"><h1 class="pg__title">${page.title}</h1><p class="pg__desc">${page.desc}</p></div>`;

  // If page has knobs + renderCanvas, show playground
  if (page.knobs && page.renderCanvas) {
    html += `<div class="play"><div class="play__canvas" id="canvas"></div><div class="play__knobs" id="knobs"><div class="play__knobs-title">Controls</div><div id="knobsInner"></div><div id="codeOut"></div></div></div>`;
  }

  // If page has render() (no knobs), just render content
  if (page.render && !page.renderCanvas) {
    html += page.render();
  }

  // Sections
  if (page.sections) {
    html += `<div class="sects">${typeof page.sections === 'function' ? page.sections() : page.sections}</div>`;
  }

  pg.innerHTML = html;

  // If playground, wire up knobs
  if (page.knobs && page.renderCanvas) {
    updatePlayground(page);
    wireKnobs(page);
  }

  // afterRender for non-playground pages
  if (page.afterRender && !(page.knobs && page.renderCanvas)) {
    page.afterRender();
  }
}

function updatePlayground(page, skipKnobs) {
  const canvas = document.getElementById('canvas');
  const knobsEl = document.getElementById('knobsInner');
  const codeEl = document.getElementById('codeOut');
  if (canvas) canvas.innerHTML = page.renderCanvas(currentKnobs);
  if (page.afterRender) page.afterRender(canvas);
  if (knobsEl && !skipKnobs) knobsEl.innerHTML = buildKnobsHTML(page.knobs);
  if (codeEl && page.renderCode) {
    const tokenList = page.tokens ? (typeof page.tokens === 'function' ? page.tokens(currentKnobs) : page.tokens) : null;
    const tokensUsed = tokenList ? `<div style="margin-top:var(--sp-4)"><div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-faint);margin-bottom:var(--sp-2)">Tokens used</div><div style="display:flex;flex-wrap:wrap;gap:4px">${tokenList.map(t=>`<span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-subtle);background:var(--hover-overlay);padding:2px 6px;border-radius:2px">${t}</span>`).join('')}</div></div>` : '';
    codeEl.innerHTML = `<div style="margin-top:var(--sp-5);padding-top:var(--sp-5);border-top:1px solid var(--divider)"><div class="play__knobs-title">Code</div><div class="codeblock"><button class="codeblock__copy" onclick="copyCode(this)">Copy</button><pre>${escHTML(page.renderCode(currentKnobs))}</pre></div>${tokensUsed}</div>`;
  }
}

function wireKnobs(page) {
  const knobsEl = document.getElementById('knobsInner');
  if (!knobsEl) return;

  // Segmented controls
  knobsEl.querySelectorAll('.kn__seg').forEach(seg => {
    seg.addEventListener('click', e => {
      const btn = e.target.closest('button[data-val]');
      if (!btn) return;
      const key = seg.dataset.knob;
      currentKnobs[key] = btn.dataset.val;
      updatePlayground(page);
      wireKnobs(page);
    });
  });

  // Toggles (switches)
  knobsEl.querySelectorAll('input[type="checkbox"][data-knob]').forEach(inp => {
    inp.addEventListener('change', () => {
      currentKnobs[inp.dataset.knob] = inp.checked;
      updatePlayground(page);
      wireKnobs(page);
    });
  });

  // Text inputs - skipKnobs to preserve focus
  knobsEl.querySelectorAll('.kn__input[data-knob]').forEach(inp => {
    inp.addEventListener('input', () => {
      currentKnobs[inp.dataset.knob] = inp.value;
      updatePlayground(page, true);
    });
  });

  // Range
  knobsEl.querySelectorAll('.kn__range[data-knob]').forEach(inp => {
    inp.addEventListener('input', () => {
      currentKnobs[inp.dataset.knob] = Number(inp.value);
      const canvas = document.getElementById('canvas');
      if (canvas) canvas.innerHTML = page.renderCanvas(currentKnobs);
      // Update displayed value
      const code = inp.parentElement.querySelector('code');
      if (code) code.textContent = inp.value;
    });
  });
}

// THEME & RTL TOGGLES
// ════════════════════════════════════════════════════════════════════════════

const mn = document.getElementById('main');
const shell = document.querySelector('.shell');

document.getElementById('themeToggle').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const isPaper = btn.dataset.v === 'paper';
  shell.classList.toggle('paper-mode', isPaper);
  shell.classList.toggle('paper', isPaper);
  document.querySelectorAll('#themeToggle button').forEach(b => b.classList.toggle('is-on', b === btn));
});

document.getElementById('dirToggle').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.documentElement.dir = btn.dataset.v;
  document.body.classList.toggle('rtl', btn.dataset.v === 'rtl');
  document.querySelectorAll('#dirToggle button').forEach(b => b.classList.toggle('is-on', b === btn));
});

// Nav clicks
sb.addEventListener('click', e => {
  const item = e.target.closest('.sb__item');
  if (!item) return;
  e.preventDefault();
  navigate(item.dataset.page);
});

// Interactive: stepper buttons in canvas
document.getElementById('page').addEventListener('click', e => {
  const btn = e.target.closest('.stepper button');
  if (btn && !btn.disabled) {
    const input = btn.closest('.stepper').querySelector('input');
    if (input && currentKnobs.value !== undefined) {
      const step = btn.textContent === '+' ? 1 : -1;
      const newVal = Math.max(Number(currentKnobs.min||0), Math.min(Number(currentKnobs.max||100), Number(currentKnobs.value) + step));
      currentKnobs.value = newVal;
      const page = P[window.location.hash.slice(1)];
      if (page) updatePlayground(page);
      wireKnobs(page);
      return;
    }
  }
});

// Interactive nav components (tabs, tabbar, seg, pagination, sidenav)
document.getElementById('page').addEventListener('click', e => {
  const btn = e.target.closest('button, a');
  if (!btn || btn.disabled) return;
  const parent = btn.closest('[data-interactive]');
  if (!parent) return;
  e.preventDefault();
  const type = parent.dataset.interactive;
  // Toggle is-on within the group
  const activeClass = type === 'sidenav' ? 'is-on' : (type === 'tabs' ? 'is-on' : 'is-on');
  const siblings = type === 'sidenav'
    ? parent.querySelectorAll('.sidenav__item')
    : type === 'tabs'
    ? parent.querySelectorAll('.tab')
    : type === 'tabbar'
    ? parent.querySelectorAll('.tabbar__item')
    : type === 'seg'
    ? parent.querySelectorAll('button')
    : type === 'pagination'
    ? parent.querySelectorAll('button:not(:first-child):not(:last-child)')
    : parent.querySelectorAll('button');
  siblings.forEach(s => s.classList.remove('is-on'));
  btn.classList.add('is-on');
});

// Init from hash or default
const initPage = window.location.hash.slice(1) || 'overview';
navigate(initPage);
window.addEventListener('hashchange', () => navigate(window.location.hash.slice(1)));
</script>
