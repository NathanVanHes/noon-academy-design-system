<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Proven Routes - Design System</title>
<link rel="stylesheet" href="project/tokens.css">
<link rel="stylesheet" href="project/components.css">
<style>
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;overflow:hidden}

/* ── Mobile (desktop defaults below, mobile overrides at end of style block) ── */
.tb__menu{display:none;background:none;border:0;color:var(--fg-muted);cursor:pointer;padding:4px}
.sb__close{display:none;background:none;border:0;color:var(--fg-muted);cursor:pointer;padding:4px;position:absolute;top:16px;inset-inline-end:12px}
.sb__scrim{display:none}

/* ── Shell ── */
.shell{display:grid;grid-template-columns:250px 1fr;height:100vh}

/* ── Sidebar ── */
.sb{background:var(--bg-sunken);border-inline-end:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding-block-end:var(--sp-7)}
.sb__brand{padding:var(--sp-6) var(--sp-5) var(--sp-5);display:flex;align-items:baseline;gap:var(--sp-2);border-block-end:1px solid var(--border);margin-block-end:var(--sp-4)}
.sb__brand strong{font-family:var(--font-serif);font-weight:var(--fw-500);font-size:var(--fs-20);color:var(--fg);letter-spacing:var(--tr-tight)}
.sb__brand em{font-family:var(--font-mono);font-size:11px;color:var(--fg-faint);font-style:normal}
.sb__group{padding:0 var(--sp-3);margin-block-end:var(--sp-4)}
.sb__heading{font-family:var(--font-sans);font-size:10px;letter-spacing:var(--tr-caps);text-transform:uppercase;font-weight:var(--fw-600);color:var(--fg-faint);padding:0 var(--sp-3) var(--sp-2)}
.sb__item{display:flex;align-items:center;gap:var(--sp-2);width:100%;text-align:start;padding:7px var(--sp-3);border-radius:var(--r-1);color:var(--fg-muted);font-size:var(--fs-13);font-family:var(--font-sans);cursor:pointer;border:0;background:transparent;text-decoration:none;transition:all 120ms var(--ease)}
.sb__item:hover{color:var(--fg);background:rgba(232,228,220,0.04)}
.sb__item.is-on{color:var(--fg);background:rgba(232,228,220,0.08)}
.sb__item .count{margin-inline-start:auto;font-family:var(--font-mono);font-size:10px;color:var(--fg-faint)}

/* ── Main ── */
.mn{overflow-y:auto;display:flex;flex-direction:column;background:var(--bg)}

/* ── Topbar ── */
.tb{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-3) var(--sp-6);background:rgba(10,15,26,0.85);backdrop-filter:blur(8px);border-block-end:1px solid var(--border)}
.tb__title{font-family:var(--font-serif);font-size:var(--fs-18);color:var(--fg);margin-inline-end:auto;font-weight:var(--fw-400);letter-spacing:var(--tr-tight)}
.tb__toggle{display:inline-flex;background:rgba(232,228,220,0.04);box-shadow:inset 0 0 0 1px var(--border);border-radius:var(--r-1);padding:2px}
.tb__toggle button{background:transparent;border:0;color:var(--fg-subtle);font:600 10px/1 var(--font-mono);letter-spacing:0.08em;padding:6px 10px;cursor:pointer;border-radius:2px;transition:all 120ms var(--ease)}
.tb__toggle button.is-on{background:rgba(100,216,174,0.14);color:var(--accent)}

/* ── Page layout ── */
.pg{flex:1;display:flex;flex-direction:column}
.pg__head{padding:var(--sp-7) var(--sp-7) var(--sp-5);border-block-end:1px solid var(--border)}
.pg__title{font-family:var(--font-serif);font-size:var(--fs-32);font-weight:var(--fw-400);color:var(--fg);margin:0 0 var(--sp-1);letter-spacing:var(--tr-tight)}
.pg__desc{font-family:var(--font-serif);font-style:italic;color:var(--fg-subtle);font-size:var(--fs-14);margin:0}

/* ── Playground (canvas + knobs) ── */
.play{display:grid;grid-template-columns:1fr 300px;border-block-end:1px solid var(--border);min-height:260px}
.play__canvas{padding:var(--sp-8);display:grid;place-items:center;position:sticky;top:48px;overflow:auto;max-height:80vh;background:
  linear-gradient(rgba(232,228,220,0.015) 1px,transparent 1px) 0 0/24px 24px,
  linear-gradient(90deg,rgba(232,228,220,0.015) 1px,transparent 1px) 0 0/24px 24px,
  var(--bg)}
.play__canvas>*{position:relative}
.play__knobs{background:var(--bg-sunken);border-inline-start:1px solid var(--border);padding:var(--sp-5);overflow-y:auto}
.play__knobs-title{font-family:var(--font-sans);font-size:10px;letter-spacing:var(--tr-caps);text-transform:uppercase;font-weight:var(--fw-600);color:var(--fg-faint);margin:0 0 var(--sp-5);display:flex;align-items:center;gap:var(--sp-2)}
.play__knobs-title::before{content:"";width:6px;height:6px;background:var(--accent);transform:rotate(45deg)}

/* Knob controls */
.kn{margin-block-end:var(--sp-5)}
.kn__label{font-family:var(--font-sans);font-size:var(--fs-12);font-weight:var(--fw-500);color:var(--fg-muted);margin-block-end:var(--sp-2);display:flex;justify-content:space-between;align-items:center}
.kn__label code{font-family:var(--font-mono);font-size:10px;color:var(--fg-faint);font-weight:var(--fw-400)}
.kn__seg{display:flex;flex-wrap:wrap;gap:2px;background:var(--bg);padding:2px;border-radius:var(--r-2);box-shadow:inset 0 0 0 1px var(--border)}
.kn__seg button{flex:1;min-width:max-content;background:transparent;border:0;color:var(--fg-subtle);font:inherit;font-size:11px;font-family:var(--font-mono);padding:5px 8px;border-radius:var(--r-1);cursor:pointer;text-align:center;transition:all 100ms var(--ease)}
.kn__seg button:hover{color:var(--fg)}
.kn__seg button.is-on{background:var(--bg-raised);color:var(--fg);box-shadow:inset 0 0 0 1px var(--border-strong)}
.kn__switch{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-2) 0;border-block-end:1px solid var(--divider)}
.kn__switch:last-child{border:0}
.kn__switch span{font-size:var(--fs-12);color:var(--fg-muted)}
.kn__input{width:100%;height:var(--h-sm);padding-inline:var(--sp-3);background:var(--input-bg);color:var(--fg);border:0;box-shadow:var(--input-border);border-radius:var(--input-radius);font:inherit;font-size:var(--fs-13);outline:none}
.kn__input:focus{box-shadow:var(--input-border-focus)}
.kn__range{width:100%;appearance:none;background:transparent;height:20px;cursor:pointer}
.kn__range::-webkit-slider-runnable-track{height:2px;background:var(--border-strong);border-radius:1px}
.kn__range::-webkit-slider-thumb{appearance:none;width:14px;height:14px;background:var(--accent);border:2px solid var(--bg);border-radius:50%;margin-top:-6px}

/* ── Sections below playground ── */
.sects{padding:var(--sp-7);overflow-y:auto}
.sect{margin-block-end:var(--sp-9)}
.sect__title{font-family:var(--font-sans);font-size:11px;letter-spacing:var(--tr-caps);text-transform:uppercase;font-weight:var(--fw-600);color:var(--fg-faint);margin:0 0 var(--sp-5);padding-block-end:var(--sp-3);border-block-end:1px solid var(--border)}
.sect__sub{font-family:var(--font-sans);font-size:11px;letter-spacing:var(--tr-caps);text-transform:uppercase;font-weight:var(--fw-600);color:var(--fg-faint);margin:var(--sp-5) 0 var(--sp-3)}

/* ── Showcase grid ── */
.grid{display:grid;gap:var(--sp-4);margin-block-end:var(--sp-5)}
.grid--2{grid-template-columns:1fr 1fr}
.grid--3{grid-template-columns:1fr 1fr 1fr}
.grid--4{grid-template-columns:1fr 1fr 1fr 1fr}
.grid--auto{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}

.cell{background:var(--bg-raised);border-radius:var(--r-2);box-shadow:inset 0 0 0 1px var(--border);padding:var(--sp-5);display:flex;flex-direction:column;gap:var(--sp-3)}
.cell__label{font-family:var(--font-mono);font-size:10px;color:var(--fg-faint);letter-spacing:0.05em}
.cell--row{flex-direction:row;align-items:center;flex-wrap:wrap}

/* ── Code ── */
.codeblock{background:var(--bg-sunken);border-radius:var(--r-2);padding:var(--sp-4) var(--sp-5);box-shadow:inset 0 0 0 1px var(--border);overflow-x:auto;position:relative;margin-block-end:var(--sp-4)}
.codeblock pre{margin:0;font-family:var(--font-mono);font-size:12px;color:var(--fg);line-height:1.6;white-space:pre-wrap}
.codeblock .t{color:var(--iris-300)}.codeblock .a{color:var(--noon-300)}.codeblock .s{color:var(--gold-200)}.codeblock .c{color:var(--fg-faint);font-style:italic}
.codeblock__copy{position:absolute;top:var(--sp-2);right:var(--sp-2);background:transparent;border:0;color:var(--fg-subtle);font:600 10px var(--font-mono);letter-spacing:0.08em;text-transform:uppercase;padding:4px 8px;border-radius:var(--r-1);cursor:pointer}
.codeblock__copy:hover{color:var(--fg);background:rgba(232,228,220,0.06)}

/* Helpers */
.row{display:flex;gap:var(--sp-4);flex-wrap:wrap;align-items:center}
.col{display:flex;flex-direction:column;gap:var(--sp-3)}
.gap-2{gap:var(--sp-2)}.gap-3{gap:var(--sp-3)}.gap-5{gap:var(--sp-5)}.gap-6{gap:var(--sp-6)}.gap-7{gap:var(--sp-7)}
.w-full{width:100%}.max-w-sm{max-width:360px}.max-w-md{max-width:480px}

/* Swatches */
.swatches{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:var(--sp-3)}
.swatch{border-radius:var(--r-2);overflow:hidden;box-shadow:inset 0 0 0 1px var(--border)}
.swatch__color{height:52px}.swatch__info{padding:7px 9px;background:var(--bg-raised)}
.swatch__name{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);display:block}
.swatch__hex{font-family:var(--font-mono);font-size:9px;color:var(--fg-faint);display:block;margin-top:1px}

/* Paper mode */
.shell.paper-mode .play__canvas{background:
  linear-gradient(rgba(10,15,26,0.03) 1px,transparent 1px) 0 0/24px 24px,
  linear-gradient(90deg,rgba(10,15,26,0.03) 1px,transparent 1px) 0 0/24px 24px,
  var(--paper-200)}
.shell.paper-mode{--bg:var(--paper-200);--bg-sunken:var(--paper-300);--bg-raised:var(--paper-100);--bg-overlay:var(--paper-100);--bg-popover:var(--paper-100);--fg:var(--void-300);--fg-muted:rgba(10,15,26,0.72);--fg-subtle:rgba(10,15,26,0.58);--fg-faint:rgba(10,15,26,0.40);--fg-disabled:rgba(10,15,26,0.45);--fg-inverse:var(--chalk-100);--border:rgba(10,15,26,0.12);--border-strong:rgba(10,15,26,0.25);--divider:rgba(10,15,26,0.08);--accent:#1a795a;--accent-hover:#146b50;--accent-active:#0a3326;--accent-fg:var(--chalk-100);--accent-soft:rgba(25,110,82,0.10);--accent-soft-hv:rgba(25,110,82,0.16);--accent-border:rgba(25,110,82,0.30);--danger:#9a4339;--danger-300:#9a4339;--danger-400:#9a4339;--ok:#566648;--ok-300:#566648;--ok-400:#566648;--signal:#7a6014;--warn:#7d670a;--iris-400:#7a50cc;--blue-400:#2e5fad;--input-bg:rgba(10,15,26,0.02);--input-bg-hover:rgba(10,15,26,0.04)}
.shell.paper-mode .tb{background:rgba(242,236,224,0.85)}
.shell.paper-mode .sb__item:hover{background:rgba(10,15,26,0.04)}
.shell.paper-mode .sb__item.is-on{background:rgba(10,15,26,0.08)}
/* Voice tutor mockups always use void tokens regardless of theme */
.vt-mock{--bg:var(--void-300);--fg:rgba(232,228,220,1);--fg-muted:rgba(232,228,220,0.7);--fg-faint:rgba(232,228,220,0.35);--border:rgba(232,228,220,0.10);--border-strong:rgba(232,228,220,0.22);--divider:rgba(232,228,220,0.06);--accent:#64D8AE;--accent-fg:#0a3326;--accent-soft:rgba(100,216,174,0.14);--danger-400:#c55a4e;--ok-400:#7a8e64}

/* ── Mobile breakpoint — must be last to override base rules ── */
@media(max-width:768px){
  body{overflow:auto}
  .shell{grid-template-columns:1fr !important;height:auto;min-height:100vh}
  .sb{position:fixed;top:0;bottom:0;inset-inline-start:0;z-index:100;transform:translateX(-100%);transition:transform 0.25s ease;width:280px}
  [dir=rtl] .sb{transform:translateX(100%)}
  .sb.is-open{transform:translateX(0) !important}
  .sb__scrim{display:block;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,0.4);opacity:0;pointer-events:none;transition:opacity 0.25s ease}
  .sb__scrim.is-open{opacity:1;pointer-events:auto}
  .sb__close{display:flex}
  .tb__menu{display:flex}
  .mn{overflow-y:auto;height:auto}
  .tb{padding:var(--sp-3) var(--sp-4)}
  .pg__head{padding:var(--sp-5) var(--sp-4) var(--sp-4)}
  .pg__title{font-size:var(--fs-24)}
  .play{grid-template-columns:1fr !important;min-height:auto}
  .play__canvas{position:relative;top:auto;max-height:none;padding:var(--sp-5)}
  .play__knobs{border-inline-start:0;border-block-start:1px solid var(--border)}
  .sects{padding-inline:var(--sp-4) !important}
  .grid.grid--2{grid-template-columns:1fr !important}
}
</style>
</head>
<body>
<div class="sb__scrim" id="sbScrim"></div>
<div class="shell">
<aside class="sb" id="sidebar">
  <button class="sb__close" id="sbClose"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 5l10 10M15 5L5 15"/></svg></button>
</aside>
<div class="mn" id="main">
  <div class="tb">
    <button class="tb__menu" id="tbMenu"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 5h14M3 10h14M3 15h14"/></svg></button>
    <div class="tb__title" id="tbTitle">Overview</div>
    <div class="tb__toggle" id="themeToggle"><button class="is-on" data-v="void">Void</button><button data-v="paper">Paper</button></div>
    <div class="tb__toggle" id="dirToggle"><button class="is-on" data-v="ltr">LTR</button><button data-v="rtl">RTL</button></div>
  </div>
  <div class="pg" id="page"></div>
</div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════════════
// KNOBS FRAMEWORK
// ════════════════════════════════════════════════════════════════════════════

let currentKnobs = {};

function buildKnobsHTML(knobs) {
  if (!knobs || !Object.keys(knobs).length) return '';
  let h = '';
  for (const [key, cfg] of Object.entries(knobs)) {
    h += `<div class="kn">`;
    h += `<div class="kn__label">${cfg.label} <code>${key}</code></div>`;
    if (cfg.type === 'select') {
      h += `<div class="kn__seg" data-knob="${key}">`;
      for (const opt of cfg.options) {
        h += `<button data-val="${opt}" class="${currentKnobs[key] === opt ? 'is-on' : ''}">${opt}</button>`;
      }
      h += `</div>`;
    } else if (cfg.type === 'toggle') {
      h += `<label class="switch"><input type="checkbox" data-knob="${key}" ${currentKnobs[key] ? 'checked' : ''}><span class="switch__track"></span></label>`;
    } else if (cfg.type === 'text') {
      h += `<input class="kn__input" data-knob="${key}" value="${esc(currentKnobs[key] || '')}" placeholder="${cfg.placeholder || ''}">`;
    } else if (cfg.type === 'range') {
      h += `<div class="row gap-3"><input class="kn__range" type="range" data-knob="${key}" min="${cfg.min||0}" max="${cfg.max||100}" step="${cfg.step||1}" value="${currentKnobs[key]}"><code style="font-size:11px;color:var(--fg-muted)">${currentKnobs[key]}</code></div>`;
    }
    h += `</div>`;
  }
  return h;
}

function initKnobs(knobs) {
  currentKnobs = {};
  if (!knobs) return;
  for (const [key, cfg] of Object.entries(knobs)) {
    currentKnobs[key] = cfg.default;
  }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function escHTML(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function copyCode(btn) {
  const pre = btn.closest('.codeblock').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent).then(() => { btn.textContent = 'Copied'; setTimeout(() => btn.textContent = 'Copy', 1500); });
}

// ════════════════════════════════════════════════════════════════════════════
// PAGE DEFINITIONS
// ════════════════════════════════════════════════════════════════════════════

const P = {};

// ──────── OVERVIEW ────────
P.overview = {
  title: 'Overview', desc: 'The Proven Routes - a Saudi-native design system.',
  render() {
    return `
    <div class="sects">
      <div class="sect">
        <div style="display:flex;flex-direction:column;gap:var(--sp-6);margin-bottom:var(--sp-7)">
          <div>
            <svg width="200" height="92" viewBox="0 0 140 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M82.7222 21.2108C76.868 21.2108 72.1168 25.962 72.1168 31.8162C72.1168 37.6704 76.868 42.4217 82.7222 42.4217C88.5764 42.4217 93.3277 37.6704 93.3277 31.8162C93.3277 25.962 88.5764 21.2108 82.7222 21.2108ZM82.7222 38.9007C78.8194 38.9007 75.6378 35.719 75.6378 31.8162C75.6378 27.9134 78.8194 24.7318 82.7222 24.7318C86.625 24.7318 89.8067 27.9134 89.8067 31.8162C89.8067 35.719 86.625 38.9007 82.7222 38.9007Z" fill="var(--fg)"/>
              <path d="M57.2692 21.2108C51.415 21.2108 46.6638 25.962 46.6638 31.8162C46.6638 37.6704 51.415 42.4217 57.2692 42.4217C63.1234 42.4217 67.8747 37.6704 67.8747 31.8162C67.8747 25.962 63.1234 21.2108 57.2692 21.2108Z" fill="#64D8AE"/>
              <path d="M31.8162 21.2108C25.962 21.2108 21.2108 25.962 21.2108 31.8162V41.149C21.2108 41.6156 21.5926 41.9974 22.0592 41.9974H23.8834C24.35 41.9974 24.7318 41.6156 24.7318 41.149V31.8162C24.7318 27.9134 27.9134 24.7318 31.8162 24.7318C35.719 24.7318 38.9007 27.9134 38.9007 31.8162V41.149C38.9007 41.6156 39.2824 41.9974 39.7491 41.9974H41.5732C42.0399 41.9974 42.4217 41.6156 42.4217 41.149V31.8162C42.4217 25.962 37.6704 21.2108 31.8162 21.2108Z" fill="var(--fg)"/>
              <path d="M108.175 21.2108C102.321 21.2108 97.5698 25.962 97.5698 31.8162V41.149C97.5698 41.6156 97.9516 41.9974 98.4183 41.9974H100.242C100.709 41.9974 101.091 41.6156 101.091 41.149V31.8162C101.091 27.9134 104.272 24.7318 108.175 24.7318C112.078 24.7318 115.26 27.9134 115.26 31.8162V41.149C115.26 41.6156 115.641 41.9974 116.108 41.9974H117.932C118.399 41.9974 118.781 41.6156 118.781 41.149V31.8162C118.781 25.962 114.029 21.2108 108.175 21.2108Z" fill="var(--fg)"/>
              <path d="M57.0995 36.9068C60.3236 40.046 65.6263 40.046 68.8503 36.9068C69.3594 36.3978 68.511 35.7614 68.0868 36.2281C65.2869 38.9855 60.7478 38.9855 57.9056 36.2281C57.4389 35.7614 56.5905 36.3978 57.0995 36.9068Z" fill="var(--fg)"/>
            </svg>
          </div>
          <div style="font-size:var(--fs-14);color:var(--fg-muted);max-width:55ch">Saudi-native visual language rooted in Empty Quarter geometry, surveyor's-notebook craft and cartographic precision. Void-first. Paper sparingly. Gold is journey signal only.</div>
        </div>
      </div>
      <div class="sect">
        <div class="sect__title">Token Outputs</div>
        <div class="grid grid--4">
          <div class="cell"><code style="color:var(--accent);font-size:12px">dist/tokens.css</code><div style="font-size:12px;color:var(--fg-subtle)">CSS custom properties</div></div>
          <div class="cell"><code style="color:var(--accent);font-size:12px">dist/tokens.scss</code><div style="font-size:12px;color:var(--fg-subtle)">SCSS variables</div></div>
          <div class="cell"><code style="color:var(--accent);font-size:12px">dist/tokens.js</code><div style="font-size:12px;color:var(--fg-subtle)">ES module</div></div>
          <div class="cell"><code style="color:var(--accent);font-size:12px">dist/tokens.native.ts</code><div style="font-size:12px;color:var(--fg-subtle)">React Native</div></div>
        </div>
      </div>
    </div>`;
  }
};

// ──────── COLORS ────────
P.brand = {
  title: 'Brand', desc: 'The core principles that govern every design decision in the system.',
  render() {
    return `<div class="sects">
      <div class="sect"><div class="sect__title">Voice</div>
        <p style="font-size:13px;color:var(--fg-subtle);margin:0 0 16px;max-width:55ch">Quiet authority. The surveyor who has walked this route before, not the hype coach.</p>
        <div class="col gap-5">
          <div class="cell"><div class="cell__label">Pronoun</div><div style="font-size:13px;color:var(--fg-muted)">Second person singular: "you", "your crew". Never "we" addressing the student.</div></div>

P.colors = {
  title: 'Colors', desc: 'The full color palette. Primitives are raw values; semantics map intent to surface.',
  render() {
    const scales = [
      ['Void', [['50','#232c43'],['100','#1a2236'],['200','#10172a'],['300','#0a0f1a'],['400','#060913']]],
      ['Chalk', [['100','#f5f1e8'],['200','#e8e4dc'],['300','#c9c4b8'],['400','#8e8a80']]],
      ['Paper', [['100','#fbf8ef'],['200','#f2ece0'],['300','#e8e1d2']]],
      ['Noon Green', [['100','#c8f4e2'],['200','#9EEACB'],['300','#7FE3BE'],['400','#64D8AE'],['500','#3FAE87'],['600','#2A8A6A'],['700','#194d3b'],['800','#0a3326']]],
      ['Gold', [['200','#f0cf5a'],['300','#e0b83a'],['400','#c9a227'],['500','#8e7019'],['600','#5a4610']]],
      ['Iris', [['300','#C7A8FF'],['400','#B08AF9'],['500','#8E63E0']]],
      ['Blue', [['300','#96BCFF'],['400','#6BA3FF'],['500','#4881E0']]],
      ['Danger', [['300','#e58a7f'],['400','#c55a4e'],['500','#9a4339']]],
      ['Warn', [['400','#d9a74a']]],
      ['Ok', [['300','#a9bc91'],['400','#7a8e64'],['500','#566648']]],
    ];
    let h = '<div class="sects">';
    for (const [name, shades] of scales) {
      const prefix = name.toLowerCase().replace(/ .*/,'');
      h += `<div class="sect"><div class="sect__title">${name}</div><div class="swatches">`;
      for (const [step, hex] of shades) {
        h += `<div class="swatch"><div class="swatch__color" style="background:${hex}"></div><div class="swatch__info"><span class="swatch__name">${prefix}-${step}</span><span class="swatch__hex">${hex}</span></div></div>`;
      }
      h += `</div></div>`;
    }
    // Semantic
    h += `<div class="sect"><div class="sect__title">Semantic Mapping</div>
    <div class="grid grid--2">
      <div class="cell" style="background:#0a0f1a"><div class="cell__label" style="color:#8e8a80">Void Theme</div>
        ${semRow('#0a0f1a','--bg','void-300','#c9c4b8','#8e8a80')}${semRow('#10172a','--bg-raised','void-200','#c9c4b8','#8e8a80')}
        ${semRow('#e8e4dc','--fg','chalk @1.0','#c9c4b8','#8e8a80')}${semRow('rgba(232,228,220,.7)','--fg-muted','chalk @.70','#c9c4b8','#8e8a80')}
        ${semRow('#64D8AE','--accent','noon-400','#c9c4b8','#8e8a80')}${semRow('#c9a227','--signal','gold-400','#c9c4b8','#8e8a80')}
      </div>
      <div class="cell" style="background:#f2ece0"><div class="cell__label" style="color:rgba(10,15,26,.38)">Paper Theme</div>
        ${semRow('#f2ece0','--bg','paper-200','rgba(10,15,26,.55)','rgba(10,15,26,.38)')}${semRow('#fbf8ef','--bg-raised','paper-100','rgba(10,15,26,.55)','rgba(10,15,26,.38)')}
        ${semRow('#0a0f1a','--fg','void-300','rgba(10,15,26,.55)','rgba(10,15,26,.38)')}${semRow('rgba(10,15,26,.72)','--fg-muted','ink @.72','rgba(10,15,26,.55)','rgba(10,15,26,.38)')}
        ${semRow('#64D8AE','--accent','noon-400','rgba(10,15,26,.55)','rgba(10,15,26,.38)')}${semRow('#c9a227','--signal','gold-400','rgba(10,15,26,.55)','rgba(10,15,26,.38)')}
      </div>
    </div></div>`;
    h += '</div>';
    return h;
  }
};
function semRow(bg,label,val,lc,vc){return `<div style="display:flex;align-items:center;gap:12px;padding:5px 0"><div style="width:24px;height:24px;border-radius:3px;background:${bg};box-shadow:inset 0 0 0 1px rgba(128,128,128,.15);flex:none"></div><span style="font-family:var(--font-mono);font-size:11px;color:${lc};flex:1">${label}</span><span style="font-family:var(--font-mono);font-size:10px;color:${vc}">${val}</span></div>`}

        <p style="font-size:13px;color:var(--fg-subtle);margin:0 0 16px;max-width:55ch">Animations that communicate data changes — scores, fill bars, charts. These are slower and more deliberate. <button class="btn btn--ghost btn--sm" style="margin-left:8px" onclick="(function(){document.getElementById('motionCounter').textContent='0';document.getElementById('motionBar').style.width='0%';document.querySelectorAll('#motionSessionBar .session-bar__seg').forEach(function(s){s.style.transform='scaleX(0)';});setTimeout(function(){var el=document.getElementById('motionCounter');var start=performance.now();(function tick(now){var p=Math.min((now-start)/600,1);el.textContent=Math.round(76*(1-Math.pow(1-p,2)));if(p<1)requestAnimationFrame(tick);})(start);document.getElementById('motionBar').style.width='76%';document.querySelectorAll('#motionSessionBar .session-bar__seg').forEach(function(s,i){setTimeout(function(){s.style.transform='scaleX(1)';},i*80);});},200);})()">Replay all</button></p>
        <div class="grid grid--2">

            <div class="cell__label">Score counter roll-up</div>
            <div style="margin:8px 0 10px;font-family:var(--font-mono);font-size:var(--fs-24);font-weight:700;color:var(--fg)" id="motionCounter">76</div>
            <div class="mono" style="font-size:11px;margin-bottom:4px">0 → target, 600ms ease-out</div>
            <div style="font-size:12px;color:var(--fg-faint)">Decelerates near the end. Staggered per tile (30ms).</div>
          </div>
          <div class="cell" style="position:relative">
            <button style="position:absolute;top:8px;right:8px;background:var(--hover-overlay);border:0;width:22px;height:22px;border-radius:50%;cursor:pointer;display:grid;place-items:center;opacity:0.5;transition:opacity 0.12s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.5" onclick="(function(){var el=document.getElementById('motionBar');el.style.transition='none';el.style.width='0%';void el.offsetWidth;el.style.transition='width 600ms cubic-bezier(.22,.61,.36,1)';el.style.width='76%';})()"><svg width="10" height="10" viewBox="0 0 16 16" fill="var(--fg-muted)"><path d="M4 2l10 6-10 6z"/></svg></button>
            <div class="cell__label">Progress bar fill</div>
            <div style="margin:8px 0 10px;height:6px;border-radius:3px;background:var(--bg-sunken);overflow:hidden"><div id="motionBar" style="height:100%;width:76%;border-radius:3px;background:linear-gradient(90deg,#F03D3D,#FFCB45,#27BD86);background-size:300px 100%;transition:width 600ms cubic-bezier(.22,.61,.36,1)"></div></div>
            <div class="mono" style="font-size:11px;margin-bottom:4px">width: 0% → target%, 600ms ease</div>
            <div style="font-size:12px;color:var(--fg-faint)">Gradient bar grows from left.</div>
          </div>
          <div class="cell" style="position:relative">
            <button style="position:absolute;top:8px;right:8px;background:var(--hover-overlay);border:0;width:22px;height:22px;border-radius:50%;cursor:pointer;display:grid;place-items:center;opacity:0.5;transition:opacity 0.12s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.5" onclick="(function(){document.querySelectorAll('#motionSessionBar .session-bar__seg').forEach(function(s){s.style.transition='none';s.style.transform='scaleX(0)';});void document.getElementById('motionSessionBar').offsetWidth;document.querySelectorAll('#motionSessionBar .session-bar__seg').forEach(function(s,i){setTimeout(function(){s.style.transition='transform 200ms cubic-bezier(.22,.61,.36,1)';s.style.transform='scaleX(1)';},i*80);});})()"><svg width="10" height="10" viewBox="0 0 16 16" fill="var(--fg-muted)"><path d="M4 2l10 6-10 6z"/></svg></button>
            <div class="cell__label">Session bar segments</div>
            <div style="margin:8px 0 10px">
              <div class="session-bar" id="motionSessionBar">
                <div class="session-bar__seg is-correct" style="transition:transform 200ms cubic-bezier(.22,.61,.36,1)"></div>
                <div class="session-bar__seg is-correct" style="transition:transform 200ms cubic-bezier(.22,.61,.36,1)"></div>
                <div class="session-bar__seg is-incorrect" style="transition:transform 200ms cubic-bezier(.22,.61,.36,1)"></div>
                <div class="session-bar__seg is-correct" style="transition:transform 200ms cubic-bezier(.22,.61,.36,1)"></div>
                <div class="session-bar__seg" style="transition:transform 200ms cubic-bezier(.22,.61,.36,1)"></div>
                <div class="session-bar__seg" style="transition:transform 200ms cubic-bezier(.22,.61,.36,1)"></div>
              </div>
            </div>
            <div class="mono" style="font-size:11px;margin-bottom:4px">scaleX(0) → 1, 200ms ease, staggered</div>
            <div style="font-size:12px;color:var(--fg-faint)">Each segment grows from left. 80ms stagger.</div>
          </div>
          <div class="cell">
            <div class="cell__label">Chart line draw</div>
            <div style="margin:8px 0 10px">
              <svg width="100%" height="40" viewBox="0 0 200 40"><path d="M10,35 C40,30 60,10 100,15 C140,20 160,8 190,5" stroke="var(--accent)" stroke-width="2" fill="none" stroke-linecap="round"/><circle cx="10" cy="35" r="3" fill="var(--accent)"/><circle cx="100" cy="15" r="3" fill="var(--accent)"/><circle cx="190" cy="5" r="3" fill="var(--accent)"/></svg>
            </div>

      <div class="sect"><div class="sect__title">Celebrations</div>
        <p style="font-size:13px;color:var(--fg-subtle);margin:0 0 16px;max-width:55ch">Reserved for mastery moments. These are the only animations that should feel dramatic — the student earned it. <button class="btn btn--ghost btn--sm" style="margin-left:8px" onclick="(function(){var tile=document.getElementById('motionTile');var star=document.getElementById('motionStar');tile.style.opacity='1';tile.style.transform='scale(1)';tile.style.transition='none';star.style.opacity='0';star.style.transform='scale(1.8)';star.style.transition='none';void tile.offsetWidth;tile.style.transition='transform 0.2s ease';tile.style.transform='scale(1.08)';setTimeout(function(){tile.style.transform='scale(1)';},200);var colors=['#FFCB45','#D4A017','#27BD86','#64D8AE','#fff'];for(var c=0;c<15;c++){(function(){var dot=document.createElement('div');var sz=2+Math.random()*3;dot.style.cssText='position:absolute;width:'+sz+'px;height:'+sz+'px;border-radius:'+(Math.random()>0.5?'50%':'1px')+';background:'+colors[Math.floor(Math.random()*colors.length)]+';left:'+(5+Math.random()*90)+'%;top:-3px;z-index:5;pointer-events:none;opacity:1';tile.appendChild(dot);var dur=400+Math.random()*300;setTimeout(function(){dot.style.transition='transform '+dur+'ms ease-in, opacity '+(dur*0.4)+'ms ease '+(dur*0.6)+'ms';dot.style.transform='translateY(80px) rotate('+Math.floor(Math.random()*360)+'deg)';dot.style.opacity='0';},Math.random()*300);setTimeout(function(){dot.remove();},dur+400);})();}setTimeout(function(){star.style.transition='all 300ms cubic-bezier(.34,1.56,.64,1)';star.style.opacity='1';star.style.transform='scale(1)';},500);setTimeout(function(){tile.style.transition='opacity 0.8s ease';tile.style.opacity='0.4';},1200);})()">Replay</button></p>
        <div class="grid grid--2">
          <div class="cell">
            <div class="cell__label">Mastery confetti</div>
            <div style="margin:8px 0 10px;display:flex;gap:8px;align-items:center">
              <div style="width:48px;height:48px;border-radius:6px;position:relative;overflow:hidden;flex:none" id="motionTile">
                <div style="position:absolute;inset:0;background:rgb(39,189,134);display:flex;align-items:center;justify-content:center">
                  <svg id="motionStar" width="14" height="14" viewBox="0 0 12 12" fill="#141414" style="opacity:0;transform:scale(1.8);transition:all 300ms cubic-bezier(.34,1.56,.64,1)"><path d="M6 0.5L7.5 4.2L11.5 4.6L8.5 7.2L9.3 11.2L6 9.3L2.7 11.2L3.5 7.2L0.5 4.6L4.5 4.2Z"/></svg>
                </div>
                <div style="position:absolute;inset:0;opacity:0.15;background:repeating-linear-gradient(135deg,transparent,transparent 4px,rgba(0,0,0,0.4) 4px,rgba(0,0,0,0.4) 5px);pointer-events:none"></div>
              </div>
              <div style="font-size:11px;color:var(--fg-faint)">Throb → confetti → star → fade</div>
            </div>
            <div class="mono" style="font-size:11px;margin-bottom:4px">20–80 particles, accent/gold/white</div>
            <div style="font-size:12px;color:var(--fg-faint)">Heatmap: 20 pieces, 1s. Interstitial: 80, 3s.</div>
          </div>
          <div class="cell">
            <div class="cell__label">Star stamp</div>
            <div style="margin:8px 0 10px;display:flex;gap:6px;align-items:center">
              <svg width="24" height="24" viewBox="0 0 12 12" fill="var(--accent)"><path d="M6 0.5L7.5 4.2L11.5 4.6L8.5 7.2L9.3 11.2L6 9.3L2.7 11.2L3.5 7.2L0.5 4.6L4.5 4.2Z"/></svg>
              <div style="font-size:11px;color:var(--fg-faint)">Pops in with spring overshoot</div>
            </div>
            <div class="mono" style="font-size:11px;margin-bottom:4px">scale(1.8) → 0.95 → 1, 300ms spring</div>
            <div style="font-size:12px;color:var(--fg-faint)">Triggered after confetti starts falling.</div>
          </div>
          <div class="cell">
            <div class="cell__label">Tile throb</div>
            <div class="mono" style="font-size:11px;margin-bottom:4px">scale(1) → 1.08 → 1, 200ms ease</div>
            <div style="font-size:12px;color:var(--fg-faint)">Quick pulse when mastery confetti fires. Single throb, not a loop.</div>
          </div>
          <div class="cell">
            <div class="cell__label">Mastered tile fade</div>
            <div class="mono" style="font-size:11px;margin-bottom:4px">opacity: 1 → 0.4, 800ms ease</div>
            <div style="font-size:12px;color:var(--fg-faint)">After confetti + star, tile fades to deprioritise. Stripe stays visible.</div>
          </div>
        </div>
      </div>

      <div class="sect"><div class="sect__title">RN Implementation Notes</div>
        <div class="grid grid--2">
          <div class="cell"><div style="font-size:13px;color:var(--fg-muted)"><b>Reanimated:</b> Use <code style="font-family:var(--font-mono);font-size:11px;background:var(--hover-overlay);padding:2px 4px;border-radius:2px">withTiming</code> for most transitions. <code style="font-family:var(--font-mono);font-size:11px;background:var(--hover-overlay);padding:2px 4px;border-radius:2px">withSpring</code> for celebrations (damping: 12, stiffness: 180).</div></div>
          <div class="cell"><div style="font-size:13px;color:var(--fg-muted)"><b>Native driver:</b> Always animate transform and opacity on the native thread. Never animate layout properties (width, height, padding).</div></div>
          <div class="cell"><div style="font-size:13px;color:var(--fg-muted)"><b>Gesture handler:</b> Bottom sheet drag uses <code style="font-family:var(--font-mono);font-size:11px;background:var(--hover-overlay);padding:2px 4px;border-radius:2px">PanGestureHandler</code> with velocity-based snap points. Calendar drag the same.</div></div>
          <div class="cell"><div style="font-size:13px;color:var(--fg-muted)"><b>Reduced motion:</b> Check <code style="font-family:var(--font-mono);font-size:11px;background:var(--hover-overlay);padding:2px 4px;border-radius:2px">AccessibilityInfo.isReduceMotionEnabled</code>. Set all durations to 0, keep state changes.</div></div>
        </div>
      </div>

    </div>`;
  }
};

  render() {

// ──────── WAYPOINTS ────────
P.waypoints = {
  title: 'Waypoints', desc: 'The cartographic markers that show position, progress, and destination on the route. This is the canonical reference.',
  knobs: {
    position: { type:'range', min:0, max:6, step:1, default:3, label:'Current position' },
    count: { type:'select', options:['3','5','7'], default:'7', label:'Waypoints' },
    layout: { type:'select', options:['horizontal','vertical','path'], default:'horizontal', label:'Layout' },
    labels: { type:'toggle', default:false, label:'Show labels' },
  },
  renderCanvas(k) {
    const n = Number(k.count);
    const pos = Math.min(k.position, n-1);

    function marker(cx, cy, state, color) {
      let m = '';
      if (state === 'passed') {
        m += `<rect x="${cx-4}" y="${cy-4}" width="8" height="8" transform="rotate(45 ${cx} ${cy})" fill="#8e7019"/><circle cx="${cx}" cy="${cy}" r="1.5" fill="var(--bg)"/>`;
      } else if (state === 'arrived') {
        m += `<rect x="${cx-4}" y="${cy-4}" width="8" height="8" transform="rotate(45 ${cx} ${cy})" fill="#64D8AE"/>`;
        m += `<polygon points="${cx},${cy-3} ${cx+2.5},${cy+1.5} ${cx-2.5},${cy+1.5}" fill="var(--bg)"/>`;
        m += `<line x1="${cx}" y1="${cy-10}" x2="${cx}" y2="${cy-5}" stroke="#64D8AE" stroke-width="0.75"/><line x1="${cx}" y1="${cy+5}" x2="${cx}" y2="${cy+10}" stroke="#64D8AE" stroke-width="0.75"/><line x1="${cx-8}" y1="${cy}" x2="${cx-5}" y2="${cy}" stroke="#64D8AE" stroke-width="0.75"/><line x1="${cx+5}" y1="${cy}" x2="${cx+8}" y2="${cy}" stroke="#64D8AE" stroke-width="0.75"/>`;
      } else if (state === 'current') {
        m += `<rect x="${cx-4}" y="${cy-4}" width="8" height="8" transform="rotate(45 ${cx} ${cy})" fill="#c9a227"/>`;
        m += `<line x1="${cx}" y1="${cy-10}" x2="${cx}" y2="${cy-5}" stroke="#c9a227" stroke-width="0.75"/><line x1="${cx}" y1="${cy+5}" x2="${cx}" y2="${cy+10}" stroke="#c9a227" stroke-width="0.75"/><line x1="${cx-8}" y1="${cy}" x2="${cx-5}" y2="${cy}" stroke="#c9a227" stroke-width="0.75"/><line x1="${cx+5}" y1="${cy}" x2="${cx+8}" y2="${cy}" stroke="#c9a227" stroke-width="0.75"/>`;
      } else {
        m += `<rect x="${cx-4}" y="${cy-4}" width="8" height="8" transform="rotate(45 ${cx} ${cy})" fill="none" stroke="currentColor" stroke-opacity="0.55" stroke-width="1"/>`;
      }
      return m;
    }

    function getState(i) {
      if (i < pos) return 'passed';
      if (i === pos && pos === n-1) return 'arrived';
      if (i === pos) return 'current';
      return 'incomplete';
    }

    const names = ['Start','Vocabulary','Inference','Analogy','Comprehension','Grammar','Reading','Quantitative','Geometry','Arrival'];
    let h = '';

    if (k.layout === 'horizontal') {
      const sp = 440/(n-1);
      const svgH = k.labels ? 80 : 60;
      h = `<svg width="100%" height="${svgH}" viewBox="0 0 500 ${svgH}" preserveAspectRatio="xMidYMid meet" style="overflow:visible">`;
      for (let i=0;i<n-1;i++){const x1=30+sp*i+6,x2=30+sp*(i+1)-6;h+=`<line x1="${x1}" y1="30" x2="${x2}" y2="30" stroke="#c9a227" stroke-width="${i<pos?2:1}" opacity="${i<pos?0.85:0.4}" ${i>=pos?'stroke-dasharray="4 3"':''}/>`;}
      for (let i=0;i<n;i++){h+=marker(30+sp*i,30,getState(i));}
      if (k.labels) { for (let i=0;i<n;i++){const x=30+sp*i;const st=getState(i);const col=st==='arrived'?'#64D8AE':st==='current'?'#c9a227':st==='passed'?'#8e7019':'currentColor';const op=st==='incomplete'?'0.4':'0.7';h+=`<text x="${x}" y="58" text-anchor="middle" fill="${col}" opacity="${op}" font-family="var(--font-mono)" font-size="7">${i===0?'Start':i===n-1?'Arrival':names[i]||'P'+(i)}</text>`;} }
      h += '</svg>';

    } else if (k.layout === 'vertical') {
      const sp = k.labels ? 56 : 50;
      const totalH = (n-1)*sp+40;
      const svgW = k.labels ? 200 : 60;
      h = `<svg width="${svgW}" height="${totalH}" viewBox="0 0 ${svgW} ${totalH}" style="overflow:visible">`;
      const cx = k.labels ? 30 : 30;
      for (let i=0;i<n-1;i++){const y1=20+sp*i+6,y2=20+sp*(i+1)-6;h+=`<line x1="${cx}" y1="${y1}" x2="${cx}" y2="${y2}" stroke="#c9a227" stroke-width="${i<pos?2:1}" opacity="${i<pos?0.85:0.4}" ${i>=pos?'stroke-dasharray="4 3"':''}/>`;}
      for (let i=0;i<n;i++){h+=marker(cx,20+sp*i,getState(i));}
      if (k.labels) { for (let i=0;i<n;i++){const y=20+sp*i;const st=getState(i);const col=st==='arrived'?'#64D8AE':st==='current'?'#c9a227':st==='passed'?'#8e7019':'currentColor';const op=st==='incomplete'?'0.4':'0.7';h+=`<text x="52" y="${y+4}" fill="${col}" opacity="${op}" font-family="var(--font-mono)" font-size="8">${i===0?'Start':i===n-1?'Arrival':names[i]||'Passage '+(i)}</text>`;} }
      h += '</svg>';

    } else {
      // Path: bottom=start, top=destination. S-curve meandering upward.
      const w = 280, padX = 40, padY = 30;
      const totalH = n * 56;
      const pts = [];
      for (let i=0;i<n;i++){
        const t = i/(n-1); // 0=start(bottom), 1=destination(top)
        const y = totalH - padY - t*(totalH-padY*2); // bottom to top
        const sway = Math.sin(t * Math.PI * 2) * 60; // S-curve
        const x = w/2 + sway;
        pts.push([x,y]);
      }
      h = `<svg width="${w}" height="${totalH}" viewBox="0 0 ${w} ${totalH}" style="overflow:visible">`;
      for (let i=0;i<n-1;i++){
        const [x1,y1]=pts[i], [x2,y2]=pts[i+1];
        const dist = Math.hypot(x2-x1,y2-y1);
        const ux=(x2-x1)/dist, uy=(y2-y1)/dist;
        const sx=x1+ux*7, sy=y1+uy*7, ex=x2-ux*7, ey=y2-uy*7;
        const cpx1=x1+(x2-x1)*0.1, cpy1=y1+(y2-y1)*0.5;
        const cpx2=x2-(x2-x1)*0.1, cpy2=y2-(y2-y1)*0.5;
        h+=`<path d="M${sx},${sy} C${cpx1},${cpy1} ${cpx2},${cpy2} ${ex},${ey}" fill="none" stroke="#c9a227" stroke-width="${i<pos?2:1}" opacity="${i<pos?0.85:0.4}" ${i>=pos?'stroke-dasharray="4 3"':''} stroke-linecap="round"/>`;
      }
      for (let i=0;i<n;i++){h+=marker(pts[i][0],pts[i][1],getState(i));}
      if (k.labels) { for (let i=0;i<n;i++){const [x,y]=pts[i];const st=getState(i);const col=st==='arrived'?'#64D8AE':st==='current'?'#c9a227':st==='passed'?'#8e7019':'currentColor';const op=st==='incomplete'?'0.4':'0.7';const side=x>w/2?-1:1;const tx=x+side*20;h+=`<text x="${tx}" y="${y+4}" text-anchor="${side>0?'start':'end'}" fill="${col}" opacity="${op}" font-family="var(--font-mono)" font-size="8">${i===0?'Start':i===n-1?'Arrival':names[i]||'Passage '+i}</text>`;} }
      h += '</svg>';
    }

    const statusColor = pos===n-1?'color:#64D8AE':'color:var(--fg-faint)';
    return `<div style="width:100%;max-width:520px">${h}<div style="display:flex;justify-content:space-between;margin-top:var(--sp-3)"><span class="mono" style="font-size:10px;color:var(--fg-faint)">${pos+1} of ${n}</span><span class="mono" style="font-size:10px;${statusColor}">${pos===n-1?'Arrived':pos===0?'Starting':'In progress'}</span></div></div>`;
  },
  renderCode(k) {
    return `<!-- Waypoint route with ${k.count} stops, position ${Number(k.position)+1} -->\n<svg viewBox="0 0 500 60">\n  <!-- Dashed remaining -->\n  <line stroke="#c9a227" stroke-dasharray="4 3" opacity="0.4"/>\n  <!-- Solid completed -->\n  <line stroke="#c9a227" stroke-width="2" opacity="0.85"/>\n  <!-- Markers: passed/current/incomplete/arrival -->\n</svg>`;
  },
  sections: `
      <div class="sect"><div class="sect__title">Marker Types</div>
        <div class="grid grid--2">
          <div class="cell">
            <div class="cell__label">Start - dim gold fill, void center dot</div>
            <div style="display:flex;align-items:center;gap:var(--sp-5);margin-top:var(--sp-2)">
              <svg width="12" height="12"><rect x="2" y="2" width="8" height="8" transform="rotate(45 6 6)" fill="#8e7019"/><circle cx="6" cy="6" r="1.5" fill="var(--bg)"/></svg>
              <svg width="36" height="36" viewBox="0 0 12 12"><rect x="2" y="2" width="8" height="8" transform="rotate(45 6 6)" fill="#8e7019"/><circle cx="6" cy="6" r="1.5" fill="var(--bg)"/></svg>
            </div>
            <div style="font-family:var(--font-mono);font-size:9px;color:var(--fg-faint);margin-top:var(--sp-2)">Actual size / 3x zoom</div>
          </div>
          <div class="cell">
            <div class="cell__label">Current position - bright gold, crosshair radials</div>
            <div style="display:flex;align-items:center;gap:var(--sp-5);margin-top:var(--sp-2)">
              <svg width="16" height="16" viewBox="0 0 16 16"><rect x="4" y="4" width="8" height="8" transform="rotate(45 8 8)" fill="#c9a227"/><line x1="8" y1="0" x2="8" y2="4.5" stroke="#c9a227" stroke-width="0.75"/><line x1="8" y1="11.5" x2="8" y2="16" stroke="#c9a227" stroke-width="0.75"/><line x1="0" y1="8" x2="4.5" y2="8" stroke="#c9a227" stroke-width="0.75"/><line x1="11.5" y1="8" x2="16" y2="8" stroke="#c9a227" stroke-width="0.75"/></svg>

P.watervessel = {
  title: 'Water Vessel', desc: 'The currency of the route. A canteen carried across the desert. Proof you did the work and helped others.',
  knobs: {
    fill: { type:'range', min:0, max:18, step:1, default:14, label:'Jugs filled' },
    minimum: { type:'range', min:0, max:18, step:1, default:12, label:'Minimum required' },
    size: { type:'select', options:['sm','md','lg'], default:'lg', label:'Size' },
  },
  renderCanvas(k) {
    const cap = 18;
    const pct = Math.min(k.fill / cap, 1);
    const met = k.fill >= k.minimum;
    const sz = {sm:40,md:72,lg:110}[k.size];
    const wc = met ? '#6BA3FF' : '#c55a4e';
    const ov = pct >= 1;
    // viewBox 0 0 40 56. 3 shapes: body, neck, cap. That's it.
    // Body fills from y=20 to y=52 (32 units)
    const wTop = 52 - pct * 32;

    // Single outline path: cap flows into neck flows into body. One shape.
    // viewBox 0 0 40 56. Body interior from y=18 to y=54.
    var s = '<div style="display:flex;align-items:center;gap:var(--sp-7)">';
    s += '<svg width="'+sz+'" height="'+Math.round(sz*1.4)+'" viewBox="0 0 40 56" fill="none">';

    // Clip to the vessel shape
    var shape = 'M15,4 L25,4 C27,4 28,5 28,7 L28,12 C28,13 27,14 26,14 L26,18 C32,20 34,26 34,34 C34,42 34,48 32,51 C30,54 26,55 20,55 C14,55 10,54 8,51 C6,48 6,42 6,34 C6,26 8,20 14,18 L14,14 C13,14 12,13 12,12 L12,7 C12,5 13,4 15,4 Z';
    s += '<defs><clipPath id="vc"><path d="'+shape+'"/></clipPath></defs>';

    // Water fill
    if (pct > 0) s += '<rect x="4" y="'+wTop+'" width="32" height="'+(57-wTop)+'" fill="'+wc+'" opacity="0.45" clip-path="url(#vc)"/>';
    // Water surface line
    if (pct > 0 && !ov) s += '<line x1="6" y1="'+wTop+'" x2="34" y2="'+wTop+'" stroke="'+wc+'" stroke-width="1.5" opacity="0.7" clip-path="url(#vc)" style="animation:wv-idle 3s ease-in-out infinite"/>';

    // The one outline
    s += '<path d="'+shape+'" stroke="var(--fg-muted)" stroke-width="1.5" stroke-linejoin="round"/>';

    // Overflow drips
    if (ov) {
      s += '<circle cx="36" cy="10" r="1.5" fill="'+wc+'" opacity="0.5"/>';
      s += '<circle cx="38" cy="16" r="1" fill="'+wc+'" opacity="0.4"/>';
    }

    s += '</svg>';
    s += '<div><div style="display:flex;align-items:baseline;gap:var(--sp-2)">';
    s += '<div style="font-family:var(--font-serif);font-size:'+(k.size==='lg'?'var(--fs-32)':'var(--fs-24)')+';color:var(--fg);font-weight:500">'+k.fill+'</div>';
    s += '<div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-faint)">/ '+cap+'</div></div>';
    s += '<div style="font-family:var(--font-mono);font-size:11px;margin-top:var(--sp-1);color:'+wc+'">';
    s += (k.fill>=cap?'Overflowing':met?'Minimum met':(k.minimum-k.fill)+' more needed');
    s += '</div></div></div>';
    return s;
  },

    return `<svg viewBox="0 0 40 52">\n  <clipPath id="vc"><path d="M16,4...Z"/></clipPath>\n  <!-- Water fill -->\n  <rect y="${50-k.fill/18*38}" fill="rgba(107,163,255,0.25)" clip-path="url(#vc)"/>\n  <!-- Wave surface -->\n  <path d="M4,y Q12,y-1.5 20,y..." stroke="rgba(107,163,255,0.6)"/>\n  <!-- Vessel outline -->\n  <path d="M16,4...Z" stroke="fg-muted" fill="none"/>\n</svg>`;

  title: 'Terrain Patterns', desc: 'Topographic contour lines as brand texture. Lines flow together coherently — each follows the one above with slight variation, like real elevation contours.',
  render() {
    // Seeded pseudo-random
    function seeded(s){return function(){s=Math.sin(s)*10000;return s-Math.floor(s)};}

    // Generate terrain as a coherent field — each line inherits the shape of the previous
    function renderTerrain(w, h, color, baseOpacity, opacityRange, maxGap, gapSet, seedBase) {
      var gaps = gapSet || [8,10,7,5,4,3,3,3,4,5,7,10,16,24,18,12,8,6,4,3,3,4,6,9,14,20,14,8,5,4,3,3,4,6,10];
      var pts = 20; // more control points = smoother
      var step = w / (pts - 1);

      // Build a base shape with seeded randomness for irregularity
      var rng = seeded(seedBase || 42);
      var baseShape = [];
      for (var p = 0; p < pts; p++) {
        var s1 = Math.sin(p * 0.18 + 1.2) * 8;
        var s2 = Math.sin(p * 0.42 + 3.8) * 4;
        var s3 = Math.sin(p * 0.85 + 0.5) * 2;
        var irregularity = (rng() - 0.5) * 5; // break the pure sine pattern
        baseShape.push(s1 + s2 + s3 + irregularity);
      }
      // Smooth the base shape so irregularity blends in
      for (var pass = 0; pass < 2; pass++) {
        var smoothed = [];
        for (var p = 0; p < pts; p++) {
          var prev = p > 0 ? baseShape[p-1] : baseShape[p];
          var next = p < pts-1 ? baseShape[p+1] : baseShape[p];
          smoothed.push(prev * 0.25 + baseShape[p] * 0.5 + next * 0.25);
        }
        baseShape = smoothed;
      }

      // Offset base shape so mean is ~0
      var baseSum = 0; for (var bs = 0; bs < baseShape.length; bs++) baseSum += baseShape[bs];
      var baseMean = baseSum / baseShape.length;
      for (var bs = 0; bs < baseShape.length; bs++) baseShape[bs] -= baseMean;

      var lines = []; var y = 0;
      for (var i = 0; i < gaps.length && y < h + 10; i++) {
        var nextGap = gaps[Math.min(i + 1, gaps.length - 1)];
        var a = baseOpacity + (nextGap / maxGap) * opacityRange;
        var lineRng = seeded(seedBase + i * 3.7);

        var drift = (lineRng() - 0.5) * 3;
        var coords = [];
        for (var p = 0; p < pts; p++) {
          var x = p * step;
          var baseOffset = baseShape[p];
          var lineNoise = (lineRng() - 0.5) * 1.5;
          var diverge = Math.sin((p * 0.3) + i * 0.4) * (1.5 + i * 0.12);
          var ly = y + baseOffset + diverge + drift + lineNoise;
          coords.push([Math.round(x * 10) / 10, Math.round(ly * 10) / 10]);
        }

        // Smooth cubic bezier
        var d = 'M' + coords[0][0] + ',' + coords[0][1];
        for (var j = 1; j < coords.length; j++) {
          var prev = coords[j-1], cur = coords[j];
          var cpx = (prev[0] + cur[0]) / 2;
          d += ' C' + cpx + ',' + prev[1] + ' ' + cpx + ',' + cur[1] + ' ' + cur[0] + ',' + cur[1];
        }

        lines.push('<path d="' + d + '" stroke="' + color.replace('ALPHA', a.toFixed(3)) + '" stroke-width="0.8" fill="none"/>');
        y += gaps[i];
      }
      return lines.join('\n');
    }

      }
      return result;
    }
    var standardBase = [7,9,6,5,4,3,3,3,4,5,7,10,16,24,18,12,8,6,4,3,3,4,6,9,14,20,14,8,5,4,3,3,4,6,9];

    return `<div class="sects">

// ──────── BUTTONS ────────
P.buttons = {
  title: 'Buttons', desc: 'Use for primary actions, confirmations, and navigation triggers. Choose variant by importance - primary for the main action, secondary for alternatives, ghost for low-emphasis.',
  tokens(k) {
    const base = ['--btn-h-'+k.size,'--btn-px-md','--btn-radius','--btn-fw','--dur-1','--ease','--focus-ring'];
    if (k.variant==='primary') base.push('--accent','--accent-hover','--accent-active','--accent-fg');
    if (k.variant==='secondary') base.push('--fg','--border-strong','--hover-overlay','--active-overlay');
    if (k.variant==='ghost') base.push('--fg-muted','--fg','--hover-overlay');
    if (k.variant==='danger') base.push('--danger-300','--danger-border','--danger-soft','--danger-glow');
    if (k.variant==='danger-solid') base.push('--danger-400','--chalk-100','--danger-hover','--danger-active');
    if (k.variant==='signal') base.push('--signal-btn-bg','--signal-btn-hover','--signal-btn-active','--signal-btn-fg');
    if (k.disabled) base.push('--fg-disabled', k.variant==='primary'?'--accent-disabled':'--border');
    if (k.loading) base.push('--accent-fg');
    return base;
  },
  knobs: {
    variant: { type:'select', options:['primary','secondary','ghost','danger','danger-solid','signal'], default:'primary', label:'Variant' },
    size: { type:'select', options:['sm','md','lg'], default:'md', label:'Size' },
    disabled: { type:'toggle', default:false, label:'Disabled' },
    loading: { type:'toggle', default:false, label:'Loading' },
    block: { type:'toggle', default:false, label:'Full width' },
    iconOnly: { type:'toggle', default:false, label:'Icon only' },
    label: { type:'text', default:"Begin today's route", label:'Label' },
  },
  renderCanvas(k) {
    const cls = ['btn',`btn--${k.variant}`];
    if (k.size!=='md') cls.push(`btn--${k.size}`);
    if (k.block) cls.push('btn--block');
    if (k.iconOnly) cls.push('btn--icon');
    if (k.loading) cls.push('is-loading');
    if (k.disabled) cls.push('is-disabled');
    const dis = k.disabled ? ' disabled' : '';
    const icon = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 3v10M3 8h10"/></svg>`;
    const content = k.iconOnly ? icon : esc(k.label);
    return `<button class="${cls.join(' ')}"${dis}>${content}</button>`;
  },
  renderCode(k) {
    const cls = ['btn',`btn--${k.variant}`];
    if (k.size!=='md') cls.push(`btn--${k.size}`);
    if (k.block) cls.push('btn--block');
    if (k.iconOnly) cls.push('btn--icon');
    if (k.loading) cls.push('is-loading');
    return `<button class="${cls.join(' ')}"${k.disabled?' disabled':''}>${k.iconOnly?'<!-- icon -->':esc(k.label)}</button>`;
  },
  sections: `
    <div class="sect"><div class="sect__title">All Variants</div>
      <div class="grid grid--auto">${['primary','secondary','ghost','danger','danger-solid'].map(v=>`<div class="cell"><div class="cell__label">${v}</div><button class="btn btn--${v}">Label</button></div>`).join('')}</div>
    </div>
    <div class="sect"><div class="sect__title">All Sizes</div>
      <div class="grid grid--3">${['sm','md','lg'].map(s=>`<div class="cell"><div class="cell__label">${s}</div><button class="btn btn--primary btn--${s}">Label</button></div>`).join('')}</div>
    </div>
    <div class="sect"><div class="sect__title">All States</div>
      <div class="grid grid--auto">
        <div class="cell"><div class="cell__label">Default</div><button class="btn btn--primary">Label</button></div>
        <div class="cell"><div class="cell__label">Disabled</div><button class="btn btn--primary" disabled>Label</button></div>
        <div class="cell"><div class="cell__label">Loading</div><button class="btn btn--primary is-loading">Label</button></div>
        <div class="cell"><div class="cell__label">Sec. disabled</div><button class="btn btn--secondary" disabled>Label</button></div>
        <div class="cell"><div class="cell__label">Sec. loading</div><button class="btn btn--secondary is-loading">Label</button></div>
        <div class="cell"><div class="cell__label">Ghost disabled</div><button class="btn btn--ghost" disabled>Label</button></div>
        <div class="cell"><div class="cell__label">Danger disabled</div><button class="btn btn--danger" disabled>Label</button></div>
      </div>
    </div>
    <div class="sect"><div class="sect__title">Additional Patterns</div>
      <div class="col gap-5">
        <div class="cell"><div class="cell__label">Very long label (truncates)</div><button class="btn btn--primary" style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;text-align:center">This is an extremely long button label that should truncate gracefully</button></div>
        <div class="cell"><div class="cell__label">Single character</div><div class="row"><button class="btn btn--primary btn--sm">A</button><button class="btn btn--secondary btn--sm">B</button></div></div>
        <div class="cell"><div class="cell__label">With icon + label</div><button class="btn btn--primary"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7h8M8 4l3 3-3 3"/></svg> Begin route</button></div>
        <div class="cell"><div class="cell__label">Icon only (all sizes)</div><div class="row">
          <button class="btn btn--secondary btn--icon btn--sm"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 3v8M3 7h8"/></svg></button>
          <button class="btn btn--secondary btn--icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 3v10M3 8h10"/></svg></button>
          <button class="btn btn--secondary btn--icon btn--lg"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 4v10M4 9h10"/></svg></button>
        </div></div>
        <div class="cell"><div class="cell__label">Full width</div><button class="btn btn--primary btn--block">Full width button</button></div>
        <div class="cell"><div class="cell__label">Button group</div><div class="row gap-2"><button class="btn btn--secondary btn--sm">Day</button><button class="btn btn--secondary btn--sm">Week</button><button class="btn btn--primary btn--sm">Month</button></div></div>
        <div class="cell"><div class="cell__label">All variants loading</div><div class="row">${['primary','secondary','ghost','danger','danger-solid'].map(v=>`<button class="btn btn--${v} is-loading">L</button>`).join('')}</div></div>
      </div>
    </div>`
};

  tokens: ['--input-h','--input-px','--input-bg','--input-bg-hover','--input-border','--input-border-hover','--input-border-focus','--input-border-err','--input-radius','--fg','--fg-faint','--fg-subtle','--danger-300','--blue-400','--focus-ring'],
  knobs: {

    const cls = ['input']; const attrs = [];

    if (k.value) attrs.push(`value="${esc(k.value)}"`);
    attrs.push(`placeholder="${esc(k.placeholder)}"`);
    let input = `<input class="${cls.join(' ')}" type="${k.type}" ${attrs.join(' ')}>`;

  },
  renderCode(k) {
    return `<div class="field">\n  <label class="field__label">Label</label>\n  <input class="input${k.error?' is-error':''}" type="${k.type}" placeholder="..."${k.disabled?' disabled':''}>\n</div>`;
  },
  sections: `
    <div class="sect"><div class="sect__title">All States</div>
      <div class="grid grid--2">

        <div class="cell"><div class="cell__label">Error</div><div class="field"><label class="field__label">Email</label><input class="input is-error" value="bad"><span class="field__err">Invalid email</span></div></div>
        <div class="cell"><div class="cell__label">Disabled</div><div class="field"><label class="field__label">Email</label><input class="input" disabled value="Cannot edit"></div></div>
        <div class="cell"><div class="cell__label">Read-only</div><div class="field"><label class="field__label">Email</label><input class="input is-readonly" readonly value="sarah@noon.academy"></div></div>
        <div class="cell"><div class="cell__label">With hint</div><div class="field"><label class="field__label">Password <em>Required</em></label><input class="input" type="password" placeholder="Min 8 chars"><span class="field__hint">Minimum 8 characters</span></div></div>
        <div class="cell"><div class="cell__label">With icon</div><div class="field"><label class="field__label">Search</label><div class="input-group"><svg class="input-group__icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5L14 14"/></svg><input class="input" placeholder="Search passages..."></div></div></div>
      </div>
    </div>
    <div class="sect"><div class="sect__title">All Variants</div>
      <div class="col gap-5">
        <div class="cell"><div class="cell__label">Long placeholder (truncates)</div><input class="input" placeholder="This is an extremely long placeholder text that goes on and on and should not break the layout but instead truncate gracefully"></div>

};

  renderCode(k) {
    return `<div class="seg">\n  <button class="is-on">Day</button>\n  <button>Week</button>\n  <button>Month</button>\n</div>`;

  sections: `

      <div class="col gap-5">

P.pagination = {
  title: 'Pagination', desc: 'Use when data is split across pages - crew lists, passage archives, search results. Shows current position and total.',
  knobs: {
    pages: { type:'select', options:['3','5','10','20'], default:'5', label:'Pages' },
    current: { type:'range', min:1, max:20, step:1, default:1, label:'Current page' },
  },
  renderCanvas(k) {
    const total = Number(k.pages);
    const cur = Math.min(k.current, total);
    let h = '<div class="pagination" data-interactive="pagination">';
    h += `<button${cur===1?' disabled':''}>&lt;</button>`;
    if (total <= 7) {
      for (let i = 1; i <= total; i++) h += `<button class="${i===cur?'is-on':''}">${i}</button>`;
    } else {
      h += `<button class="${cur===1?'is-on':''}">1</button>`;
      if (cur > 3) h += '<button>...</button>';
      for (let i = Math.max(2, cur-1); i <= Math.min(total-1, cur+1); i++) h += `<button class="${i===cur?'is-on':''}">${i}</button>`;
      if (cur < total-2) h += '<button>...</button>';
      h += `<button class="${cur===total?'is-on':''}">${total}</button>`;
    }
    h += `<button${cur===total?' disabled':''}>&gt;</button>`;
    return h + '</div>';
  },
  renderCode(k) {
    return `<div class="pagination">\n  <button>&lt;</button>\n  <button class="is-on">1</button>\n  <button>2</button>\n  <button>&gt;</button>\n</div>`;

// ──────── LINEAR & CIRCULAR PROGRESS ────────
P.progress = {
  title: 'Linear & Circular', desc: 'Utility progress indicators for uploads, loading states, and capacity meters. For student progress use Route Steps or Session Bar.',
  tokens(k) {
    const base = ['--accent','--r-pill','--dur-3','--ease'];

  },
  renderCode(k) {
    if (k.type==='circular') return `<div class="circ">\n  <svg viewBox="0 0 48 48">\n    <circle class="circ__track" cx="24" cy="24" r="20" stroke-width="3"/>\n    <circle class="circ__bar" cx="24" cy="24" r="20" stroke-width="3"\n      stroke-dasharray="125.6" stroke-dashoffset="..."/>\n  </svg>\n  <span class="circ__val">${k.value}%</span>\n</div>`;

        <div class="cell"><div class="cell__label">Indeterminate</div><div class="progress is-indeterminate"><div class="progress__bar"></div></div></div>

      <div class="grid grid--2">
        <div class="cell"><div style="font-size:13px;color:var(--fg-muted)">Linear and circular are for utility only — uploads, loading, capacity</div></div>

};

  },
  afterRender() {
    var canvas = document.getElementById('canvas');
    if (!canvas) return;
    var frame = canvas.querySelector('[style*="border-radius:24px"]');
    if (!frame) return;
    var children = frame.children;
    var scrim = children[1];
    var sheet = children[2];
    if (!sheet || !scrim) return;
    var handleBar = sheet.children[0];
    function close() {
      sheet.style.transform = 'translateY(100%)';
      scrim.style.background = 'rgba(6,9,19,0)';
      scrim.style.pointerEvents = 'none';
    }
    function open() {
      sheet.style.transform = 'translateY(0)';
      scrim.style.background = 'rgba(6,9,19,0.5)';
      scrim.style.pointerEvents = 'auto';
    }
    scrim.addEventListener('click', close);
    if (handleBar) handleBar.style.cursor = 'grab';
    // Drag down to dismiss
    var startY = 0, drag = false;
    sheet.addEventListener('mousedown', function(e) {
      if (e.target === handleBar || e.target.parentElement === handleBar || e.target === sheet.children[0]) {
        startY = e.clientY; drag = true;
      }
    });
    document.addEventListener('mousemove', function(e) {
      if (!drag) return;
      if (e.clientY - startY > 40) { close(); drag = false; }
    });
    document.addEventListener('mouseup', function() { drag = false; });
    // Click scrim to reopen (for demo)
    frame.children[0].addEventListener('click', function() {
      if (sheet.style.transform === 'translateY(100%)') open();
    });

    for (var i = 0; i < totalPieces; i++) {
      (function() {
        var dot = document.createElement('div');
        var size = 4 + Math.random() * 8;
        var left = Math.random() * 100;
        var delay = Math.random() * streamDuration;
        var fallTime = 1800 + Math.random() * 1500;
        var drift = (Math.random() - 0.5) * 80;
        var rotation = Math.floor(Math.random() * 720);
        var color = colors[Math.floor(Math.random() * colors.length)];
        var isRect = Math.random() > 0.5;
        var h = isRect ? size * 0.4 : size;
        var br = isRect ? '2px' : '50%';
        dot.style.cssText = 'position:absolute;width:' + size + 'px;height:' + h + 'px;border-radius:' + br + ';background:' + color + ';left:' + left + '%;top:-12px;opacity:1;pointer-events:none;z-index:2';
        container.appendChild(dot);
        setTimeout(function() {
          var fadeDur = Math.round(fallTime * 0.5);
          dot.style.transition = 'transform ' + fallTime + 'ms cubic-bezier(0.15,0.6,0.35,1), opacity ' + fadeDur + 'ms ease-in';
          dot.style.transform = 'translateY(700px) translateX(' + drift + 'px) rotate(' + rotation + 'deg)';
          dot.style.opacity = '0';
        }, delay);
        setTimeout(function() { dot.remove(); }, delay + fallTime + 100);
      })();
    }
  },
  renderCode() {
    return `<!-- Full-screen mobile interstitial -->
<div class="interstitial">
  <div class="interstitial__confetti">
    <!-- JS-spawned confetti particles -->
  </div>
  <div class="interstitial__image">

  </div>
</div>`;
  },
  sections: `

P.video = {
  title: 'Video Player', desc: '16:9 video with play/pause, progress bar, timestamp, fullscreen toggle. Collapsible to mini player.',
  tokens() {
    return ['--void-400','--chalk-100','--accent','--r-2','--r-3','--sp-3','--sp-4','--dur-1','--ease','--font-mono','--fs-11'];
  },
  knobs: {
    state: { type:'select', options:['paused','playing','ended'], default:'paused', label:'State' },
    progress: { type:'range', min:0, max:100, step:1, default:35, label:'Progress %' },
    size: { type:'select', options:['default','mini'], default:'default', label:'Size' },
  },
  renderCanvas(k) {
    const mini = k.size === 'mini' ? ' video--mini' : '';
    const playing = k.state === 'playing' ? ' is-playing' : '';
    const totalMins = 12.5;
    const elapsed = k.progress * totalMins / 100;
    const remaining = totalMins - elapsed;
    const eMins = Math.floor(elapsed); const eSecs = Math.floor((elapsed - eMins) * 60);
    const rMins = Math.floor(remaining); const rSecs = Math.floor((remaining - rMins) * 60);
    const time = k.size === 'mini'
      ? '-' + rMins + ':' + String(rSecs).padStart(2,'0')
      : eMins + ':' + String(eSecs).padStart(2,'0') + ' / 12:30';
    return `<div style="width:100%;max-width:${k.size==='mini'?'160px':'420px'}">
      <div class="video${mini}${playing}">
        <div style="position:absolute;inset:0;background:var(--void-300)"></div>
        <button class="video__play"><svg viewBox="0 0 20 20"><path d="M6 3l12 7-12 7z"/></svg></button>
        <div class="video__overlay">
          <div class="video__controls">
            <button class="video__btn"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">${k.state==='playing'?'<rect x="3" y="2" width="4" height="12" rx="1"/><rect x="9" y="2" width="4" height="12" rx="1"/>':'<path d="M4 2l10 6-10 6z"/>'}</svg></button>
            <span class="video__time">${time}</span>
            <div class="video__bar"><div class="video__bar-fill" style="width:${k.progress}%"></div></div>
            <button class="video__btn"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 5V2h3M11 2h3v3M14 11v3h-3M5 14H2v-3"/></svg></button>
          </div>
        </div>
      </div>
    </div>`;
  },
  renderCode(k) {
    return `<div class="video${k.size==='mini'?' video--mini':''}">
  <img class="video__poster" src="..." alt="...">
  <button class="video__play">▶</button>
  <div class="video__overlay">
    <div class="video__controls">
      <button class="video__btn">⏸</button>
      <span class="video__time">1:24 / 12:30</span>
      <div class="video__bar">
        <div class="video__bar-fill" style="width:35%"></div>
      </div>
      <button class="video__btn">⛶</button>
    </div>
  </div>
</div>`;
  },
  afterRender() {
    var canvas = document.getElementById('canvas');
    if (!canvas) return;
    var video = canvas.querySelector('.video');
    if (!video) return;
    var playBtn = video.querySelector('.video__play');
    var ctrlPlay = video.querySelector('.video__btn');
    var btns = video.querySelectorAll('.video__btn');
    var fsBtn = btns.length > 1 ? btns[1] : null;
    var fill = video.querySelector('.video__bar-fill');
    var timeEl = video.querySelector('.video__time');
    var bar = video.querySelector('.video__bar');
    var playing = false;
    var progress = parseFloat(fill ? fill.style.width : 0) || 0;
    var interval;

    function formatTime(pct) {
      var total = 750;
      var c = Math.floor(pct / 100 * total);
      return Math.floor(c/60) + ':' + String(c%60).padStart(2,'0') + ' / 12:30';
    }

    function togglePlay() {
      playing = !playing;
      video.classList.toggle('is-playing', playing);
      if (ctrlPlay) ctrlPlay.innerHTML = playing
        ? '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="2" width="4" height="12" rx="1"/><rect x="9" y="2" width="4" height="12" rx="1"/></svg>'
        : '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2l10 6-10 6z"/></svg>';
      if (playing) {
        interval = setInterval(function() {
          progress = Math.min(100, progress + 0.3);
          if (fill) fill.style.width = progress + '%';
          if (timeEl) timeEl.textContent = formatTime(progress);
          if (progress >= 100) { clearInterval(interval); playing = false; video.classList.remove('is-playing'); }
        }, 100);
      } else { clearInterval(interval); }
    }

    if (playBtn) playBtn.addEventListener('click', togglePlay);
    if (ctrlPlay) ctrlPlay.addEventListener('click', function(e) { e.stopPropagation(); togglePlay(); });
    if (fsBtn) fsBtn.addEventListener('click', function(e) { e.stopPropagation(); video.classList.toggle('is-fullscreen'); });
    if (bar) bar.addEventListener('click', function(e) {
      var r = bar.getBoundingClientRect();
      progress = (e.clientX - r.left) / r.width * 100;
      if (fill) fill.style.width = progress + '%';
      if (timeEl) timeEl.textContent = formatTime(progress);
    });
  },
  sections: `
    <div class="sect"><div class="sect__title">Sizes</div>
      <div class="row gap-5" style="align-items:flex-start">
        <div style="flex:1;max-width:360px">
          <div class="cell__label" style="margin-bottom:8px">Default (16:9)</div>
          <div class="video">
            <div style="position:absolute;inset:0;background:var(--void-300)"></div>
            <button class="video__play"><svg viewBox="0 0 20 20" style="width:20px;height:20px;fill:currentColor"><path d="M6 3l12 7-12 7z"/></svg></button>
            <div class="video__overlay">
              <div class="video__controls">
                <button class="video__btn"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2l10 6-10 6z"/></svg></button>
                <span class="video__time">0:00 / 12:30</span>
                <div class="video__bar"><div class="video__bar-fill" style="width:0%"></div></div>
                <button class="video__btn"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 5V2h3M11 2h3v3M14 11v3h-3M5 14H2v-3"/></svg></button>
              </div>
            </div>
          </div>
        </div>
        <div>
          <div class="cell__label" style="margin-bottom:8px">Mini (collapsed)</div>
          <div class="video video--mini">
            <div style="position:absolute;inset:0;background:var(--void-300)"></div>
            <button class="video__play" style="width:32px;height:32px"><svg viewBox="0 0 20 20" style="width:14px;height:14px;fill:currentColor"><path d="M6 3l12 7-12 7z"/></svg></button>
          </div>
        </div>
      </div>
    </div>
    <div class="sect"><div class="sect__title">Rules</div>
      <div class="grid grid--2">
        <div class="cell"><div style="font-size:13px;color:var(--fg-muted)"><b>Aspect ratio:</b> 16:9 default. Mini is 160×90px fixed.</div></div>
        <div class="cell"><div style="font-size:13px;color:var(--fg-muted)"><b>Controls:</b> Play/pause, progress bar, timestamp, fullscreen toggle. Overlay fades on idle.</div></div>
        <div class="cell"><div style="font-size:13px;color:var(--fg-muted)"><b>Fullscreen:</b> Expands to fixed position covering viewport. Border-radius drops to 0.</div></div>
        <div class="cell"><div style="font-size:13px;color:var(--fg-muted)"><b>Mini:</b> Collapsed PiP-style. No controls visible, just play button. Click to expand.</div></div>
      </div>
    </div>`
};
