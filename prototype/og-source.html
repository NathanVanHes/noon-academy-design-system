<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: #0D0D12;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 24px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  .tutor-container {
    position: relative;
    width: 200px; height: 200px;
    display: flex; align-items: center; justify-content: center;
  }

  /* Aura — soft iris glow behind core */
  .aura {
    position: absolute;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(176,138,249,0.10);
    animation: aura-pulse 2s ease-in-out infinite;
  }

  @keyframes aura-pulse {
    0%, 100% { transform: scale(0.95); }
    50% { transform: scale(1.05); }
  }

  /* Orbiting particles */
  .orbit {
    position: absolute;
    width: 140px; height: 140px;
    animation: orbit-spin 2s linear infinite;
  }
  .orbit .dot {
    position: absolute;
    border-radius: 50%;
    background: rgba(176,138,249,0.50);
  }
  .orbit .dot-1 { width: 10px; height: 10px; top: 0; left: 64px; }
  .orbit .dot-2 { width: 8px; height: 8px; bottom: 0; left: 64px; background: rgba(176,138,249,0.40); }
  .orbit .dot-3 { width: 6px; height: 6px; top: 64px; right: 0; background: rgba(176,138,249,0.40); }

  @keyframes orbit-spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* Core — contracted, pulsing */
  .core {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: #B08AF9;
    box-shadow: 0 0 24px rgba(176,138,249,0.4);
    animation: core-pulse 2s ease-in-out infinite;
    position: relative;
    z-index: 1;
  }

  @keyframes core-pulse {
    0%, 100% { transform: scale(0.96); }
    50% { transform: scale(1.04); }
  }

  .label {
    color: rgba(255,255,255,0.4);
    font-size: 14px; font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="tutor-container">
    <div class="aura"></div>
    <div class="orbit">
      <div class="dot dot-1"></div>
      <div class="dot dot-2"></div>
      <div class="dot dot-3"></div>
    </div>
    <div class="core"></div>
  </div>
  <div class="label">Aura — a voice tutor by Noon Academy</div>
</body>
</html>
