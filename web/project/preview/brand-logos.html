<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;background:var(--void)}
  .row{display:grid;grid-template-columns:1fr 1fr;height:200px}
  .cell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;position:relative}
  .dark{background:#0a0f1a}
  .light{background:#f2ece0;border-left:1px solid rgba(10,15,26,.08)}
  .tag{position:absolute;top:14px;left:16px;font-family:'Work Sans';font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase}
  .dark .tag{color:rgba(232,228,220,.4)}
  .light .tag{color:rgba(10,15,26,.45)}
  .hex{font-family:'JetBrains Mono';font-size:10px;position:absolute;bottom:14px;left:16px}
  .dark .hex{color:rgba(232,228,220,.45)}
  .light .hex{color:rgba(10,15,26,.5)}
  img{height:52px;display:block}
</style></head><body>
<div class="row">
  <div class="cell dark">
    <span class="tag">On Void</span>
    <img src="../assets/noon-logo-light.svg" alt="Noon">
    <span class="hex">chalk #E8E4DC · noon #64D8AE</span>
  </div>
  <div class="cell light">
    <span class="tag">On Paper</span>
    <img src="../assets/noon-logo.svg" alt="Noon">
    <span class="hex">ink #141414 · noon #64D8AE</span>
  </div>
</div>
</body></html>
