<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--void);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .chip{font-family:'Work Sans';font-size:12px;font-weight:500;height:28px;padding:0 12px;border-radius:2px;display:inline-flex;align-items:center;gap:6px;color:#e8e4dc;background:rgba(232,228,220,.06);box-shadow:inset 0 0 0 1px rgba(232,228,220,.1);cursor:default}
  body.rtl .chip{font-family:'Noto Naskh Arabic',serif;font-size:13px;height:30px}
  .chip.on{background:rgba(100,216,174,.14);color:#64D8AE;box-shadow:inset 0 0 0 1px rgba(100,216,174,.35)}
  .chip.caps{font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:700}
  body.rtl .chip.caps{letter-spacing:0;text-transform:none;font-size:13px}
  .chip.gold{color:#e0b83a;background:rgba(224,184,58,.08);box-shadow:inset 0 0 0 1px rgba(224,184,58,.3)}
  .chip.danger{color:#d97b70;background:rgba(197,90,78,.08);box-shadow:inset 0 0 0 1px rgba(197,90,78,.35)}
  .dot{width:6px;height:6px;background:currentColor;transform:rotate(45deg)}
  .dis{padding-inline-end:4px;gap:8px}
  .x{width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;border-radius:2px;cursor:pointer;color:inherit;opacity:.55;margin-inline-start:2px;transition:all 120ms}
  .x:hover{opacity:1;background:rgba(232,228,220,.08)}
  .x svg{width:10px;height:10px;stroke:currentColor;stroke-width:1.5;fill:none}
  .row{display:flex;gap:10px;flex-wrap:wrap;width:100%;align-items:center}
  .lbl{font-family:'Work Sans';font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;color:rgba(232,228,220,.35);width:96px;flex:none}
  body.rtl .lbl{font-family:'Noto Naskh Arabic',serif;font-size:13px;letter-spacing:0;text-transform:none;font-weight:700;color:rgba(232,228,220,.5)}
</style></head><body>
<div class="row">
  <span class="lbl" data-en="Filter" data-ar="تصفية">Filter</span>
  <span class="chip on"><span class="dot"></span><span data-en="Reading" data-ar="قراءة">Reading</span></span>
  <span class="chip" data-en="Verbal" data-ar="لفظي">Verbal</span>
  <span class="chip" data-en="Quantitative" data-ar="كمي">Quantitative</span>
  <span class="chip caps" data-en="Qudrat" data-ar="قدرات">Qudrat</span>
  <span class="chip gold"><span class="dot"></span><span data-en="On route" data-ar="على المسار">On route</span></span>
</div>
<div class="row">
  <span class="lbl" data-en="Dismissible" data-ar="قابلة للإزالة">Dismissible</span>
  <span class="chip on dis"><span class="dot"></span><span data-en="Reading" data-ar="قراءة">Reading</span><span class="x" role="button" aria-label="Remove"><svg viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8"/></svg></span></span>
  <span class="chip dis"><span data-en="Inference" data-ar="استنتاج">Inference</span><span class="x" role="button" aria-label="Remove"><svg viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8"/></svg></span></span>
  <span class="chip dis"><span data-en="Week 3–4" data-ar="أسبوع 3–4">Week 3–4</span><span class="x" role="button" aria-label="Remove"><svg viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8"/></svg></span></span>
  <span class="chip gold dis"><span class="dot"></span><span>QDR-08</span><span class="x" role="button" aria-label="Remove"><svg viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8"/></svg></span></span>
  <span class="chip danger dis"><span data-en="Attention" data-ar="انتباه">Attention</span><span class="x" role="button" aria-label="Remove"><svg viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8"/></svg></span></span>
</div>
<script src="dir-toggle.js"></script>
</body></html>
