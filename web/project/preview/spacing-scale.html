<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:36px;background:var(--void)}
  .r{display:flex;gap:20px;align-items:flex-end}
  .c{display:flex;flex-direction:column;align-items:center;gap:8px}
  .b{background:#e8e4dc}
  .cap{font-family:'Work Sans';font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;color:rgba(232,228,220,.45)}
  .n{font-family:'JetBrains Mono';font-size:10px;color:rgba(232,228,220,.7)}
</style></head><body>
<div class="r">
  <div class="c"><div class="b" style="width:4px;height:4px"></div><span class="cap">s1</span><span class="n">4</span></div>
  <div class="c"><div class="b" style="width:8px;height:8px"></div><span class="cap">s2</span><span class="n">8</span></div>
  <div class="c"><div class="b" style="width:12px;height:12px"></div><span class="cap">s3</span><span class="n">12</span></div>
  <div class="c"><div class="b" style="width:16px;height:16px"></div><span class="cap">s4</span><span class="n">16</span></div>
  <div class="c"><div class="b" style="width:24px;height:24px"></div><span class="cap">s5</span><span class="n">24</span></div>
  <div class="c"><div class="b" style="width:32px;height:32px"></div><span class="cap">s6</span><span class="n">32</span></div>
  <div class="c"><div class="b" style="width:48px;height:48px"></div><span class="cap">s7</span><span class="n">48</span></div>
  <div class="c"><div class="b" style="width:64px;height:64px"></div><span class="cap">s8</span><span class="n">64</span></div>
</div>
</body></html>
