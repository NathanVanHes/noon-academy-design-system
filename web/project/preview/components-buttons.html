<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:36px;background:var(--void);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  button{font-family:'Work Sans';font-size:14px;font-weight:600;letter-spacing:-.005em;border:0;cursor:pointer;height:44px;padding:0 22px;border-radius:4px;display:inline-flex;align-items:center;gap:8px;transition:all 160ms cubic-bezier(.22,.61,.36,1)}
  body.rtl button{font-family:'Noto Naskh Arabic',serif;font-size:15px}
  .primary{background:#64D8AE;color:#0a3326}
  .primary:hover{background:#7FE3BE}
  .secondary{background:transparent;color:#e8e4dc;box-shadow:inset 0 0 0 1px rgba(232,228,220,.22)}
  .secondary:hover{box-shadow:inset 0 0 0 1px rgba(232,228,220,.5)}
  .ghost{background:transparent;color:rgba(232,228,220,.7);padding:0 12px}
  .ghost:hover{color:#e8e4dc}
  .danger{background:transparent;color:#c55a4e;box-shadow:inset 0 0 0 1px rgba(197,90,78,.4)}
  .sm{height:32px;padding:0 14px;font-size:13px}
  body.rtl .sm{font-size:14px}
  .arrow{width:14px;height:14px;stroke:currentColor;stroke-width:1.5;fill:none}
</style></head><body>
<button class="primary"><span data-en="Begin today's route" data-ar="ابدأ مسار اليوم">Begin today's route</span> <svg class="arrow flip-rtl" viewBox="0 0 14 14"><path d="M3 7h8M8 4l3 3-3 3"/></svg></button>
<button class="secondary" data-en="View crew" data-ar="عرض الفريق">View crew</button>
<button class="ghost" data-en="Skip" data-ar="تخطي">Skip</button>
<button class="primary sm" data-en="Save" data-ar="حفظ">Save</button>
<button class="danger sm" data-en="Unenroll" data-ar="إلغاء التسجيل">Unenroll</button>
<script src="dir-toggle.js"></script>
</body></html>
