<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;background:var(--void)}
  .grid{display:grid;grid-template-columns:1fr 1fr 1.2fr;height:160px}
  .sw{padding:16px;display:flex;flex-direction:column;justify-content:space-between;border-right:1px solid rgba(232,228,220,.08)}
  .name{font-family:'Work Sans';font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(232,228,220,.45)}
  .hex{font-family:'JetBrains Mono';font-size:11px;color:rgba(232,228,220,.7)}
  .note{font-family:'Crimson Pro';font-style:italic;font-size:12px;color:rgba(232,228,220,.55);line-height:1.35}
  .dot{width:10px;height:10px;background:currentColor;transform:rotate(45deg);margin-bottom:8px}
</style></head><body>
<div class="grid">
  <div class="sw"><div class="dot" style="color:#c55a4e"></div><span class="name">Attention</span><div><div class="note">Rare. Once per screen, max.</div><span class="hex">#C55A4E</span></div></div>
  <div class="sw"><div class="dot" style="color:#7a8e64"></div><span class="name">Arrived</span><div><div class="note">Earned. Desaturated.</div><span class="hex">#7A8E64</span></div></div>
  <div class="sw" style="border-right:0"><span class="name">Opacity scale</span><div style="display:flex;gap:2px;align-items:center;margin:8px 0">
    <span style="width:28px;height:28px;background:#e8e4dc"></span>
    <span style="width:28px;height:28px;background:rgba(232,228,220,.7)"></span>
    <span style="width:28px;height:28px;background:rgba(232,228,220,.45)"></span>
    <span style="width:28px;height:28px;background:rgba(232,228,220,.22)"></span>
    <span style="width:28px;height:28px;background:rgba(232,228,220,.08)"></span>
  </div><div class="note">Foreground = chalk × opacity. Never new grays.</div></div>
</div>
</body></html>
