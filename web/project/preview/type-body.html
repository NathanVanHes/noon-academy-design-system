<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px 36px;background:var(--void);color:var(--chalk)}

</style></head><body>
  <div class="r"><span class="k">Lead</span><span class="b" style="font-size:18px;color:#e8e4dc">Twelve students on this route. Sarah can help Farida through the inference passage.</span><span class="m">18 / 28</span></div>
  <div class="r"><span class="k">Body</span><span class="b" style="font-size:15px;color:rgba(232,228,220,.75)">The routes are engineered and reliable. Thousands have crossed this terrain before you.</span><span class="m">15 / 23</span></div>
  <div class="r"><span class="k">Small</span><span class="b" style="font-size:13px;color:rgba(232,228,220,.55)">Auto-saved to crew log · 3 minutes ago</span><span class="m">13 / 20</span></div>
</body></html>
