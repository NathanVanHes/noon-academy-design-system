<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;background:var(--void)}
  nav{display:flex;gap:4px;padding:10px 12px;border-bottom:1px solid rgba(232,228,220,.08);background:#10172a}
  .item{font-family:'Work Sans';font-size:13px;font-weight:500;color:rgba(232,228,220,.55);padding:10px 16px;border-radius:4px;display:flex;align-items:center;gap:8px;cursor:pointer}
  body.rtl .item{font-family:'Noto Naskh Arabic',serif;font-size:14px;font-weight:600}
  .item:hover{color:#e8e4dc;background:rgba(232,228,220,.04)}
  .item.on{color:#e8e4dc;background:rgba(232,228,220,.06)}
  .dot{width:6px;height:6px;background:#64D8AE;transform:rotate(45deg)}
  .tabs{padding:28px;display:flex;gap:24px}
  .tab{font-family:'Work Sans';font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;color:rgba(232,228,220,.45);padding:8px 0;border-bottom:1px solid transparent;cursor:pointer}
  body.rtl .tab{font-family:'Noto Naskh Arabic',serif;font-size:13px;letter-spacing:0;text-transform:none;font-weight:700;color:rgba(232,228,220,.55)}
  .tab:hover{color:#e8e4dc}
  .tab.on{color:#e8e4dc;border-color:#64D8AE}
</style></head><body>
<nav>
  <div class="item on"><span class="dot"></span><span data-en="Atlas" data-ar="الأطلس">Atlas</span></div>
  <div class="item" data-en="Today" data-ar="اليوم">Today</div>
  <div class="item" data-en="Crew" data-ar="الفريق">Crew</div>
  <div class="item" data-en="Water" data-ar="الماء">Water</div>
</nav>
<div class="tabs">
  <div class="tab on" data-en="Overview" data-ar="نظرة عامة">Overview</div>
  <div class="tab" data-en="Routes" data-ar="المسارات">Routes</div>
  <div class="tab" data-en="Passages" data-ar="الفقرات">Passages</div>
  <div class="tab" data-en="Water log" data-ar="سجل الماء">Water log</div>
</div>
<script src="dir-toggle.js"></script>
</body></html>
