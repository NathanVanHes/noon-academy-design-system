<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;background:var(--void)}
  .grid{display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr;height:160px}
  .sw{position:relative;padding:16px;display:flex;flex-direction:column;justify-content:space-between}
  .name{font-family:'Work Sans';font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase}
  .hex{font-family:'JetBrains Mono';font-size:11px}
  .role{font-family:'Crimson Pro';font-style:italic;font-size:13px;line-height:1.3;margin-bottom:4px}
</style></head><body>
<div class="grid">
  <div class="sw" style="background:#c9a227;color:#0a0f1a;grid-column:span 2">
    <span class="name" style="color:rgba(10,15,26,.55)">Signal Gold · journey only</span>
    <div><div class="role" style="color:rgba(10,15,26,.7)">Routes. Waypoints. Arrival. Never UI chrome.</div><span class="hex">#C9A227</span></div>
  </div>
  <div class="sw" style="background:#e0b83a;color:#0a0f1a;border-left:1px solid rgba(10,15,26,.2)">
    <span class="name" style="color:rgba(10,15,26,.55)">Gold 2</span>
    <div><div class="role" style="color:rgba(10,15,26,.7)">Current position</div><span class="hex">#E0B83A</span></div>
  </div>
  <div class="sw" style="background:#8e7019;color:#f2ece0;border-left:1px solid rgba(10,15,26,.2)">
    <span class="name" style="color:rgba(242,236,224,.5)">Gold Deep</span>
    <div><div class="role" style="color:rgba(242,236,224,.7)">Crossed route</div><span class="hex" style="color:rgba(242,236,224,.9)">#8E7019</span></div>
  </div>
</div>
</body></html>
