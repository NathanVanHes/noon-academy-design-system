<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Noon Academy — Student App (Print)</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; background: #07090f; font-family: 'Work Sans', sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; color-adjust: exact; }
  #root { min-height: 100vh; }
  .stage {
    display: flex; gap: 44px; padding: 56px 40px; align-items: flex-start;
    flex-wrap: wrap; justify-content: center; min-height: 100vh;
    background-image: linear-gradient(to right, rgba(232,228,220,0.025) 1px, transparent 1px), linear-gradient(to bottom, rgba(232,228,220,0.025) 1px, transparent 1px);
    background-size: 32px 32px;
  }
  .rail { display: flex; flex-direction: column; gap: 14px; align-items: center; }
  .rail .cap { font-family: 'Work Sans'; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; color: #e8e4dc; }
  .rail .sub { font-family: 'JetBrains Mono'; font-size: 10px; color: rgba(232,228,220,0.5); }

  @page { size: A4 portrait; margin: 0.4cm; }
  @media print {
    html, body { background: #07090f !important; }
    .stage {
      display: block !important; padding: 0 !important; background-image: none !important;
    }
    .rail {
      break-inside: avoid; break-after: page; page-break-after: always;
      display: flex !important; flex-direction: column !important; align-items: center !important;
      justify-content: center !important; min-height: 100vh !important; gap: 18px !important;
      background: #07090f !important;
    }
    .rail:last-child { break-after: auto; page-break-after: auto; }
    .phone-frame { transform: scale(0.92); transform-origin: center top; }
  }
</style>
</head><body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
window.FONTS = {
  serif: "'Crimson Pro', Georgia, serif",
  sans:  "'Work Sans', system-ui, sans-serif",
  mono:  "'JetBrains Mono', Menlo, monospace",
  ar:    "'Noto Naskh Arabic', serif",
};
</script>
<script type="text/babel" src="AtlasScreen.jsx"></script>
<script type="text/babel" src="TodayScreen.jsx"></script>
<script type="text/babel" src="CrewScreen.jsx"></script>
<script type="text/babel" src="WaterScreen.jsx"></script>
<script type="text/babel" src="PassageScreen.jsx"></script>

<script type="text/babel">
function Phone({ label, sub, children }) {
  const tabs = [
    {id:'atlas',l:'Atlas'},{id:'today',l:'Today'},{id:'crew',l:'Crew'},{id:'water',l:'Water'},{id:'me',l:'Me'},
  ];
  return (
    <div className="rail">
      <div className="phone-frame" style={{ width: 360, height: 780, borderRadius: 48, overflow: 'hidden', position: 'relative', boxShadow: '0 50px 100px -20px rgba(0,0,0,0.7), 0 0 0 1px rgba(232,228,220,0.08)', background: '#0a0f1a' }}>
        <div style={{ position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)', width: 110, height: 34, borderRadius: 22, background: '#000', zIndex: 50 }}/>
        <div style={{ position: 'absolute', top: 18, left: 26, fontFamily: '-apple-system', fontSize: 15, fontWeight: 600, color: '#e8e4dc', zIndex: 40 }}>9:41</div>
        <div style={{ position: 'absolute', top: 18, right: 26, fontFamily: '-apple-system', fontSize: 13, color: '#e8e4dc', zIndex: 40 }}>••• ▴ ▮</div>
        <div style={{ position: 'absolute', inset: 0, bottom: 64, overflow: 'hidden' }}>{children}</div>
        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: 64, background: '#0a0f1a', borderTop: '1px solid rgba(232,228,220,0.08)', display: 'flex', alignItems: 'center' }}>
          {tabs.map(t => (
            <div key={t.id} style={{ flex: 1, textAlign: 'center', fontFamily: FONTS.sans, fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', fontWeight: 700, color: t.id===label.toLowerCase()?'#64D8AE':'rgba(232,228,220,0.4)' }}>{t.l}</div>
          ))}
        </div>
        <div style={{ position: 'absolute', bottom: 8, left: '50%', transform: 'translateX(-50%)', width: 120, height: 4, borderRadius: 100, background: 'rgba(232,228,220,0.55)', zIndex: 60 }}/>
      </div>
      <div style={{ textAlign: 'center' }}>
        <div className="cap">{label}</div>
        <div className="sub">{sub}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <div className="stage">
    <Phone label="Atlas" sub="home · mastery heatmap"><AtlasScreen/></Phone>
    <Phone label="Today" sub="four stations"><TodayScreen/></Phone>
    <Phone label="Crew" sub="Dune Six"><CrewScreen/></Phone>
    <Phone label="Water" sub="week 4 · 18 jugs"><WaterScreen/></Phone>
    <Phone label="Atlas" sub="passage · QDR-08"><PassageScreen/></Phone>
  </div>
);

(async () => {
  try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch(e) {}
  await new Promise(r => setTimeout(r, 900));
  window.print();
})();
</script>
</body></html>
