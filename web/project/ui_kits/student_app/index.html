<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Noon Academy — Student App</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; background: #07090f; min-height: 100vh; font-family: 'Work Sans', sans-serif; }
  #root { min-height: 100vh; }
  .rail { display: flex; flex-direction: column; gap: 14px; align-items: center; }
  .rail .cap { font-family: 'Work Sans'; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; color: #e8e4dc; }
  .rail .sub { font-family: 'JetBrains Mono'; font-size: 10px; color: rgba(232,228,220,0.5); }
</style>
</head><body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
window.FONTS = {
  serif: "'Crimson Pro', Georgia, serif",
  sans:  "'Work Sans', system-ui, sans-serif",
  mono:  "'JetBrains Mono', Menlo, monospace",
  ar:    "'Noto Naskh Arabic', serif",
};
</script>
<script type="text/babel" src="AtlasScreen.jsx"></script>
<script type="text/babel" src="HeatmapScreen.jsx"></script>
<script type="text/babel" src="ScheduleScreen.jsx"></script>
<script type="text/babel" src="TodayScreen.jsx"></script>
<script type="text/babel" src="CrewScreen.jsx"></script>
<script type="text/babel" src="WaterScreen.jsx"></script>
<script type="text/babel" src="PassageScreen.jsx"></script>
<script type="text/babel" src="PracticeScreen.jsx"></script>
<script type="text/babel" src="ResultScreen.jsx"></script>

<script type="text/babel">
function Phone({ label, sub, children, activeTab, hideNav }) {
  const tabs = [
    {id:'atlas',l:'Atlas'},{id:'schedule',l:'Today'},{id:'crew',l:'Crew'},{id:'water',l:'Water'},{id:'me',l:'Me'},
  ];
  const bottomInset = hideNav ? 0 : 64;
  return (
    <div className="rail">
      <div style={{ width: 360, height: 780, borderRadius: 48, overflow: 'hidden', position: 'relative', boxShadow: '0 50px 100px -20px rgba(0,0,0,0.7), 0 0 0 1px rgba(232,228,220,0.08)', background: '#0a0f1a' }}>
        <div style={{ position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)', width: 110, height: 34, borderRadius: 22, background: '#000', zIndex: 50 }}/>
        <div style={{ position: 'absolute', top: 18, left: 26, fontFamily: '-apple-system', fontSize: 15, fontWeight: 600, color: '#e8e4dc', zIndex: 40 }}>9:41</div>
        <div style={{ position: 'absolute', top: 18, right: 26, fontFamily: '-apple-system', fontSize: 13, color: '#e8e4dc', zIndex: 40 }}>••• ▴ ▮</div>
        <div style={{ position: 'absolute', inset: 0, bottom: bottomInset, overflow: 'auto' }}>{children}</div>
        {!hideNav && (
          <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: 64, background: '#0a0f1a', borderTop: '1px solid rgba(232,228,220,0.08)', display: 'flex', alignItems: 'center' }}>
            {tabs.map(t => (
              <div key={t.id} style={{ flex: 1, textAlign: 'center', fontFamily: FONTS.sans, fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', fontWeight: 700, color: t.id===(activeTab||label.toLowerCase())?'#64D8AE':'rgba(232,228,220,0.4)' }}>{t.l}</div>
            ))}
          </div>
        )}
        <div style={{ position: 'absolute', bottom: 8, left: '50%', transform: 'translateX(-50%)', width: 120, height: 4, borderRadius: 100, background: 'rgba(232,228,220,0.55)', zIndex: 60 }}/>
      </div>
      <div style={{ textAlign: 'center' }}>
        <div className="cap">{label}</div>
        <div className="sub">{sub}</div>
      </div>
    </div>
  );
}

function Row({ title, sub, children }) {
  return (
    <div style={{ width:'100%' }}>
      <div style={{ maxWidth:1600, margin:'0 auto 18px', padding:'0 8px' }}>
        <div style={{ fontFamily: FONTS.sans, fontSize:10, letterSpacing:'.18em', textTransform:'uppercase', fontWeight:700, color:'rgba(232,228,220,.5)' }}>{title}</div>
        <div style={{ fontFamily: FONTS.serif, fontStyle:'italic', fontSize:13, color:'rgba(232,228,220,.4)', marginTop:2 }}>{sub}</div>
      </div>
      <div style={{ display:'flex', gap:44, flexWrap:'wrap', justifyContent:'center', padding:'0 20px 40px' }}>{children}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <div style={{ padding:'64px 0 32px', minHeight:'100vh',
    backgroundImage:'linear-gradient(to right, rgba(232,228,220,0.025) 1px, transparent 1px), linear-gradient(to bottom, rgba(232,228,220,0.025) 1px, transparent 1px)',
    backgroundSize:'32px 32px' }}>
    <div style={{ maxWidth:1600, margin:'0 auto 32px', padding:'0 48px' }}>
      <div style={{ fontFamily: FONTS.sans, fontSize:10, letterSpacing:'.18em', textTransform:'uppercase', fontWeight:700, color:'rgba(232,228,220,.45)' }}>UI Kit · Student</div>
      <div style={{ fontFamily: FONTS.serif, fontSize:40, fontWeight:500, color:'#e8e4dc', letterSpacing:'-.02em', marginTop:6 }}>Nine screens · the student's week</div>
    </div>

    <Row title="Core navigation" sub="the five tabs — Atlas, Schedule, Crew, Water, Me">
      <Phone label="Atlas" sub="home · terrain at a glance"><AtlasScreen/></Phone>
      <Phone label="Atlas" sub="full heatmap · all domains"><HeatmapScreen/></Phone>
      <Phone label="Today" sub="week schedule"><ScheduleScreen/></Phone>
      <Phone label="Today" sub="today's four stations"><TodayScreen/></Phone>
    </Row>

    <Row title="Crew &amp; Water" sub="who you travel with, proof of work and help">
      <Phone label="Crew" sub="Dune Six"><CrewScreen/></Phone>
      <Phone label="Water" sub="week 4 · 18 jugs filled"><WaterScreen/></Phone>
    </Row>

    <Row title="Practice flow" sub="focused mode — bottom nav replaced by primary action">
      <Phone label="Homework" sub="passage brief · QDR-08" hideNav><PassageScreen/></Phone>
      <Phone label="Homework" sub="MCQ in-progress · Q3/10" hideNav><PracticeScreen/></Phone>
      <Phone label="Homework" sub="result · 8 / 10" hideNav><ResultScreen/></Phone>
    </Row>
  </div>
);
</script>
</body></html>
