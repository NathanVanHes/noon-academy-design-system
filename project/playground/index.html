<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Noon Academy — Design System Playground</title>
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../components.css">
<style>
  body { overflow: hidden; }
  .app { display: grid; grid-template-columns: 240px 1fr 320px; block-size: 100vh; }

  /* Sidebar */
  .nav { background: var(--bg-sunken); border-inline-end: 1px solid var(--border); padding: var(--sp-5) 0; display: flex; flex-direction: column; }
  .nav__brand { padding: 0 var(--sp-5) var(--sp-6); display: flex; align-items: baseline; gap: var(--sp-2); }
  .nav__brand strong { font-family: var(--font-serif); font-weight: var(--fw-500); font-size: var(--fs-18); letter-spacing: var(--tr-tight); color: var(--fg); }
  .nav__brand em { font-family: var(--font-mono); font-size: 11px; color: var(--fg-faint); font-style: normal; }
  .nav__group { padding: 0 var(--sp-3); margin-block-end: var(--sp-5); }
  .nav__heading { font-family: var(--font-sans); font-size: 11px; letter-spacing: var(--tr-caps); text-transform: uppercase; font-weight: var(--fw-600); color: var(--fg-faint); padding: 0 var(--sp-3) var(--sp-2); }
  .nav__item { display: flex; align-items: center; justify-content: space-between; gap: var(--sp-2); padding: 6px var(--sp-3); border-radius: var(--r-1); color: var(--fg-muted); font-size: var(--fs-14); cursor: pointer; user-select: none; border: 0; background: transparent; inline-size: 100%; text-align: start; font-family: var(--font-sans); }
  .nav__item:hover { color: var(--fg); background: rgba(232,228,220,0.04); }
  .nav__item.is-on { color: var(--fg); background: rgba(232,228,220,0.08); }
  .nav__item code { font-family: var(--font-mono); font-size: 10px; color: var(--fg-faint); }

  /* Stage */
  .stage { overflow-y: auto; padding: var(--sp-8) var(--sp-9); background:
    radial-gradient(ellipse at 50% 0%, rgba(100,216,174,0.04) 0%, transparent 40%),
    var(--bg);
  }
  .stage__header { margin-block-end: var(--sp-7); display: flex; align-items: baseline; justify-content: space-between; gap: var(--sp-5); }
  .stage__title { font-family: var(--font-serif); font-size: var(--fs-32); font-weight: var(--fw-400); margin: 0; letter-spacing: var(--tr-tight); color: var(--fg); }
  .stage__sub { font-family: var(--font-serif); font-style: italic; color: var(--fg-subtle); font-size: var(--fs-15); margin: 4px 0 0; }
  .stage__meta { font-family: var(--font-mono); font-size: var(--fs-12); color: var(--fg-faint); display: flex; gap: var(--sp-4); }
  .stage__meta b { color: var(--fg-subtle); font-weight: var(--fw-500); }

  .canvas { background: var(--bg-raised); border-radius: var(--r-3); box-shadow: inset 0 0 0 1px var(--border); padding: var(--sp-9) var(--sp-7); min-block-size: 320px; display: grid; place-items: center; position: relative; overflow: hidden; }
  .canvas::before {
    content: ""; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(232,228,220,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,228,220,0.025) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
  }
  .canvas > * { position: relative; }
  .canvas--compact { padding: var(--sp-6); min-block-size: 0; }
  .canvas--start { place-items: start stretch; }
  .canvas--left { justify-items: start; }

  .row { display: flex; gap: var(--sp-4); flex-wrap: wrap; align-items: center; }
  .col { display: flex; flex-direction: column; gap: var(--sp-3); }

  /* Specs */
  .specs { margin-block-start: var(--sp-6); display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4); }
  .spec { background: var(--bg-sunken); border-radius: var(--r-2); padding: var(--sp-5); box-shadow: inset 0 0 0 1px var(--border); }
  .spec h4 { font-family: var(--font-sans); font-size: 11px; letter-spacing: var(--tr-caps); text-transform: uppercase; font-weight: var(--fw-600); color: var(--fg-faint); margin: 0 0 var(--sp-3); }
  .spec dl { margin: 0; display: grid; grid-template-columns: max-content 1fr; gap: 6px var(--sp-4); font-family: var(--font-mono); font-size: var(--fs-12); }
  .spec dt { color: var(--fg-subtle); }
  .spec dd { margin: 0; color: var(--fg); }

  .code { background: var(--bg-sunken); border-radius: var(--r-2); padding: var(--sp-5); box-shadow: inset 0 0 0 1px var(--border); margin-block-start: var(--sp-5); position: relative; }
  .code pre { margin: 0; font-family: var(--font-mono); font-size: var(--fs-12); color: var(--fg); line-height: 1.6; overflow-x: auto; }
  .code .tag { color: var(--iris-300); }
  .code .attr { color: var(--noon-300); }
  .code .str { color: var(--gold-200); }
  .code .com { color: var(--fg-faint); font-style: italic; }
  .code__copy { position: absolute; inset-block-start: var(--sp-3); inset-inline-end: var(--sp-3); background: transparent; border: 0; color: var(--fg-subtle); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; padding: 4px 8px; border-radius: var(--r-1); }
  .code__copy:hover { color: var(--fg); background: rgba(232,228,220,0.06); }

  /* Knobs */
  .knobs { background: var(--bg-sunken); border-inline-start: 1px solid var(--border); padding: var(--sp-6); overflow-y: auto; }
  .knobs__title { font-family: var(--font-sans); font-size: 11px; letter-spacing: var(--tr-caps); text-transform: uppercase; font-weight: var(--fw-600); color: var(--fg-faint); margin: 0 0 var(--sp-5); display: flex; align-items: center; gap: var(--sp-2); }
  .knobs__title::before { content: ""; inline-size: 6px; block-size: 6px; background: var(--accent); transform: rotate(45deg); }
  .knob { margin-block-end: var(--sp-5); }
  .knob__label { font-family: var(--font-sans); font-size: var(--fs-12); font-weight: var(--fw-500); color: var(--fg-muted); margin-block-end: var(--sp-2); display: flex; justify-content: space-between; align-items: center; }
  .knob__label code { font-family: var(--font-mono); font-size: 11px; color: var(--fg-faint); font-weight: var(--fw-400); }
  .knob__options { display: flex; flex-wrap: wrap; gap: 2px; background: var(--bg); padding: 2px; border-radius: var(--r-2); box-shadow: inset 0 0 0 1px var(--border); }
  .knob__options button { flex: 1; min-inline-size: max-content; background: transparent; border: 0; color: var(--fg-subtle); font: inherit; font-size: var(--fs-12); font-family: var(--font-mono); padding: 6px 10px; border-radius: var(--r-1); cursor: pointer; text-align: center; }
  .knob__options button:hover { color: var(--fg); }
  .knob__options button.is-on { background: var(--bg-raised); color: var(--fg); box-shadow: inset 0 0 0 1px var(--border-strong); }
  .knob__toggle { display: flex; align-items: center; justify-content: space-between; padding: var(--sp-3) 0; border-block-end: 1px solid var(--divider); }
  .knob__toggle:last-child { border-block-end: 0; }

  /* Toggle all booleans into one section */
  .knobs__section { margin-block-end: var(--sp-6); }
  .knobs__sectionTitle { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-faint); margin: 0 0 var(--sp-3); padding-block-end: var(--sp-2); border-block-end: 1px solid var(--divider); }

  /* Inline meta banner (RTL/theme info) */
  .banner { display: flex; gap: var(--sp-3); align-items: center; padding: var(--sp-3) var(--sp-4); background: var(--bg-sunken); border-radius: var(--r-1); box-shadow: inset 0 0 0 1px var(--border); font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); }
  .banner b { color: var(--fg); font-weight: var(--fw-500); }

  /* Preset buttons at top of stage */
  .stage__controls { display: flex; gap: var(--sp-2); align-items: center; }
</style>
</head>
<body>

<div class="app">
  <!-- ============ NAV ============ -->
  <aside class="nav" id="nav">
    <div class="nav__brand">
      <strong>Noon</strong>
      <em>/ design system</em>
    </div>
    <!-- populated by JS -->
  </aside>

  <!-- ============ STAGE ============ -->
  <main class="stage">
    <header class="stage__header">
      <div>
        <h1 class="stage__title" id="compTitle">Button</h1>
        <p class="stage__sub" id="compSub">Ink on signal. Primary action per surface.</p>
      </div>
      <div class="stage__meta">
        <span><b id="metaStates">0</b> states</span>
        <span><b id="metaProps">0</b> props</span>
        <span><b>void</b> theme</span>
      </div>
    </header>

    <div id="stage" class="canvas"></div>

    <div class="specs">
      <div class="spec">
        <h4>Anatomy</h4>
        <dl id="anatomy"></dl>
      </div>
      <div class="spec">
        <h4>Tokens in use</h4>
        <dl id="tokens"></dl>
      </div>
    </div>

    <div class="code">
      <button class="code__copy" id="copyBtn">Copy</button>
      <pre id="codeOut"></pre>
    </div>
  </main>

  <!-- ============ KNOBS ============ -->
  <aside class="knobs">
    <h3 class="knobs__title">Props</h3>
    <div id="knobs"></div>
  </aside>
</div>

<script>
// Noon Academy — component registry
// Every component has: render(props), knobs, anatomy, tokens, code(props)

const REG = {};

/* ============ BUTTON ============ */
REG.button = {
  title: 'Button',
  sub: 'Primary, secondary, ghost, danger. Three sizes, six states.',
  group: 'Actions',
  defaults: { variant: 'primary', size: 'md', state: 'default', icon: 'none', block: false, disabled: false },
  knobs: [
    { id: 'variant', type: 'options', opts: ['primary','secondary','ghost','danger','danger-solid'] },
    { id: 'size',    type: 'options', opts: ['sm','md','lg'] },
    { id: 'state',   type: 'options', opts: ['default','hover','focus','active','loading'] },
    { id: 'icon',    type: 'options', opts: ['none','start','end','only'] },
    { id: 'block',   type: 'toggle', label: 'Full width' },
    { id: 'disabled',type: 'toggle', label: 'Disabled' },
  ],
  anatomy: {
    'height': 'var(--h-{size})', 'padding-x': 'var(--sp-3/5/6)',
    'radius': 'var(--r-2)', 'font': 'Work Sans 600 / 13-15px',
  },
  tokens: {
    '--accent': '#64D8AE', '--accent-fg': '#0a3326',
    '--focus-ring': 'blue-400 @ 24%', 'transition': '120ms',
  },
  render(p) {
    const cls = ['btn','btn--'+p.variant,'btn--'+p.size];
    if (p.block) cls.push('btn--block');
    if (p.icon === 'only') cls.push('btn--icon');
    if (p.state === 'loading') cls.push('is-loading');
    const stateAttr = (p.state === 'hover' || p.state === 'active' || p.state === 'focus')
      ? ` data-force="${p.state}"` : '';
    const ico = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M3 7l3 3 5-6"/></svg>`;
    let inner = 'Continue route';
    if (p.icon === 'only') inner = ico;
    else if (p.icon === 'start') inner = `${ico}<span>Continue route</span>`;
    else if (p.icon === 'end') inner = `<span>Continue route</span>${ico}`;
    return `<button class="${cls.join(' ')}"${p.disabled?' disabled':''}${stateAttr}>${inner}</button>`;
  },
  code(p) {
    const cls = `btn btn--${p.variant} btn--${p.size}${p.block?' btn--block':''}${p.icon==='only'?' btn--icon':''}${p.state==='loading'?' is-loading':''}`;
    return `<button class="${cls}"${p.disabled?' disabled':''}>\n  Continue route\n</button>`;
  }
};

/* ============ INPUT ============ */
REG.input = {
  title: 'Input',
  sub: 'Text, number, search, password. All states.',
  group: 'Forms',
  defaults: { size: 'md', state: 'default', icon: false, label: true, hint: true, disabled: false, readonly: false, error: false },
  knobs: [
    { id: 'size',   type: 'options', opts: ['sm','md','lg'] },
    { id: 'state',  type: 'options', opts: ['default','hover','focus','filled'] },
    { id: 'icon',   type: 'toggle', label: 'Leading icon' },
    { id: 'label',  type: 'toggle', label: 'Show label' },
    { id: 'hint',   type: 'toggle', label: 'Show hint' },
    { id: 'error',  type: 'toggle', label: 'Error state' },
    { id: 'disabled', type: 'toggle', label: 'Disabled' },
    { id: 'readonly', type: 'toggle', label: 'Read-only' },
  ],
  anatomy: { 'height': '32 / 40 / 48px', 'radius': 'var(--r-2)', 'border': 'inset 1px border-strong' },
  tokens: { 'focus': 'inset 1px blue-400 + ring', 'error': 'inset 1px danger-400' },
  render(p) {
    const cls = ['input'];
    if (p.error) cls.push('is-error');
    if (p.state === 'hover' || p.state === 'focus') cls.push('state-'+p.state);
    if (p.readonly) cls.push('is-readonly');
    const attrs = [];
    if (p.disabled) attrs.push('disabled');
    if (p.readonly) attrs.push('readonly');
    const val = p.state === 'filled' ? 'value="Fatima Al-Otaibi"' : 'placeholder="Your full name"';
    const sty = p.size === 'sm' ? 'style="height:32px;font-size:13px"' : (p.size === 'lg' ? 'style="height:48px;font-size:15px"' : '');
    const ico = p.icon ? `<span class="input-group__icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5L14 14"/></svg></span>` : '';
    const input = `<input class="${cls.join(' ')}" type="text" ${val} ${attrs.join(' ')} ${sty}>`;
    const body = p.icon ? `<div class="input-group">${ico}${input}</div>` : input;
    return `
      <div class="field" style="inline-size:min(380px,100%)">
        ${p.label?`<label class="field__label"><span>Full name</span>${!p.error?'<em>required</em>':''}</label>`:''}
        ${body}
        ${p.error ? `<span class="field__err">Enter your name as it appears on your ID</span>` : (p.hint ? `<span class="field__hint">As shown on your national ID</span>` : '')}
      </div>`;
  },
  code(p) {
    return `<div class="field">\n  <label class="field__label">Full name</label>\n  <input class="input${p.error?' is-error':''}" type="text" placeholder="Your full name"${p.disabled?' disabled':''}>\n</div>`;
  }
};

/* ============ SELECT ============ */
REG.select = {
  title: 'Select',
  sub: 'Native select styled as input.',
  group: 'Forms',
  defaults: { open: false, size: 'md' },
  knobs: [
    { id: 'size', type: 'options', opts: ['sm','md','lg'] },
    { id: 'open', type: 'toggle', label: 'Show options' },
  ],
  anatomy: { 'height': '32/40/48px', 'chevron': '12px at end' },
  tokens: { 'bg-popover': '#1a2236', 'shadow': 'z-3' },
  render(p) {
    if (p.open) {
      return `
        <div style="position:relative;inline-size:280px">
          <button class="input" style="display:flex;align-items:center;justify-content:space-between;text-align:start">
            <span>Qudrat — Verbal</span>
            <svg width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 1l4 4 4-4"/></svg>
          </button>
          <div class="menu" style="position:absolute;top:100%;margin-top:4px;inline-size:100%">
            <div class="menu__item">Qudrat — Verbal</div>
            <div class="menu__item">Qudrat — Quantitative</div>
            <div class="menu__item">Tahsili — Biology</div>
            <div class="menu__item">Tahsili — Chemistry</div>
            <div class="menu__item">STEP — Reading</div>
          </div>
        </div>`;
    }
    return `<button class="input" style="inline-size:280px;display:flex;align-items:center;justify-content:space-between;text-align:start"><span>Qudrat — Verbal</span><svg width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 1l4 4 4-4"/></svg></button>`;
  },
  code(p) { return `<button class="input"><span>Qudrat</span><svg…/></button>\n<div class="menu">\n  <div class="menu__item">Qudrat — Verbal</div>\n</div>`; }
};

/* ============ CHECKBOX ============ */
REG.checkbox = {
  title: 'Checkbox',
  sub: 'Multi-select. Checked, indeterminate, disabled.',
  group: 'Forms',
  defaults: { state: 'unchecked', disabled: false },
  knobs: [
    { id: 'state', type: 'options', opts: ['unchecked','checked','indeterminate','focus'] },
    { id: 'disabled', type: 'toggle', label: 'Disabled' },
  ],
  anatomy: { size: '18×18', radius: 'var(--r-1)', 'check-color': 'accent-fg' },
  tokens: { '--accent': '#64D8AE', 'border': 'border-strong' },
  render(p) {
    const checked = p.state === 'checked' || p.state === 'indeterminate';
    const indet = p.state === 'indeterminate';
    return `
      <div class="col" style="gap:14px">
        <label class="check ${indet?'is-indeterminate':''}">
          <input type="checkbox" ${checked?'checked':''} ${p.disabled?'disabled':''}>
          <span class="check__box"></span>
          <span>Include past Qudrat results</span>
        </label>
      </div>`;
  },
  code(p) { return `<label class="check${p.state==='indeterminate'?' is-indeterminate':''}">\n  <input type="checkbox"${p.state==='checked'?' checked':''}>\n  <span class="check__box"></span>\n  <span>Label</span>\n</label>`; }
};

/* ============ RADIO ============ */
REG.radio = {
  title: 'Radio',
  sub: 'One-of-many. Grouped selection.',
  group: 'Forms',
  defaults: { selected: 1 },
  knobs: [{ id: 'selected', type: 'options', opts: ['0','1','2'] }],
  anatomy: { size: '18×18', 'inner-dot': '5px ring' },
  tokens: { '--accent': '#64D8AE' },
  render(p) {
    const sel = parseInt(p.selected);
    const opts = ['Morning crew (6–8 AM)','Evening crew (8–10 PM)','Solo route'];
    return `<div class="col" style="gap:12px">${opts.map((o,i)=>`
      <label class="radio">
        <input type="radio" name="r" ${i===sel?'checked':''}>
        <span class="radio__box"></span>
        <span>${o}</span>
      </label>`).join('')}</div>`;
  },
  code() { return `<label class="radio">\n  <input type="radio" name="crew" checked>\n  <span class="radio__box"></span>\n  <span>Morning crew</span>\n</label>`; }
};

/* ============ SWITCH ============ */
REG.switch = {
  title: 'Switch',
  sub: 'Binary toggle. Immediate effect.',
  group: 'Forms',
  defaults: { on: true, disabled: false },
  knobs: [
    { id: 'on', type: 'toggle', label: 'On' },
    { id: 'disabled', type: 'toggle', label: 'Disabled' },
  ],
  anatomy: { track: '36×20', thumb: '16×16', motion: '200ms' },
  tokens: { 'on': 'accent', 'off': 'chalk-200 on void' },
  render(p) {
    return `<label class="switch"><input type="checkbox" ${p.on?'checked':''} ${p.disabled?'disabled':''}><span class="switch__track"></span><span>Let crew see my mastery</span></label>`;
  },
  code(p) { return `<label class="switch">\n  <input type="checkbox"${p.on?' checked':''}>\n  <span class="switch__track"></span>\n  <span>Label</span>\n</label>`; }
};

/* ============ SEGMENTED ============ */
REG.segmented = {
  title: 'Segmented',
  sub: 'Compact mode picker. 2–4 options.',
  group: 'Forms',
  defaults: { active: 1, count: 3 },
  knobs: [
    { id: 'count',  type: 'options', opts: ['2','3','4'] },
    { id: 'active', type: 'options', opts: ['0','1','2','3'] },
  ],
  anatomy: { padding: '2px', height: 'auto' },
  tokens: { 'on': 'bg-overlay + border-strong' },
  render(p) {
    const n = parseInt(p.count);
    const a = parseInt(p.active);
    const labels = ['Today','Week','Month','Year'];
    return `<div class="seg">${Array.from({length:n}).map((_,i)=>`<button class="${i===a?'is-on':''}">${labels[i]}</button>`).join('')}</div>`;
  },
  code() { return `<div class="seg">\n  <button>Today</button>\n  <button class="is-on">Week</button>\n  <button>Month</button>\n</div>`; }
};

/* ============ CHIP ============ */
REG.chip = {
  title: 'Chip',
  sub: 'Filter, choice, status. Dismissible.',
  group: 'Display',
  defaults: { variant: 'default', state: 'default', dismiss: false, dot: false },
  knobs: [
    { id: 'variant', type: 'options', opts: ['default','on','gold','ok','danger'] },
    { id: 'state',   type: 'options', opts: ['default','hover','disabled'] },
    { id: 'dot',     type: 'toggle', label: 'Leading dot' },
    { id: 'dismiss', type: 'toggle', label: 'Dismissible' },
  ],
  anatomy: { height: '28px', padding: 'var(--sp-3)', radius: 'var(--r-1)' },
  tokens: { 'on': 'accent-soft + accent-border', 'gold': 'signal-soft' },
  render(p) {
    const cls = ['chip','chip--interactive'];
    if (p.variant === 'on') cls.push('is-on');
    else if (p.variant !== 'default') cls.push('chip--'+p.variant);
    if (p.state === 'disabled') cls.push('is-disabled');
    const dot = p.dot ? `<span class="chip__dot"></span>` : '';
    const x = p.dismiss ? `<span class="chip__x"><svg viewBox="0 0 10 10"><path d="M2 2l6 6M8 2l-6 6"/></svg></span>` : '';
    return `<div class="row">
      <span class="${cls.join(' ')}" ${p.state==='hover'?'data-force="hover"':''}>${dot}Qudrat${x}</span>
      <span class="${cls.join(' ')}">${dot}Verbal reasoning${x}</span>
      <span class="${cls.join(' ')}">${dot}Last 30 days${x}</span>
    </div>`;
  },
  code(p) { return `<span class="chip${p.variant==='on'?' is-on':''}${p.variant!=='default'&&p.variant!=='on'?' chip--'+p.variant:''}">\n  ${p.dot?'<span class="chip__dot"></span>\n  ':''}Label${p.dismiss?'\n  <span class="chip__x">×</span>':''}\n</span>`; }
};

/* ============ BADGE ============ */
REG.badge = {
  title: 'Badge',
  sub: 'Count, status dot, notification.',
  group: 'Display',
  defaults: { variant: 'default', kind: 'count' },
  knobs: [
    { id: 'kind', type: 'options', opts: ['count','dot','text'] },
    { id: 'variant', type: 'options', opts: ['default','accent','danger'] },
  ],
  anatomy: { height: '18px', 'min-width': '18px' },
  tokens: { default: 'fg on fg-inverse' },
  render(p) {
    const cls = ['badge'];
    if (p.variant !== 'default') cls.push('badge--'+p.variant);

/* ============ PROGRESS ============ */
REG.progress = {
  title: 'Route progress',
  sub: 'Linear, circular, stepped route. Gold = journey.',
  group: 'Feedback',
  defaults: { kind: 'linear', value: 62, color: 'gold', indet: false },
  knobs: [
    { id: 'kind',  type: 'options', opts: ['linear','circular','steps'] },
    { id: 'color', type: 'options', opts: ['gold','accent'] },
    { id: 'value', type: 'options', opts: ['25','50','62','88','100'] },
    { id: 'indet', type: 'toggle', label: 'Indeterminate (linear only)' },
  ],
  anatomy: { linear: '4px', circular: '48×48', step: '10px diamond' },
  tokens: { gold: 'signal (c9a227) — journey', accent: 'noon — generic progress' },
  render(p) {
    const v = parseInt(p.value);
    const colorCls = p.color === 'gold' ? 'progress--gold' : '';
    if (p.kind === 'linear') {
      return `<div class="col" style="inline-size:min(420px,100%);gap:12px">
        <div class="progress ${colorCls} ${p.indet?'is-indeterminate':''}"><div class="progress__bar" style="width:${p.indet?'40':v}%"></div></div>
        <div class="row" style="justify-content:space-between;font-family:var(--font-mono);font-size:11px;color:var(--fg-faint)">
          <span>${p.indet?'Calibrating':v+'% complete'}</span>
          <span>Day ${Math.round(v*60/100)} / 60</span>
        </div>
      </div>`;
    }
    if (p.kind === 'circular') {
      const r = 20, c = 2 * Math.PI * r;
      const off = c * (1 - v/100);
      const stroke = p.color === 'gold' ? 'var(--signal)' : 'var(--accent)';
      return `<div class="circ" style="inline-size:96px;block-size:96px">
        <svg viewBox="0 0 48 48">
          <circle class="circ__track" cx="24" cy="24" r="${r}" stroke-width="2"/>
          <circle class="circ__bar" cx="24" cy="24" r="${r}" stroke-width="2" stroke="${stroke}" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
        </svg>
        <div class="circ__val">${v}%</div>
      </div>`;
    }
    const stages = 6;
    const doneTo = Math.round(v/100 * stages);
    return `<div class="steps">${Array.from({length:stages}).map((_,i)=>`
      <span class="steps__dot ${i<doneTo?'is-done':''} ${i===doneTo?'is-now':''}"></span>
      ${i<stages-1?`<span class="steps__line ${i<doneTo?'is-done':''}"></span>`:''}
    `).join('')}</div>`;
  },
  code(p) {
    if (p.kind === 'linear') return `<div class="progress${p.color==='gold'?' progress--gold':''}">\n  <div class="progress__bar" style="width:${p.value}%"></div>\n</div>`;
    if (p.kind === 'circular') return `<div class="circ">\n  <svg><circle class="circ__track"/><circle class="circ__bar"/></svg>\n  <div class="circ__val">${p.value}%</div>\n</div>`;
    return `<div class="steps">\n  <span class="steps__dot is-done"></span>\n  <span class="steps__line is-done"></span>\n  <span class="steps__dot is-now"></span>\n</div>`;
  }
};

  },

};

/* Order shown in sidebar */
REG.__order = [
  { group: 'Actions',    items: ['button'] },
  { group: 'Forms',      items: ['input','select','checkbox','radio','switch','segmented','slider','dropzone'] },
  { group: 'Display',    items: ['card','chip','badge','avatar','stats','table','icons'] },
  { group: 'Navigation', items: ['tabs','tabbar','sidenav','breadcrumb','pagination','menu'] },
  { group: 'Feedback',   items: ['progress','alert','toast','dialog','tooltip','empty','skeleton'] },
];

</script>
<script>
// Noon Academy — Playground runtime
// Wires the registry to the UI: nav + stage + knobs + code + specs.

(function(){
  const $ = (s, r=document) => r.querySelector(s);
  const $$ = (s, r=document) => [...r.querySelectorAll(s)];

  const nav     = $('#nav');
  const stage   = $('#stage');
  const knobs   = $('#knobs');
  const anatomy = $('#anatomy');
  const tokensEl= $('#tokens');
  const codeOut = $('#codeOut');
  const title   = $('#compTitle');
  const sub     = $('#compSub');
  const metaP   = $('#metaProps');
  const metaS   = $('#metaStates');

  const state = { current: 'button', props: {} };

  /* ---------- Build sidebar ---------- */
  function buildNav() {
    const search = document.createElement('div');
    search.style.cssText = 'padding: 0 20px 16px; border-bottom: 1px solid var(--divider); margin-bottom: 12px;';
    search.innerHTML = `
      <div class="input-group" style="position:relative">
        <span class="input-group__icon"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="6" cy="6" r="4"/><path d="M9 9l4 4"/></svg></span>
        <input class="input" id="search" placeholder="Search…" style="height:32px;font-size:13px">
      </div>`;
    nav.appendChild(search);

    REG.__order.forEach(group => {
      const g = document.createElement('div');
      g.className = 'nav__group';
      g.innerHTML = `<div class="nav__heading">${group.group}</div>`;
      group.items.forEach(id => {
        const c = REG[id];
        if (!c) return;
        const btn = document.createElement('button');
        btn.className = 'nav__item';
        btn.dataset.id = id;
        btn.innerHTML = `<span>${c.title}</span><code>${id}</code>`;
        btn.addEventListener('click', () => select(id));
        g.appendChild(btn);
      });
      nav.appendChild(g);
    });

    $('#search').addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      $('.nav__item', nav).forEach(it => {
        const match = !q || it.textContent.toLowerCase().includes(q);
        it.style.display = match ? '' : 'none';
      });
    });
  }

  /* ---------- Select component ---------- */
  function select(id) {
    state.current = id;
    state.props = { ...(REG[id].defaults || {}) };
    $('.nav__item', nav).forEach(b => b.classList.toggle('is-on', b.dataset.id === id));
    try { localStorage.setItem('noon-ds-cur', id); } catch(e){}
    renderAll();
  }

  /* ---------- Render stage + knobs + specs + code ---------- */
  function renderAll() {
    const c = REG[state.current];
    title.textContent = c.title;
    sub.textContent = c.sub;

    // Knobs
    knobs.innerHTML = '';
    const opts = c.knobs.filter(k => k.type === 'options');
    const toggles = c.knobs.filter(k => k.type === 'toggle');

    opts.forEach(k => {
      const wrap = document.createElement('div');
      wrap.className = 'knob';
      wrap.innerHTML = `
        <div class="knob__label"><span>${prettify(k.id)}</span><code>${state.props[k.id]}</code></div>
        <div class="knob__options">${k.opts.map(o => `<button data-val="${o}" class="${String(state.props[k.id])===String(o)?'is-on':''}">${o}</button>`).join('')}</div>`;
      wrap.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
        state.props[k.id] = b.dataset.val;
        renderAll();
      }));
      knobs.appendChild(wrap);
    });

    if (toggles.length) {
      const section = document.createElement('div');
      section.className = 'knobs__section';
      section.innerHTML = `<h4 class="knobs__sectionTitle">Flags</h4>`;
      toggles.forEach(k => {
        const on = !!state.props[k.id];
        const row = document.createElement('label');
        row.className = 'knob__toggle';
        row.innerHTML = `
          <span style="font-size:13px;color:var(--fg-muted)">${k.label || prettify(k.id)}</span>
          <span class="switch"><input type="checkbox" ${on?'checked':''}><span class="switch__track"></span></span>`;
        row.querySelector('input').addEventListener('change', e => {
          state.props[k.id] = e.target.checked;
          renderAll();
        });
        section.appendChild(row);
      });
      knobs.appendChild(section);
    }

    if (!c.knobs.length) {
      knobs.innerHTML = `<div style="font-family:var(--font-serif);font-style:italic;color:var(--fg-subtle);font-size:13px">No props — this component is fixed.</div>`;
    }

    // Stage
    stage.innerHTML = c.render(state.props);

    // Force-state helper (click buttons etc. show their hover/active look)
    stage.querySelectorAll('[data-force]').forEach(el => {
      const f = el.getAttribute('data-force');
      if (f === 'hover') el.style.filter = 'brightness(1.05)';
      if (f === 'active') el.style.transform = 'translateY(0.5px) scale(0.99)';
      if (f === 'focus') el.style.boxShadow = 'var(--focus-ring)';
    });

    // Specs
    anatomy.innerHTML = Object.entries(c.anatomy || {}).map(([k,v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');
    tokensEl.innerHTML = Object.entries(c.tokens || {}).map(([k,v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

    metaP.textContent = c.knobs.length;
    metaS.textContent = (c.knobs.find(k=>k.id==='state')?.opts.length) || Object.values(state.props).length;

    // Code
    codeOut.innerHTML = highlight(c.code(state.props));
  }

  function prettify(id) { return id.replace(/[-_]/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

  function highlight(src) {
    return src
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/(&lt;\/?)([\w-]+)/g, '$1<span class="tag">$2</span>')
      .replace(/([\w-]+)=/g, '<span class="attr">$1</span>=')
      .replace(/"([^"]*)"/g, '"<span class="str">$1</span>"')
      .replace(/(&lt;!--[\s\S]*?--&gt;)/g, '<span class="com">$1</span>');
  }

  $('#copyBtn').addEventListener('click', () => {
    const c = REG[state.current];
    navigator.clipboard.writeText(c.code(state.props));
    $('#copyBtn').textContent = 'Copied';
    setTimeout(()=>$('#copyBtn').textContent='Copy', 1200);
  });

  /* ---------- Go ---------- */
  buildNav();
  const saved = (() => { try { return localStorage.getItem('noon-ds-cur'); } catch(e){ return null; } })();
  select(saved && REG[saved] ? saved : 'button');
})();

</script>
