<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px 36px;background:var(--void);color:var(--chalk)}
  .r{display:grid;grid-template-columns:64px 1fr auto;gap:20px;align-items:baseline;padding:14px 0;border-bottom:1px solid rgba(232,228,220,.08)}
  .r:last-child{border-bottom:0}
  .k{font-family:'Work Sans';font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(232,228,220,.45)}
  .s{font-family:'Crimson Pro';font-weight:500;letter-spacing:-.02em;color:#e8e4dc;line-height:1.1}
  .m{font-family:'JetBrains Mono';font-size:10px;color:rgba(232,228,220,.4)}
</style></head><body>
  <div class="r"><span class="k">H1</span><span class="s" style="font-size:44px">The proven routes</span><span class="m">44 / 48</span></div>
  <div class="r"><span class="k">H2</span><span class="s" style="font-size:30px;font-style:italic">Today's passage</span><span class="m">30 / 36 · italic</span></div>
  <div class="r"><span class="k">H3</span><span class="s" style="font-size:20px">Reading · Inference</span><span class="m">20 / 26</span></div>
</body></html>
