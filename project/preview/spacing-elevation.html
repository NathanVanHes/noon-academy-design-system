<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--void)}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
  .b{height:90px;background:#10172a;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono';font-size:11px;color:rgba(232,228,220,.7)}
  .s-rest{box-shadow:0 0 0 1px rgba(232,228,220,.08)}
  .s-lift{box-shadow:0 0 0 1px rgba(232,228,220,.14), 0 24px 48px -24px rgba(0,0,0,.65)}
  .s-top{box-shadow:0 0 0 1px rgba(232,228,220,.22), 0 40px 80px -30px rgba(0,0,0,.8)}
  .cap{font-family:'Work Sans';font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;color:rgba(232,228,220,.45);margin-top:10px}
</style></head><body>
<div class="row">
  <div><div class="b s-rest">rest</div><div class="cap">Resting card</div></div>
  <div><div class="b s-lift">lifted</div><div class="cap">Hover · focus</div></div>
  <div><div class="b s-top">top</div><div class="cap">Modal · overlay</div></div>
</div>
</body></html>
