<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--void)}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .b{height:72px;background:#1a2236;border:1px solid rgba(232,228,220,.14);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono';font-size:11px;color:rgba(232,228,220,.7)}
  .cap{font-family:'Work Sans';font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;color:rgba(232,228,220,.45);margin-top:10px}
</style></head><body>
<div class="row">
  <div><div class="b" style="border-radius:0">0</div><div class="cap">Maps · chart</div></div>
  <div><div class="b" style="border-radius:2px">2</div><div class="cap">Chips · tags</div></div>
  <div><div class="b" style="border-radius:4px">4</div><div class="cap">Inputs · buttons · cards</div></div>
  <div><div class="b" style="border-radius:8px">8</div><div class="cap">Max soft</div></div>
</div>
</body></html>
