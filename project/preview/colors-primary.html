<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;background:var(--void)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);height:160px}
  .sw{position:relative;padding:16px;display:flex;flex-direction:column;justify-content:space-between}
  .name{font-family:'Work Sans';font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(232,228,220,.45)}
  .hex{font-family:'JetBrains Mono';font-size:11px;color:rgba(232,228,220,.7)}
  .role{font-family:'Crimson Pro';font-style:italic;font-size:13px;color:rgba(232,228,220,.55);line-height:1.3}
</style></head><body>
<div class="grid">
  <div class="sw" style="background:#0a0f1a;border-right:1px solid rgba(232,228,220,.08)">
    <span class="name">Void</span><div><div class="role">Primary surface</div><span class="hex">#0A0F1A</span></div>
  </div>
  <div class="sw" style="background:#10172a;border-right:1px solid rgba(232,228,220,.08)">
    <span class="name">Void 2</span><div><div class="role">Elevated</div><span class="hex">#10172A</span></div>
  </div>
  <div class="sw" style="background:#1a2236;border-right:1px solid rgba(232,228,220,.08)">
    <span class="name">Void 3</span><div><div class="role">Cards</div><span class="hex">#1A2236</span></div>
  </div>
  <div class="sw" style="background:#e8e4dc;color:#0a0f1a">
    <span class="name" style="color:rgba(10,15,26,.5)">Chalk</span><div><div class="role" style="color:rgba(10,15,26,.6)">Text on void</div><span class="hex" style="color:rgba(10,15,26,.8)">#E8E4DC</span></div>
  </div>
</div>
</body></html>
