<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--void)}
  .card{background:#10172a;box-shadow:inset 0 0 0 1px rgba(232,228,220,.08);border-radius:4px;padding:22px 24px;max-width:560px}
  .caps{font-family:'Work Sans';font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;color:rgba(232,228,220,.45);margin-bottom:12px}
  body.rtl .caps{font-family:'Noto Naskh Arabic',serif;font-size:13px;letter-spacing:0;text-transform:none;font-weight:700;color:rgba(232,228,220,.55)}
  h3{font-family:'Crimson Pro';font-weight:500;font-size:22px;color:#e8e4dc;letter-spacing:-.02em;margin:0 0 6px}
  body.rtl h3{font-family:'Noto Naskh Arabic',serif;font-weight:700;font-size:24px;letter-spacing:0;line-height:1.3}
  p{font-family:'Work Sans';font-size:14px;line-height:1.55;color:rgba(232,228,220,.7);margin:0 0 16px;max-width:44ch}
  body.rtl p{font-family:'Noto Naskh Arabic',serif;font-size:15px;line-height:1.7}
  .foot{display:flex;gap:16px;font-family:'JetBrains Mono';font-size:11px;color:rgba(232,228,220,.45);padding-top:14px;border-top:1px solid rgba(232,228,220,.08)}
  .foot b{color:#e0b83a;font-weight:500}
</style></head><body>
<div class="card">
  <div class="caps" data-en="Today's passage · Reading" data-ar="مسار اليوم · قراءة">Today's passage · Reading</div>
  <h3 data-en="Inference & implied meaning" data-ar="الاستنتاج والمعنى الضمني">Inference &amp; implied meaning</h3>
  <p data-en="Sarah cleared this last Thursday. Three teammates are working it now — open as a crew discussion." data-ar="سارة أنهت هذا يوم الخميس الماضي. ثلاثة من الفريق يعملون عليه الآن — افتحه كنقاش جماعي.">Sarah cleared this last Thursday. Three teammates are working it now — open as a crew discussion.</p>
  <div class="foot"><span>ELEV 412M</span><span>EST 22 MIN</span><span><b>+6.2 PTS</b></span></div>
</div>
<script src="dir-toggle.js"></script>
</body></html>
