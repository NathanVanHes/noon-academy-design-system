<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px 36px;background:var(--void);color:var(--chalk)}
  .r{display:grid;grid-template-columns:64px 1fr auto;gap:20px;align-items:baseline;padding:14px 0;border-bottom:1px solid rgba(232,228,220,.08)}
  .r:last-child{border-bottom:0}
  .k{font-family:'Work Sans';font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(232,228,220,.45)}
  .m{font-family:'JetBrains Mono';font-size:10px;color:rgba(232,228,220,.4)}
  .caps{font-family:'Work Sans';font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:#e8e4dc}
  .mono{font-family:'JetBrains Mono';font-size:13px;color:rgba(232,228,220,.8)}
  .ar{font-family:'Noto Naskh Arabic';font-size:22px;color:#e8e4dc;direction:rtl}
</style></head><body>
  <div class="r"><span class="k">Caps</span><span class="caps">DAY 14 / 28 · ON PACE FOR 92</span><span class="m">11 / 16 · 700 · .16</span></div>
  <div class="r"><span class="k">Mono</span><span class="mono">QDR-08 · +6.2 pts · 24.7°N 48.1°E</span><span class="m">JetBrains 13</span></div>
  <div class="r"><span class="k">Arabic</span><span class="ar">المسارات المثبتة للنجاح</span><span class="m">Noto Naskh 22</span></div>
</body></html>
