<!doctype html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;background:var(--void);display:grid;grid-template-columns:1fr 1fr;min-height:200px}
  .pane{padding:26px 28px}
  .pane+.pane{border-inline-start:1px solid rgba(232,228,220,.08)}
  .caps{font-family:'Inter';font-size:10px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;color:rgba(232,228,220,.45);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
  body.rtl .caps{font-family:'Noto Naskh Arabic',serif;font-size:13px;letter-spacing:0;text-transform:none;font-weight:700;color:rgba(232,228,220,.55)}
  .caps .tiny{letter-spacing:.04em;font-weight:500;text-transform:none;font-family:'JetBrains Mono';font-size:10px;color:rgba(232,228,220,.4);white-space:nowrap;unicode-bidi:isolate}
  /* Numerals stay LTR in Arabic so tabular alignment is preserved */
  .num{font-family:'Inter';font-weight:300;font-size:64px;line-height:.95;letter-spacing:-.035em;color:#e8e4dc;font-variant-numeric:tabular-nums;font-feature-settings:"ss01","cv11";direction:ltr;unicode-bidi:isolate}
  body.rtl .num{text-align:end}
  .num .unit{font-size:32px;color:rgba(232,228,220,.3);margin-inline-start:2px;font-weight:300}
  .num .dec{font-size:32px;color:rgba(232,228,220,.4);font-weight:300}
  .delta{margin-top:14px;font-family:'JetBrains Mono';font-size:11px;letter-spacing:.02em}
  body.rtl .delta{font-family:'Noto Naskh Arabic',serif;font-size:13px;font-weight:600}
  .delta.up{color:#64D8AE}
  .delta.gold{color:#e0b83a}
  .note{margin-top:6px;font-family:'Inter';font-size:13px;color:rgba(232,228,220,.55);line-height:1.45}
  body.rtl .note{font-family:'Noto Naskh Arabic',serif;font-size:14px;line-height:1.7}
  .spark{display:flex;gap:2px;align-items:flex-end;height:18px;margin-top:4px}
  body.rtl .spark{flex-direction:row-reverse}
  .spark i{width:3px;background:rgba(232,228,220,.25);display:block}
  .spark i.on{background:#64D8AE}
</style></head><body>
<div class="pane">
  <div class="caps"><span data-en="Projected arrival" data-ar="الدرجة المتوقعة">Projected arrival</span><span class="tiny">Qudrat · wk 10</span></div>
  <div class="num">92<span class="dec">.4</span></div>
  <div class="delta up" data-en="↗ +6.2 since week 1" data-ar="منذ الأسبوع الأول ‎↗ +6.2‎">↗ +6.2 since week 1</div>
  <div class="note" data-en="On pace. Target 90 cleared week 9." data-ar="على المسار. تجاوز الهدف 90 في الأسبوع التاسع.">On pace. Target 90 cleared week 9.</div>
  <div class="spark"><i style="height:30%"></i><i style="height:40%"></i><i style="height:45%"></i><i style="height:55%"></i><i style="height:60%"></i><i style="height:70%"></i><i style="height:80%"></i><i class="on" style="height:92%"></i></div>
</div>
<div class="pane">
  <div class="caps"><span data-en="Water filled · week 10" data-ar="الماء المعبّأ · الأسبوع 10">Water filled · week 10</span><span class="tiny">min 12</span></div>
  <div class="num">18<span class="unit">/12</span></div>
  <div class="delta gold" data-en="● Minimum crossed · Thu" data-ar="تجاوز الحد الأدنى · الخميس ●">● Minimum crossed · Thu</div>
  <div class="note" data-en="Helped Farida twice this week." data-ar="ساعدت فريدة مرتين هذا الأسبوع.">Helped Farida twice this week.</div>
  <div class="spark"><i style="height:30%"></i><i style="height:40%"></i><i style="height:55%"></i><i style="height:60%"></i><i style="height:70%"></i><i style="height:80%"></i><i style="height:90%"></i><i class="on" style="height:100%;background:#e0b83a"></i></div>
</div>
<script src="dir-toggle.js"></script>
</body></html>
