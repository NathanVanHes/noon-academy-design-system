<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dunes — a particle study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..500;1,9..144,300..400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Noon — Surfaces */
    --bg:           #0a0f1a;            /* Deep Void */
    --bg-sunken:    #060913;
    --bg-raised:    #10172a;
    --bg-overlay:   #1a2236;

    /* Noon — Foreground (warm chalk on void) */
    --fg:           rgba(232,228,220,1);
    --fg-muted:     rgba(232,228,220,0.70);
    --fg-subtle:    rgba(232,228,220,0.55);
    --fg-faint:     rgba(232,228,220,0.35);

    /* Noon — Borders */
    --border:        rgba(232,228,220,0.10);
    --border-strong: rgba(232,228,220,0.22);
    --divider:       rgba(232,228,220,0.06);

    /* Noon — Accent / Signal / Terra */
    --accent:        #64D8AE;
    --accent-soft:   rgba(100,216,174,0.14);
    --accent-border: rgba(100,216,174,0.35);
    --signal:        #c9a227;
    --signal-bright: #e0b83a;
    --terra:         #8A4E2A;
    --terra-soft:    rgba(138,78,42,0.10);

    /* Overlays */
    --hover:    rgba(232,228,220,0.04);
    --selected: rgba(232,228,220,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
  body { font-family: 'JetBrains Mono', ui-monospace, monospace; color: var(--fg); }
  canvas { display: block; position: fixed; inset: 0; }

  /* Sky depth — top of canvas dips into bg-sunken so the field
     reads as receding into deeper space, not a flat surface */
  .sky-fade {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background: linear-gradient(to bottom, var(--bg-sunken) 0%, transparent 32%);
  }

  /* Editorial masthead */
  .masthead {
    position: fixed; top: 28px; left: 32px; z-index: 2;
    user-select: none; pointer-events: none;
  }
  .masthead .eyebrow {
    font: 500 10px/1 'JetBrains Mono', monospace;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--signal);                /* Signal gold — journey marker */
    margin-bottom: 12px;
  }
  .masthead h1 {
    font: italic 300 38px/1 'Fraunces', serif;
    letter-spacing: -0.01em;
    color: var(--fg);
  }
  .masthead .deck {
    font: 400 11px/1.5 'JetBrains Mono', monospace;
    color: var(--fg-subtle);
    margin-top: 8px;
    max-width: 240px;
  }

  /* Plate / signature mark, bottom right */
  .plate {
    position: fixed; bottom: 28px; right: 32px; z-index: 2;
    text-align: right;
    font: 500 9px/1.4 'JetBrains Mono', monospace;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fg-faint);
    user-select: none; pointer-events: none;
  }
  .plate em {
    color: var(--terra);                 /* Terra — Saudi dunes after rain */
    font-style: normal;
  }

  /* Controls — bg-overlay surface, chalk borders */
  .controls {
    position: fixed; bottom: 28px; left: 32px; z-index: 3;
    display: flex; flex-direction: column; gap: 14px;
    padding: 18px 22px;
    border: 1px solid var(--border);
    background: rgba(26, 34, 54, 0.72);  /* bg-overlay @ 72% */
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 2px;
    min-width: 230px;
  }
  .controls .label-bar {
    font: 500 9px/1 'JetBrains Mono', monospace;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--fg-subtle);
    padding-bottom: 6px;
    border-bottom: 1px solid var(--divider);
  }
  .ctrl {
    display: grid;
    grid-template-columns: 70px 1fr 36px;
    align-items: center;
    gap: 10px;
    font: 400 10px/1 'JetBrains Mono', monospace;
    color: var(--fg);
  }
  .ctrl label {
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--fg-subtle);
  }
  .ctrl .val {
    text-align: right;
    color: var(--fg);
    font-variant-numeric: tabular-nums;
  }
  /* Custom range — accent teal thumb against chalk track */
  .ctrl input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 1px;
    background: var(--border-strong);
    outline: none;
    cursor: pointer;
  }
  .ctrl input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .ctrl input[type=range]::-moz-range-thumb {
    width: 10px; height: 10px;
    background: var(--accent);
    border: none; border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .toggle {
    margin-top: 4px;
    font: 500 9px/1 'JetBrains Mono', monospace;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--fg-subtle);
    background: none;
    border: 1px solid var(--border);
    padding: 8px 10px;
    cursor: pointer;
    transition: color 200ms, border-color 200ms, background 200ms;
  }
  .toggle:hover {
    color: var(--accent);
    border-color: var(--accent-border);
    background: var(--accent-soft);
  }

  /* Hide controls when minimised */
  .controls.minimised .label-bar,
  .controls.minimised .ctrl { display: none; }
  .controls.minimised { min-width: 0; padding: 10px 14px; }

  /* Plate navigation — top right, atlas-style flip */
  .plate-nav {
    position: fixed; top: 28px; right: 32px; z-index: 4;
    display: flex; gap: 14px; align-items: center;
    font: 500 10px/1 'JetBrains Mono', monospace;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    user-select: none;
  }
  .plate-nav .label { color: var(--fg-faint); }
  .plate-nav .sep   { color: var(--fg-faint); }
  .plate-nav a {
    color: var(--fg-subtle);
    text-decoration: none;
    padding-bottom: 3px;
    border-bottom: 1px solid transparent;
    transition: color 200ms, border-color 200ms;
  }
  .plate-nav a:hover {
    color: var(--fg);
    border-color: var(--border-strong);
  }
  .plate-nav a.active {
    color: var(--signal);
    border-color: var(--signal);
    cursor: default;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="sky-fade"></div>

<nav class="plate-nav">
  <span class="label">Atlas</span>
  <a href="dunes.html" class="active">I</a>
  <span class="sep">·</span>
  <a href="stars.html">II</a>
  <span class="sep">·</span>
  <a href="terrain.html">III</a>
</nav>

<header class="masthead">
  <div class="eyebrow">Plate I</div>
  <h1>Empty Quarter</h1>
  <p class="deck">A particle study of the great sand sea — drifting, layered, never still.</p>
</header>

<div class="plate">
  fig.&nbsp;01 &nbsp;·&nbsp; <em>perpetual drift</em>
</div>

<aside class="controls" id="controls">
  <div class="label-bar">Atmosphere</div>
  <div class="ctrl">
    <label>Layers</label>
    <input type="range" id="layers" min="3" max="10" step="1" value="4">
    <span class="val" id="layers-v">4</span>
  </div>
  <div class="ctrl">
    <label>Wind</label>
    <input type="range" id="wind" min="0" max="3" step="0.05" value="3">
    <span class="val" id="wind-v">3.00</span>
  </div>
  <div class="ctrl">
    <label>Density</label>
    <input type="range" id="density" min="0.4" max="1.6" step="0.05" value="1">
    <span class="val" id="density-v">1.00</span>
  </div>
  <div class="ctrl">
    <label>Shimmer</label>
    <input type="range" id="shimmer" min="0" max="3" step="0.05" value="1">
    <span class="val" id="shimmer-v">1.00</span>
  </div>
  <div class="ctrl">
    <label>Contrast</label>
    <input type="range" id="contrast" min="0.4" max="1.8" step="0.05" value="1">
    <span class="val" id="contrast-v">1.00</span>
  </div>
  <button class="toggle" id="hide">Hide&nbsp;Panel</button>
</aside>

<script>
/* ============================================================
   DUNES — a particle study
   ------------------------------------------------------------
   Architecture:
   - 4 dune layers, back to front, each defined by:
       y          : base y position (% of screen height)
       amp        : peak vertical amplitude of ridge waves
       freq       : spatial frequency (lower = wider dunes)
       phase      : seeds the harmonics for variety
       density    : how thickly to populate this layer
       drift      : wind parallax multiplier (front drifts more)
       alphaMul   : atmospheric perspective (back is lighter)
   - Each ridge is a sum of three sine harmonics → organic.
   - Particles fill the band between this dune's ridge and the
     next dune's ridge, distributed by a density profile that
     creates the classic stippled shading: hard shadow under
     the ridge, lit face mid-way down, deep shadow at the base.
   - Animation: low-frequency drift in x, micro-shimmer in y,
     plus a slow global wind pulse that breathes across all
     layers. Particles are bucketed by alpha for fast batched
     fills.
   ============================================================ */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const TAU = Math.PI * 2;

let W = 0, H = 0, DPR = 1;

const config = {
  // Chalk fg — bright sand grain on void
  ink: { r: 232, g: 228, b: 220 },

  // Atmosphere multipliers — controlled by sliders
  wind: 3.0,
  shimmer: 1.0,
  densityMul: 1.0,
  layerCount: 4,
  contrast: 1.0,                         // bucket-alpha bias — &gt;1 deepens atmospheric perspective

  // Populated by buildDunes()
  dunes: [],
  baseDensities: [],
};

/* ----- Procedural dune builder ----- *
 * For a given count, produces N dune layers from back (i=0) to front
 * (i=N-1). Every parameter is interpolated by depth-fraction t∈[0,1]:
 *   - more dunes pushes the back-most up the screen (deeper field)
 *   - back dunes are smaller, lighter, less dense, drift slower
 *   - front dunes are taller, darker, denser, drift faster
 * Result feels like atmospheric perspective — closer dunes graphically
 * weighty, distant dunes dissolving into the parchment.
 */
function buildDunes(count) {
  const arr = [];
  // Top of the field rises as we add layers, so more dunes ⇒ taller composition
  const yMin = Math.max(0.10, 0.34 - count * 0.022);
  const yMax = 0.78;

  for (let i = 0; i < count; i++) {
    const t = count === 1 ? 0.5 : i / (count - 1);

    // Quadratic y-distribution: dunes pack closer at the back, more
    // breathing room toward the front (matches real perspective).
    const y = yMin + (yMax - yMin) * (t * t * 0.6 + t * 0.4);

    arr.push({
      y,
      amp:      12 + t * 72,                                   // ridge drama
      freq:     0.0038 - t * 0.0018,                           // wider front dunes
      phase:    (i * 1.731 + 0.4) % (Math.PI * 2),
      density:  0.65 + t * 1.55,                               // denser front
      drift:    0.18 + t * 0.85,                               // parallax
      alphaMul: 0.18 + Math.pow(t, 0.85) * 0.55,               // subtler — front caps at ~0.73, back fades to 0.18
      sizeMul:  0.80 + t * 0.32,                               // larger grains up front
    });
  }
  return arr;
}

/* ----- Apply current layer count (rebuild dune config + density baseline) ----- */
function applyDuneCount() {
  config.dunes = buildDunes(config.layerCount);
  config.baseDensities = config.dunes.map(d => d.density);
  // Re-apply current density multiplier
  config.dunes.forEach((d, i) => {
    d.density = config.baseDensities[i] * config.densityMul;
  });
}

applyDuneCount();

/* ----- Ridge curve: 3 harmonics for organic non-symmetry ----- */
function ridgeY(x, dune) {
  let y = dune.y * H;
  y += Math.sin(x * dune.freq + dune.phase) * dune.amp;
  y += Math.sin(x * dune.freq * 2.3 + dune.phase * 1.5) * dune.amp * 0.36;
  y += Math.sin(x * dune.freq * 5.7 + dune.phase * 0.4) * dune.amp * 0.13;
  return y;
}

/* ----- Local tangent angle of a ridge at x (for surface-aligned drift) ----- */
function ridgeTangent(x, dune) {
  const dx = 4;
  const y0 = ridgeY(x - dx, dune);
  const y1 = ridgeY(x + dx, dune);
  return Math.atan2(y1 - y0, dx * 2);
}

/* ----- Smooth pseudo-noise field for natural clustering ----- *
 * Multi-octave sine sum — fakes a 2D noise without the cost.
 * Output ~ [0, 1].
 */
function clusterField(x, y) {
  const n =
    Math.sin(x * 0.018 + y * 0.014 + 1.3) * 0.50 +
    Math.sin(x * 0.061 + y * 0.047 + 4.2) * 0.32 +
    Math.sin(x * 0.157 + y * 0.121 + 0.9) * 0.18;
  return 0.5 + n * 0.5;   // remap to ~[0,1]
}

/* ----- Density vs depth-from-ridge ----- *
 * t: 0 at ridge, 1 at top of next dune (or canvas bottom)
 * Tightened: sharper shadow band right under the ridge, stronger
 * valley darkening, lighter dip across the lit face.
 */
function densityProfile(t) {
  if (t < 0 || t > 1) return 0;
  const shadow    = Math.exp(-Math.pow((t - 0.07) / 0.045, 2)) * 1.25;  // crisp ridge shadow
  const mid       = Math.exp(-Math.pow((t - 0.28) / 0.14,  2)) * 0.45;
  const highlight = Math.exp(-Math.pow((t - 0.50) / 0.18,  2)) * 0.50;
  const bottom    = Math.pow(Math.max(0, t - 0.55), 1.4) * 1.45;        // deeper valley
  return Math.max(0.05, shadow + mid + bottom - highlight);
}

/* ----- Particles ----- */
let particles = [];     // flat array
let buckets = [];       // particles grouped by alpha bucket for batched draw
const ALPHA_BUCKETS = 10;

function generateParticles() {
  particles = [];
  buckets = Array.from({ length: ALPHA_BUCKETS }, () => []);

  // Particle count scales with screen area — keeps density consistent.
  // Roughly tripled vs first pass for a much denser stipple.
  const baseCount = Math.floor((W * H) / 32);

  for (let li = 0; li < config.dunes.length; li++) {
    const dune = config.dunes[li];
    const next = config.dunes[li + 1] || null;
    const attempts = Math.floor(baseCount * dune.density);

    for (let i = 0; i < attempts; i++) {
      const x  = Math.random() * W;
      const y0 = ridgeY(x, dune);
      const y1 = next ? ridgeY(x, next) : H + 60;
      if (y1 <= y0) continue;

      const local = Math.random() * (y1 - y0);
      const y = y0 + local;
      const t = local / (y1 - y0);

      // Density profile × cluster noise → natural-looking clumping
      const baseD = densityProfile(t);
      const cluster = clusterField(x, y);
      const finalD = baseD * (0.55 + cluster * 0.7);

      // Rejection sample
      if (Math.random() > finalD) continue;

      // Particles in the dense shadow band are slightly larger / darker;
      // particles on the lit face are smaller / lighter — matches stipple shading.
      // Subtler than pass 2: lower base alpha, gentler shadow boost.
      const shadowness = Math.exp(-Math.pow((t - 0.07) / 0.10, 2));
      const alpha = (0.22 + Math.random() * 0.45 + shadowness * 0.15) * dune.alphaMul;
      const r     = (0.26 + Math.random() * 0.55 + shadowness * 0.18) * dune.sizeMul;

      // Pre-compute the local ridge tangent so drift biases along the
      // surface. Each particle gets a wide personal angle offset so
      // adjacent grains drift in genuinely different directions.
      const tang = ridgeTangent(x, dune);
      const ang  = tang + (Math.random() - 0.5) * 1.3;

      const p = {
        bx: x, by: y,
        layer: li,
        r,
        alpha: Math.min(0.98, alpha),
        // Three independent phases, three independent frequencies.
        // No two particles share a temporal cycle → no clumping.
        ph:    Math.random() * TAU,
        ph2:   Math.random() * TAU,
        phP:   Math.random() * TAU,
        freqA: 0.00010 + Math.random() * 0.00022,   // primary drift cycle
        freqB: 0.00018 + Math.random() * 0.00032,   // secondary octave
        freqP: 0.00014 + Math.random() * 0.00024,   // perpendicular wobble
        ax:  0.4 + Math.random() * 1.3,             // along-direction amplitude
        ay:  0.18 + Math.random() * 0.6,            // perpendicular amplitude
        ang,
        cosA: Math.cos(ang),
        sinA: Math.sin(ang),
      };

      particles.push(p);

      const bi = Math.min(ALPHA_BUCKETS - 1, Math.floor(p.alpha * ALPHA_BUCKETS));
      buckets[bi].push(p);
    }
  }
}

/* ----- Render ----- *
 * Each particle drifts on its own clock: its own primary frequency,
 * its own secondary octave, its own perpendicular wobble, and its own
 * direction angle. No two particles share a temporal cycle, so the
 * field as a whole feels alive without any coordinated/clumped motion.
 * The only global element is a slow wind "breath" that scales overall
 * intensity — gives gust feel without moving particles in groups.
 */
function draw(t) {
  ctx.fillStyle = '#0a0f1a';        // Noon bg — Deep Void
  ctx.fillRect(0, 0, W, H);

  const wind = config.wind;
  const shim = config.shimmer;

  // Slow global breathing — varies overall intensity, not direction.
  // Period ~62 seconds, amplitude ±35% so it's barely perceptible.
  const windPulse = wind * (0.75 + Math.sin(t * 0.0001) * 0.35);

  for (let bi = 0; bi < ALPHA_BUCKETS; bi++) {
    const bucket = buckets[bi];
    if (!bucket.length) continue;

    // Contrast bias: pivot each bucket's base alpha around 0.5. At
    // contrast=1 this is identity. At contrast&gt;1, low buckets dim
    // toward void and high buckets brighten — atmospheric perspective
    // deepens. At &lt;1, the field flattens.
    const baseA = (bi + 0.5) / ALPHA_BUCKETS;
    const a = Math.max(0.02, Math.min(1.0, 0.5 + (baseA - 0.5) * config.contrast));
    ctx.fillStyle = `rgba(${config.ink.r}, ${config.ink.g}, ${config.ink.b}, ${a.toFixed(3)})`;
    ctx.beginPath();

    for (let i = 0, n = bucket.length; i < n; i++) {
      const p = bucket[i];
      const dune = config.dunes[p.layer];

      // Two-octave drift along this particle's own direction.
      // The two sines have different freqs → quasi-periodic, never
      // repeats exactly, never in lockstep with neighbours.
      const driftMag = (
        Math.sin(t * p.freqA + p.ph) +
        Math.sin(t * p.freqB + p.ph2) * 0.45
      ) * p.ax * windPulse * dune.drift * 5.5;

      // Perpendicular micro-wobble on its own clock too
      const perpMag = Math.sin(t * p.freqP + p.phP) * p.ay * shim * 0.5;

      const dx = p.cosA * driftMag - p.sinA * perpMag;
      const dy = p.sinA * driftMag + p.cosA * perpMag;

      const x = p.bx + dx;
      const y = p.by + dy;

      ctx.moveTo(x + p.r, y);
      ctx.arc(x, y, p.r, 0, TAU);
    }

    ctx.fill();
  }
}

/* ----- Loop ----- */
let raf = null;
function loop(t) {
  draw(t);
  raf = requestAnimationFrame(loop);
}

/* ----- Resize ----- */
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  generateParticles();
}

/* ----- Controls ----- */
function bind(id, key, regen = false) {
  const el = document.getElementById(id);
  const out = document.getElementById(id + '-v');
  el.addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    config[key] = v;
    out.textContent = v.toFixed(2);
    if (regen) generateParticles();
  });
}
bind('wind', 'wind');
bind('shimmer', 'shimmer');
bind('contrast', 'contrast');

// Layers slider: rebuild the entire dune stack and re-roll particles
const layersEl = document.getElementById('layers');
const layersOut = document.getElementById('layers-v');
layersEl.addEventListener('input', e => {
  const n = parseInt(e.target.value, 10);
  config.layerCount = n;
  layersOut.textContent = n.toString();
  applyDuneCount();
  generateParticles();
});

// Density slider: rewrite each dune's density from base × multiplier, then re-roll
const densityEl = document.getElementById('density');
const densityOut = document.getElementById('density-v');
densityEl.addEventListener('input', e => {
  const m = parseFloat(e.target.value);
  config.densityMul = m;
  densityOut.textContent = m.toFixed(2);
  config.dunes.forEach((d, i) => {
    d.density = config.baseDensities[i] * m;
  });
  generateParticles();
});

document.getElementById('hide').addEventListener('click', e => {
  const c = document.getElementById('controls');
  c.classList.toggle('minimised');
  e.target.textContent = c.classList.contains('minimised') ? 'Show Panel' : 'Hide Panel';
});

window.addEventListener('resize', () => {
  if (raf) cancelAnimationFrame(raf);
  resize();
  raf = requestAnimationFrame(loop);
});

resize();
loop(0);
</script>
</body>
</html>
